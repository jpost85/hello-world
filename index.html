<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1d2a" />
    <link rel="manifest" href="./public/manifest.webmanifest" />
    <title>EVO: Search for Eden (prototype)</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b1d2a;
        overflow: hidden;
        overscroll-behavior: none;
        position: fixed;
        inset: 0;
        font-family: system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
        /* Dynamic viewport unit: fills the screen even as mobile browser chrome
           (URL bar) shows/hides. Falls back to vh on older browsers. */
        height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
