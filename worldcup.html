<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All-Time World Cup Simulator</title>
  <meta name="description" content="Draft a team of soccer legends and run the gauntlet of the greatest national sides of all time." />
  <style>
/* All-Time World Cup Simulator — styles */
:root {
  --pitch-1: #0b3d2e;
  --pitch-2: #0f5132;
  --line: rgba(255, 255, 255, 0.14);
  --gold: #f5c542;
  --gold-deep: #d9a400;
  --ink: #0a1f17;
  --card: #12231c;
  --card-2: #18302625;
  --text: #eaf3ee;
  --muted: #9fb8ac;
  --win: #2ec16b;
  --loss: #e0533d;
  --radius: 14px;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
}

body {
  font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(245, 197, 66, 0.08), transparent 60%),
    repeating-linear-gradient(180deg, var(--pitch-1) 0 64px, var(--pitch-2) 64px 128px);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 28px 16px 60px;
}

#app {
  width: 100%;
  max-width: 760px;
}

/* ---------- generic screen ---------- */
.screen {
  background: linear-gradient(180deg, rgba(8, 28, 21, 0.85), rgba(6, 22, 16, 0.92));
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 30px 28px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(3px);
  animation: rise 0.35s ease;
}
@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

h1 { font-size: 2.1rem; margin: 6px 0 8px; letter-spacing: 0.5px; }
h2 { font-size: 1.5rem; margin: 0 0 6px; }
.tagline { color: var(--muted); line-height: 1.5; max-width: 52ch; margin: 0 auto 18px; }

/* ---------- buttons ---------- */
.btn {
  font: inherit;
  font-weight: 700;
  border: none;
  border-radius: 999px;
  padding: 11px 20px;
  cursor: pointer;
  transition: transform 0.08s ease, filter 0.15s ease, background 0.15s ease;
  color: var(--ink);
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn.primary { background: linear-gradient(180deg, var(--gold), var(--gold-deep)); color: #2a1c00; }
.btn.primary:hover { filter: brightness(1.06); }
.btn.big { padding: 14px 28px; font-size: 1.05rem; }
.btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
.btn.ghost:hover { background: rgba(255, 255, 255, 0.06); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ---------- start ---------- */
.start { text-align: center; }
.trophy { font-size: 3.4rem; filter: drop-shadow(0 4px 12px rgba(245, 197, 66, 0.4)); }
.how { text-align: left; max-width: 480px; margin: 8px auto 22px; display: grid; gap: 10px; }
.how-step {
  background: var(--card-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text);
}
.start-daily { margin-top: 14px; }
.start-daily .btn { border-color: rgba(245, 197, 66, 0.4); }
.how-step .num {
  flex: 0 0 26px;
  height: 26px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: var(--gold);
  color: #2a1c00;
  font-weight: 800;
}

/* ---------- mode select ---------- */
.modes { text-align: center; }
.mode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin: 20px 0;
}
.mode-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px 16px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.08s, background 0.15s;
}
.mode-card:hover { border-color: var(--gold); transform: translateY(-3px); }
.mode-icon { font-size: 2.4rem; }
.mode-title { font-weight: 800; font-size: 1.15rem; margin: 8px 0 6px; }
.mode-desc { color: var(--muted); font-size: 0.85rem; line-height: 1.45; }

/* ---------- decade / nation pick ---------- */
.filter { text-align: center; }
.filter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
  gap: 12px;
  margin: 18px 0;
}
.filter-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 10px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.08s, background 0.15s;
}
.filter-card:hover { border-color: var(--gold); transform: translateY(-3px); }
.filter-flag { font-size: 2.4rem; line-height: 1; }
.filter-decade { font-size: 1.5rem; font-weight: 800; color: var(--gold); }
.filter-name { font-weight: 700; margin-top: 6px; }
.filter-count { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }

.draft-context {
  display: inline-block;
  background: rgba(245, 197, 66, 0.12);
  color: var(--gold);
  border: 1px solid rgba(245, 197, 66, 0.28);
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

/* ---------- draft ---------- */
.draft-head { text-align: center; margin-bottom: 16px; }
.draft-progress {
  display: inline-block;
  font-size: 0.78rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 6px;
}
.slot-blurb { color: var(--muted); margin: 0 auto; max-width: 46ch; }

.pick-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin: 18px 0;
}
.player-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.08s, background 0.15s;
}
.player-card:hover { border-color: var(--gold); transform: translateY(-2px); }
.player-card.selected { border-color: var(--gold); background: rgba(245, 197, 66, 0.1); }
.pc-flag { font-size: 1.6rem; line-height: 1; }
.pc-body { flex: 1; min-width: 0; }
.pc-name { font-weight: 700; }
.pc-meta { font-size: 0.78rem; color: var(--muted); }
.pc-ovr {
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--gold);
  background: rgba(245, 197, 66, 0.12);
  border-radius: 10px;
  padding: 4px 9px;
  min-width: 40px;
  text-align: center;
}

.draft-nav { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.pitch-dots, .track { display: flex; gap: 6px; flex-wrap: wrap; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.15); }
.dot.filled { background: var(--gold); }
.dot.active { background: var(--text); box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.12); }

/* ---------- team review ---------- */
.team { text-align: center; }
.ratings { display: flex; gap: 14px; justify-content: center; margin: 16px 0 22px; }
.rating-box {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 22px;
  min-width: 120px;
}
.rb-val { font-size: 2rem; font-weight: 800; color: var(--gold); }
.rb-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

.team-nav, .result-nav, .draft-nav { display: flex; gap: 12px; justify-content: center; align-items: center; }
.team-nav, .result-nav { flex-wrap: wrap; }

/* ---------- visual pitch ---------- */
.pitch {
  position: relative;
  width: 100%;
  max-width: 420px;
  margin: 0 auto 22px;
  aspect-ratio: 3 / 4;
  border: 2px solid rgba(255, 255, 255, 0.35);
  border-radius: 10px;
  background:
    repeating-linear-gradient(180deg, rgba(255,255,255,0.04) 0 12.5%, rgba(255,255,255,0) 12.5% 25%),
    linear-gradient(180deg, #0f5934, #0c4a2b);
  overflow: hidden;
}
.m-halfway {
  position: absolute; left: 0; right: 0; top: 50%;
  border-top: 2px solid rgba(255, 255, 255, 0.3);
}
.m-circle {
  position: absolute; left: 50%; top: 50%;
  width: 26%; aspect-ratio: 1; transform: translate(-50%, -50%);
  border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
}
.m-box {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 46%; height: 14%;
  border: 2px solid rgba(255, 255, 255, 0.28);
}
.m-box.top { top: -2px; border-top: none; border-radius: 0 0 8px 8px; }
.m-box.bottom { bottom: -2px; border-bottom: none; border-radius: 8px 8px 0 0; }

.pitch-token {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 64px;
  text-align: center;
  animation: rise 0.35s ease;
}
.token-badge {
  position: relative;
  width: 38px; height: 38px;
  display: grid; place-items: center;
  font-size: 1.3rem;
  background: radial-gradient(circle at 50% 35%, #1c3a2d, #0c1f18);
  border: 2px solid var(--gold);
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
}
.token-ovr {
  position: absolute; right: -8px; bottom: -6px;
  background: var(--gold); color: #2a1c00;
  font-size: 0.62rem; font-weight: 800;
  border-radius: 8px; padding: 1px 4px;
  border: 1px solid #0c1f18;
}
.token-name {
  font-size: 0.72rem; font-weight: 700;
  background: rgba(0, 0, 0, 0.45);
  border-radius: 6px; padding: 1px 5px;
  max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ---------- share ---------- */
.share-track {
  font-size: 1.5rem;
  letter-spacing: 3px;
  margin: 8px 0 16px;
}
.toast {
  position: fixed;
  left: 50%; bottom: 28px;
  transform: translateX(-50%) translateY(20px);
  background: var(--gold); color: #2a1c00;
  font-weight: 700;
  padding: 10px 18px; border-radius: 999px;
  box-shadow: var(--shadow);
  opacity: 0; transition: opacity 0.25s, transform 0.25s;
  z-index: 50;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---------- gauntlet ---------- */
.gauntlet { text-align: center; }
.round-pill {
  display: inline-block;
  background: rgba(245, 197, 66, 0.14);
  color: var(--gold);
  border: 1px solid rgba(245, 197, 66, 0.3);
  border-radius: 999px;
  padding: 5px 14px;
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 1px;
  margin-bottom: 18px;
}
.scale-note { color: var(--muted); font-size: 0.78rem; margin: -8px 0 12px; }
.matchup { display: flex; align-items: center; justify-content: center; gap: 18px; margin: 6px 0 14px; }
.side {
  flex: 1;
  max-width: 230px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 12px;
}
.side.opp { border-color: rgba(224, 83, 61, 0.4); }
.side.me { border-color: rgba(245, 197, 66, 0.4); }
.side-flag { font-size: 2.4rem; }
.side-name { font-weight: 800; margin-top: 6px; }
.side-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.vs { font-weight: 900; color: var(--muted); font-size: 1.1rem; }
.opp-blurb { color: var(--muted); max-width: 50ch; margin: 0 auto 16px; line-height: 1.5; }
.odds { margin-bottom: 18px; font-size: 1.05rem; }
.odds strong { color: var(--gold); }

.track { justify-content: center; margin-top: 22px; }
.track-dot { font-size: 1.2rem; opacity: 0.35; filter: grayscale(0.6); transition: opacity 0.2s; }
.track-dot.beat { opacity: 1; filter: none; }
.track-dot.now { opacity: 1; filter: none; transform: scale(1.25); }
.track-sep { color: var(--gold); opacity: 0.6; font-size: 0.9rem; margin: 0 2px; }

/* ---------- result ---------- */
.result { text-align: center; }
.result-tag {
  font-weight: 900;
  letter-spacing: 4px;
  font-size: 1.1rem;
  margin-bottom: 14px;
}
.result.won .result-tag { color: var(--win); }
.result.lost .result-tag { color: var(--loss); }
.scoreboard {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 8px;
}
.sb-team { font-weight: 700; flex: 1; }
.sb-score { font-size: 2.2rem; font-weight: 900; color: var(--gold); white-space: nowrap; }
.pens { color: var(--muted); margin-bottom: 8px; }
.commentary { color: var(--text); max-width: 54ch; margin: 14px auto 22px; line-height: 1.6; }

/* ---------- final standings / summary ---------- */
.summary { text-align: center; }
.summary-result {
  font-weight: 900;
  font-size: 1.7rem;
  letter-spacing: 1px;
  margin: 4px 0 6px;
}
.summary.champ .summary-result { color: var(--gold); }
.summary.out .summary-result { color: var(--loss); }
.summary-sub { color: var(--muted); margin: 0 auto 14px; max-width: 50ch; line-height: 1.5; }

.summary-stats { display: flex; gap: 12px; justify-content: center; margin: 14px 0 18px; flex-wrap: wrap; }
.stat-box {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 18px;
  min-width: 92px;
}
.sb-val { font-size: 1.3rem; font-weight: 800; color: var(--gold); }
.sb-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

.match-list { display: grid; gap: 6px; margin: 0 auto 20px; max-width: 460px; text-align: left; }
.match-row {
  display: grid;
  grid-template-columns: 22px 26px 1fr auto 22px;
  align-items: center;
  gap: 10px;
  background: var(--card-2);
  border: 1px solid var(--line);
  border-left-width: 3px;
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 0.9rem;
}
.match-row.w { border-left-color: var(--win); }
.match-row.l { border-left-color: var(--loss); }
.mr-stage {
  font-size: 0.62rem; font-weight: 800;
  width: 20px; height: 20px; line-height: 20px; text-align: center;
  border-radius: 5px; color: var(--ink);
  background: rgba(255,255,255,0.25);
}
.match-row.w .mr-stage { background: rgba(46,193,107,0.35); color: var(--text); }
.mr-flag { font-size: 1.1rem; }
.mr-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mr-score { font-weight: 800; color: var(--gold); }
.mr-mark { font-weight: 800; text-align: center; }
.match-row.w .mr-mark { color: var(--win); }
.match-row.l .mr-mark { color: var(--loss); }

.summary-xi {
  background: var(--card-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 18px;
  display: flex; flex-wrap: wrap; gap: 7px; justify-content: center;
}
.sxi-label {
  width: 100%; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px;
  color: var(--gold); font-weight: 700; margin-bottom: 4px;
}
.xi-chip {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 0.82rem;
}
.share-hint { color: var(--muted); font-size: 0.78rem; margin-top: 12px; }

/* ---------- win ---------- */
.win { text-align: center; }
.big-trophy { font-size: 5rem; animation: pop 0.6s ease; }
@keyframes pop {
  0% { transform: scale(0.4); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
.win h1 { color: var(--gold); letter-spacing: 2px; }
.winners {
  background: var(--card-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--muted);
  line-height: 1.7;
  margin: 8px auto 22px;
  max-width: 56ch;
}

/* ---------- responsive ---------- */
@media (max-width: 560px) {
  .screen { padding: 22px 16px; }
  h1 { font-size: 1.7rem; }
  .ratings { flex-wrap: wrap; }
  .matchup { gap: 10px; }
  .side-flag { font-size: 1.8rem; }
  .sb-score { font-size: 1.7rem; }
}

</style>
</head>

  <script>
/* === js/rng.js === */
/*
 * Seeded RNG — deterministic pseudo-random numbers from a string key.
 *
 * Used by the Daily Challenge so that everyone playing on a given date gets
 * the exact same draft shortlists, bracket and match outcomes. Normal modes
 * keep using Math.random.
 *
 *   var rng = Rng.fromString("2026-06-21|bracket");
 *   rng(); // -> deterministic float in [0, 1)
 */
window.Rng = (function () {
  // xmur3 string hash -> 32-bit seed
  function xmur3(str) {
    var h = 1779033703 ^ str.length;
    for (var i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function () {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return (h ^= h >>> 16) >>> 0;
    };
  }

  // mulberry32 PRNG
  function mulberry32(a) {
    return function () {
      a |= 0;
      a = (a + 0x6d2b79f5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function fromString(str) {
    return mulberry32(xmur3(String(str))());
  }

  // Today's challenge id (UTC, so it's the same worldwide).
  function today() {
    return new Date().toISOString().slice(0, 10);
  }

  return { fromString: fromString, today: today };
})();


/* === js/players.js === */
/*
 * All-Time World Cup Simulator — Player Database
 *
 * A curated roster of soccer legends spanning the 1950s to the 2020s.
 * Each player has a `pwr` (0-100) representing their effectiveness in their
 * primary role; the match engine reads this when computing line strengths.
 *
 * pos: GK | DEF | MID | FWD
 * pwr: role power used by the engine
 * ovr: overall rating, shown to the player
 *
 * The dataset is deep enough that each of the major footballing nations and
 * each well-populated decade can field a full 4-3-3 (see js/modes.js, which
 * only ever offers options that can actually field a team).
 *
 * To extend the game, just add entries here. Reference an `id` in js/slots.js
 * to add it to an all-time draft tier; decade/nation modes pick it up
 * automatically from its `pos`, `decade` and `nation`.
 */
window.PLAYERS = [
  // ============================ Goalkeepers ============================
  { id: "yashin",       name: "Lev Yashin",        pos: "GK",  nation: "USSR",        flag: "🇷🇺", decade: "1960s", club: "Dynamo Moscow",   ovr: 89, pwr: 90 },
  { id: "banks",        name: "Gordon Banks",      pos: "GK",  nation: "England",     flag: "🏴",  decade: "1960s", club: "Stoke City",      ovr: 87, pwr: 88 },

  { id: "maier",        name: "Sepp Maier",        pos: "GK",  nation: "Germany",     flag: "🇩🇪", decade: "1970s", club: "Bayern Munich",   ovr: 85, pwr: 86 },
  { id: "fillol",       name: "Ubaldo Fillol",     pos: "GK",  nation: "Argentina",   flag: "🇦🇷", decade: "1970s", club: "River Plate",     ovr: 84, pwr: 85 },
  { id: "shilton",      name: "Peter Shilton",     pos: "GK",  nation: "England",     flag: "🏴",  decade: "1980s", club: "Nott'm Forest",   ovr: 86, pwr: 87 },
  { id: "vanbreukelen", name: "Hans van Breukelen",pos: "GK",  nation: "Netherlands", flag: "🇳🇱", decade: "1980s", club: "PSV Eindhoven",   ovr: 82, pwr: 83 },
  { id: "schmeichel",   name: "Peter Schmeichel",  pos: "GK",  nation: "Denmark",     flag: "🇩🇰", decade: "1990s", club: "Man United",      ovr: 88, pwr: 89 },
  { id: "taffarel",     name: "Cláudio Taffarel",  pos: "GK",  nation: "Brazil",      flag: "🇧🇷", decade: "1990s", club: "Parma",           ovr: 82, pwr: 83 },
  { id: "zubizarreta",  name: "Andoni Zubizarreta",pos: "GK",  nation: "Spain",       flag: "🇪🇸", decade: "1990s", club: "Barcelona",       ovr: 85, pwr: 86 },

/* === js/modes.js === */
/*
 * Game modes — how the draft pool is constrained.
 *
 *   all-time : the curated themed tiers from js/slots.js (Pelé vs Messi, etc.)
 *   decade   : only players whose `decade` matches (e.g. the 1980s XI)
 *   nation   : only players from one country (e.g. an all-time Brazil XI)
 *   confed   : only players from one confederation / region (e.g. an
 *              all-time South America or Africa XI)
 *
 * A mode is { type: 'all-time' | 'decade' | 'nation' | 'confed', value: string|null }.
 *
 * For decade/nation/confed modes the draft uses a generic 4-3-3 formation and
 * each slot is filled from the matching players for that line, minus anyone
 * already picked. Modes only ever offers an option that can actually field a
 * full XI, so the player never hits a dead end.
 */

// Generic 4-3-3 used by the filtered modes.
window.FORMATION = [
  { key: "gk",  line: "GK",  label: "Goalkeeper",   blurb: "Your last line of defence." },
  { key: "rb",  line: "DEF", label: "Right-Back",   blurb: "Lock down the right flank." },
  { key: "rcb", line: "DEF", label: "Centre-Back",  blurb: "The defensive rock." },
  { key: "lcb", line: "DEF", label: "Centre-Back",  blurb: "Win every aerial duel." },
  { key: "lb",  line: "DEF", label: "Left-Back",    blurb: "Lock down the left flank." },
  { key: "cm1", line: "MID", label: "Midfielder",   blurb: "Control the centre of the park." },
  { key: "cm2", line: "MID", label: "Midfielder",   blurb: "Drive the team forward." },
  { key: "cm3", line: "MID", label: "Midfielder",   blurb: "Pull the creative strings." },
  { key: "rw",  line: "FWD", label: "Forward",      blurb: "Stretch and terrorise the defence." },
  { key: "st",  line: "FWD", label: "Forward",      blurb: "Lead the line and finish chances." },
  { key: "lw",  line: "FWD", label: "Forward",      blurb: "The wide threat." },
];

window.Modes = (function () {
  // Order in which decades are presented.
  var DECADE_ORDER = ["1950s", "1960s", "1970s", "1980s", "1990s", "2000s", "2010s", "2020s"];

  // Nation -> confederation. Any nation not listed is treated as "other".
  var NATION_CONFED = {
    // UEFA (Europe)
    "England": "UEFA", "Italy": "UEFA", "Germany": "UEFA", "Spain": "UEFA",
    "France": "UEFA", "Netherlands": "UEFA", "Portugal": "UEFA", "Belgium": "UEFA",
    "Croatia": "UEFA", "Denmark": "UEFA", "Sweden": "UEFA", "Poland": "UEFA",
    "Hungary": "UEFA", "USSR": "UEFA", "N. Ireland": "UEFA",
    // CONMEBOL (South America)
    "Brazil": "CONMEBOL", "Argentina": "CONMEBOL", "Uruguay": "CONMEBOL",
    "Colombia": "CONMEBOL", "Chile": "CONMEBOL",
    // CAF (Africa)
    "Nigeria": "CAF", "Cameroon": "CAF", "Ivory Coast": "CAF", "Egypt": "CAF",
    "Senegal": "CAF", "Ghana": "CAF", "Algeria": "CAF", "Morocco": "CAF", "Liberia": "CAF",
    // CONCACAF (North & Central America)
    "Mexico": "CONCACAF", "USA": "CONCACAF", "Costa Rica": "CONCACAF",
    // AFC (Asia / Australia)
    "Japan": "AFC", "South Korea": "AFC", "Iran": "AFC", "Australia": "AFC",
  };

  // Display metadata for confederations, in the order they're offered.
  var CONFED_META = [
    { value: "CONMEBOL", label: "South America", flag: "🌎" },
    { value: "UEFA",     label: "Europe",        flag: "🇪🇺" },
    { value: "CAF",      label: "Africa",        flag: "🌍" },
    { value: "CONCACAF", label: "North America", flag: "🌎" },
    { value: "AFC",      label: "Asia",          flag: "🌏" },
  ];

  function confedOf(nation) {
    return NATION_CONFED[nation] || null;
  }

  // A squad needs 1 GK, 4 DEF, 3 MID, 3 FWD — can this pool field it?
  function canField(players) {
    var c = { GK: 0, DEF: 0, MID: 0, FWD: 0 };
    players.forEach(function (p) { c[p.pos]++; });
    return c.GK >= 1 && c.DEF >= 4 && c.MID >= 3 && c.FWD >= 3;
  }

  function groupBy(keyFn) {
    return window.PLAYERS.reduce(function (acc, p) {
      var k = keyFn(p);
      if (k == null) return acc;
      (acc[k] = acc[k] || []).push(p);
      return acc;
    }, {});
  }

  // Decades that can field a full XI, in chronological order.
  function availableDecades() {
    var byDecade = groupBy(function (p) { return p.decade; });
    return DECADE_ORDER.filter(function (d) {
      return byDecade[d] && canField(byDecade[d]);
    }).map(function (d) {
      return { value: d, label: d, flag: null, count: byDecade[d].length };
    });
  }

  // Nations that can field a full XI, richest squads first.
  function availableNations() {
    var byNation = groupBy(function (p) { return p.nation; });
    return Object.keys(byNation)
      .filter(function (n) { return canField(byNation[n]); })
      .map(function (n) {
        return { value: n, label: n, flag: byNation[n][0].flag, count: byNation[n].length };
      })
      .sort(function (a, b) { return b.count - a.count || a.value.localeCompare(b.value); });
  }

  // Confederations that can field a full XI, in CONFED_META order.
  function availableConfederations() {
    var byConfed = groupBy(function (p) { return confedOf(p.nation); });
    return CONFED_META.filter(function (m) {
      return byConfed[m.value] && canField(byConfed[m.value]);
    }).map(function (m) {
      return { value: m.value, label: m.label, flag: m.flag, count: byConfed[m.value].length };
    });
  }

  // The slot template for a mode.
  function slotsFor(mode) {
    return mode.type === "all-time" ? window.SLOTS : window.FORMATION;
  }

  // ----- Daily Challenge: seeded draft shortlists -----
  // Every position gets the same fixed shortlist of candidates for everyone
  // playing on the given date — the puzzle is to build the best XI from these.
  var DAILY_CHOICES = 6;

  function seededShuffle(arr, rng) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // Returns { [slotKey]: [playerId, ...] } for the day.
  function buildDailyPools(dateKey) {
    var pools = {};
    window.FORMATION.forEach(function (slot) {
      var rng = window.Rng.fromString(dateKey + "|slot|" + slot.key);
      var byLine = window.PLAYERS.filter(function (p) { return p.pos === slot.line; });
      pools[slot.key] = seededShuffle(byLine, rng)
        .slice(0, DAILY_CHOICES)
        .map(function (p) { return p.id; });
    });
    return pools;
  }

  // Does a player match the (non all-time) mode's filter?
  function matchesFilter(player, mode) {
    if (mode.type === "decade") return player.decade === mode.value;
    if (mode.type === "nation") return player.nation === mode.value;
    if (mode.type === "confed") return confedOf(player.nation) === mode.value;
    return true;
  }

  // Eligible player ids for a slot, given the mode and current squad
  // (already-picked players are filtered out so no one is chosen twice).
  function poolFor(mode, slot, squad) {
    var ids;
    if (mode.type === "all-time") {
      ids = slot.pool.slice();
    } else if (mode.type === "daily") {
      ids = (mode.pools && mode.pools[slot.key] ? mode.pools[slot.key] : []).slice();
    } else {
      ids = window.PLAYERS
        .filter(function (p) { return p.pos === slot.line && matchesFilter(p, mode); })
        .map(function (p) { return p.id; });
    }
    var taken = slotsFor(mode)
      .filter(function (s) { return s.key !== slot.key; })
      .map(function (s) { return squad[s.key]; })
      .filter(Boolean)
      .map(function (p) { return p.id; });
    return ids.filter(function (id) { return taken.indexOf(id) === -1; });
  }

  // Short human label for a chosen mode (used in headers / share text).
  function label(mode) {
    if (mode.type === "all-time") return "All-Time XI";
    if (mode.type === "daily") return "Daily Challenge";
    if (mode.type === "confed") {
      var meta = CONFED_META.filter(function (m) { return m.value === mode.value; })[0];
      return (meta ? meta.label : mode.value) + " XI";
    }
    return mode.value + " XI";
  }

  return {
    canField: canField,
    confedOf: confedOf,
    availableDecades: availableDecades,
    availableNations: availableNations,
    availableConfederations: availableConfederations,
    slotsFor: slotsFor,
    poolFor: poolFor,
    buildDailyPools: buildDailyPools,
    label: label,
  };
})();


/* === js/engine.js === */
/*
 * Match engine — rated simulation with randomness.
 *
 * 1. Reduce each side to three line ratings (att / mid / def).
 * 2. The midfield battle shifts expected goals toward whoever controls it.
 * 3. Each attack is graded against the opposing defence to produce an
 *    expected-goals (xG) figure, which is sampled with a Poisson draw so
 *    upsets are always possible but talent wins out over time.
 */
window.Engine = (function () {
  // ---- Build the player's three line ratings from their chosen XI ----
  // squad: { [slotKey]: playerObject }
  // slots: the active slot template (all-time tiers or a 4-3-3 formation)
  function rateSquad(squad, slots) {
    slots = slots || window.SLOTS;
    var lines = { GK: [], DEF: [], MID: [], FWD: [] };
    slots.forEach(function (slot) {
      var player = squad[slot.key];
      if (player) lines[slot.line].push(player.pwr);
    });
    var avg = function (arr) {
      if (!arr.length) return 70;
      return arr.reduce(function (a, b) { return a + b; }, 0) / arr.length;
    };
    // The keeper reinforces the defensive line (weighted in).
    var defBase = avg(lines.DEF);
    var gk = avg(lines.GK);
    return {
      att: avg(lines.FWD),
      mid: avg(lines.MID),
      def: defBase * 0.78 + gk * 0.22,
    };
  }

  // ---- Poisson sampler (Knuth) for goal counts, from a given rng ----
  function poisson(rng, lambda) {
    var L = Math.exp(-lambda);
    var k = 0;
    var p = 1;
    do {
      k++;
      p *= rng();
    } while (p > L);
    return k - 1;
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }

  // ---- Expected goals for an attack vs a defence, tilted by midfield edge ----
  function expectedGoals(att, def, midEdge) {
    // 1.25 baseline goals; every rating point of attacking edge is worth
    // ~0.07 xG, and controlling midfield adds a smaller bonus. The edge
    // coefficient is tuned so a top XI clears the full gauntlet ~11% of the
    // time while a mediocre XI is all but doomed — hard but achievable.
    var xg = 1.25 + (att - def) * 0.07 + midEdge * 0.035;
    return clamp(xg, 0.18, 5.0);
  }

  // ---- Simulate one match. a = player squad rating, b = opponent ----
  // rng is optional; pass a seeded generator for deterministic results (the
  // Daily Challenge). Defaults to Math.random for normal play.
  // Returns { home, away, xgHome, xgAway, result, penalties? }
  function simulateMatch(a, b, rng) {
    rng = rng || Math.random;
    var midEdge = a.mid - b.mid;
    var xgHome = expectedGoals(a.att, b.def, midEdge);
    var xgAway = expectedGoals(b.att, a.def, -midEdge);

    var home = poisson(rng, xgHome);
    var away = poisson(rng, xgAway);

    var out = {
      home: home,
      away: away,
      xgHome: xgHome,
      xgAway: xgAway,
      penalties: null,
    };

    if (home > away) out.result = "win";
    else if (home < away) out.result = "loss";
    else {
      // Knockout: a draw goes to penalties, weighted slightly by who had
      // the better expected-goals figure (i.e. who created more).
      var edge = clamp(0.5 + (xgHome - xgAway) * 0.12, 0.2, 0.8);
      var winHome = rng() < edge;
      out.penalties = {
        home: winHome ? 4 + Math.floor(rng() * 2) : 2 + Math.floor(rng() * 2),
        away: winHome ? 2 + Math.floor(rng() * 2) : 4 + Math.floor(rng() * 2),
      };
      // Guarantee the shootout isn't level.
      if (out.penalties.home === out.penalties.away) {
        if (winHome) out.penalties.home++; else out.penalties.away++;
      }
      out.result = winHome ? "win" : "loss";
    }
    return out;
  }

  // ---- Win probability estimate (for the pre-match odds display) ----
  // Runs a quick Monte-Carlo so the displayed odds match the live engine.
  function winProbability(a, b, samples) {
    samples = samples || 600;
    var wins = 0;
    for (var i = 0; i < samples; i++) {
      if (simulateMatch(a, b).result === "win") wins++;
    }
    return Math.round((wins / samples) * 100);
  }

  return {
    rateSquad: rateSquad,
    simulateMatch: simulateMatch,
    winProbability: winProbability,
  };
})();


/* === js/game.js === */
/*
 * Game controller — screens, state and rendering for the
 * All-Time World Cup Simulator.
 *
 * Flow:  Start → Mode select → (Decade/Nation pick) → Draft → Team → Gauntlet → Win/Lose
 */
(function () {
  var app = document.getElementById("app");

  var state = {
    mode: { type: "all-time", value: null }, // see js/modes.js
    slots: window.SLOTS,                      // active slot template
    squad: {},                               // slotKey -> player object
    slotIndex: 0,                            // which draft slot we're on
    round: 0,                               // current gauntlet round
    bracket: null,                          // this run's drawn opponents
    history: [],                           // per-match results for sharing
  };

  // ---------------------------------------------------------------- helpers
  function el(html) {
    var t = document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  function buttonEl(text, cls, onclick) {
    var b = el('<button class="btn ' + cls + '">' + text + "</button>");
    b.onclick = onclick;
    return b;
  }

  function pdCard(player, opts) {
    opts = opts || {};
    return (
      '<div class="player-card' + (opts.selected ? " selected" : "") + '"' +
      (opts.pickKey ? ' data-pick="' + opts.pickKey + '" data-id="' + player.id + '"' : "") +
      ' role="button" tabindex="0">' +
        '<div class="pc-flag">' + player.flag + "</div>" +
        '<div class="pc-body">' +
          '<div class="pc-name">' + player.name + "</div>" +
          '<div class="pc-meta">' + player.club + " · " + player.decade + "</div>" +
        "</div>" +
        '<div class="pc-ovr">' + player.ovr + "</div>" +
      "</div>"
    );
  }

  function squadComplete() {
    return state.slots.every(function (s) { return state.squad[s.key]; });
  }

  // Header label for the current mode (Daily also shows its date).
  function contextLabel() {
    return state.mode.type === "daily"
      ? "🗓️ Daily Challenge · " + state.mode.value
      : window.Modes.label(state.mode);
  }

  // ---------------------------------------------------------------- difficulty scaling
  // The gauntlet is calibrated against an all-time XI. So that constrained
  // modes (a single nation/region/decade) are winnable rather than hopeless,
  // opponents are scaled down toward the *ceiling* of the chosen pool — the
  // strongest XI it could possibly field. Drafting closer to that ceiling
  // still improves your odds; all-time mode is left unscaled.
  function bestRatingForMode(mode) {
    var slots = window.Modes.slotsFor(mode);
    var sq = {};
    slots.forEach(function (slot) {
      var pool = window.Modes.poolFor(mode, slot, sq)
        .map(function (id) { return window.PLAYER_BY_ID[id]; })
        .sort(function (a, b) { return b.pwr - a.pwr; });
      if (pool[0]) sq[slot.key] = pool[0];
    });
    return window.Engine.rateSquad(sq, slots);
  }
  function avg3(r) { return (r.att + r.mid + r.def) / 3; }
  var REF_CEILING = avg3(bestRatingForMode({ type: "all-time", value: null }));
  function scaleForMode(mode) {
    var c = avg3(bestRatingForMode(mode));
    return Math.max(0.8, Math.min(1, c / REF_CEILING));
  }

  // ---------------------------------------------------------------- bracket draw
  // Each run draws a fresh cup: an easier "group stage" then a "knockout"
  // stage of all-time greats. Group teams are ordered easiest-first for a
  // clean ramp; knockout teams are shuffled but the strongest drawn side is
  // saved for the final, so every run climaxes against a true heavyweight.
  function oppStrength(o) { return o.att + o.mid + o.def; }

  function shuffle(arr, rng) {
    rng = rng || Math.random;
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function drawN(pool, n, rng) {
    return shuffle(pool, rng).slice(0, Math.min(n, pool.length));
  }

  // rng optional — pass a seeded generator for a fixed daily bracket.
  function buildBracket(rng) {
    var groupPool = window.OPPONENTS.filter(function (o) { return o.tier === "group"; });
    var koPool = window.OPPONENTS.filter(function (o) { return o.tier === "knockout"; });

    var group = drawN(groupPool, window.GAUNTLET.group, rng)
      .sort(function (a, b) { return oppStrength(a) - oppStrength(b); });

    var ko = drawN(koPool, window.GAUNTLET.knockout, rng);
    // Pull the strongest drawn side out and make it the final.
    var maxIdx = 0;
    ko.forEach(function (o, i) { if (oppStrength(o) > oppStrength(ko[maxIdx])) maxIdx = i; });
    var finalBoss = ko.splice(maxIdx, 1)[0];
    ko.push(finalBoss);

    return group.concat(ko);
  }

  function stageOf(round) {
    return round < window.GAUNTLET.group ? "Group Stage" : "Knockout";
  }

  // ---------------------------------------------------------------- start
  function renderStart() {
    state.mode = { type: "all-time", value: null };
    state.slots = window.SLOTS;
    state.squad = {};
    state.slotIndex = 0;
    state.round = 0;
    state.bracket = null;
    state.history = [];

    app.innerHTML = "";
    app.appendChild(el(
      '<section class="screen start">' +
        '<div class="trophy">🏆</div>' +
        "<h1>All-Time World Cup</h1>" +
        '<p class="tagline">Draft a team of legends. Run the gauntlet of the greatest sides ever to play. Lose once and it\'s over.</p>' +
        '<div class="how">' +
          '<div class="how-step"><span class="num">1</span> Choose a squad style, then pick a legend for each position.</div>' +
          '<div class="how-step"><span class="num">2</span> Face ' + window.OPPONENTS.length + " all-time great teams, one by one.</div>" +
          '<div class="how-step"><span class="num">3</span> Win every match to be crowned champion of history.</div>' +
        "</div>" +
        '<button class="btn primary big" id="startBtn">Start the Gauntlet</button>' +
        '<div class="start-daily"><button class="btn ghost" id="dailyBtn">' + dailyButtonLabel() + "</button></div>" +
      "</section>"
    ));
    document.getElementById("startBtn").onclick = renderModeSelect;
    document.getElementById("dailyBtn").onclick = startDaily;
  }

  // ---------------------------------------------------------------- daily challenge
  function dailyStorageKey(date) { return "wc_daily_" + date; }

  function loadDaily(date) {
    try { return JSON.parse(window.localStorage.getItem(dailyStorageKey(date))); }
    catch (e) { return null; }
  }

  function saveDaily(date, res) {
    try {
      var prev = loadDaily(date);
      if (!prev || res.won > prev.won) {
        window.localStorage.setItem(dailyStorageKey(date), JSON.stringify(res));
      }
    } catch (e) { /* storage unavailable — ignore */ }
  }

  function dailyButtonLabel() {
    var prev = loadDaily(window.Rng.today());
    return prev
      ? "🗓️ Daily Challenge ✓ — today's best " + prev.won + "/" + prev.total
      : "🗓️ Play the Daily Challenge";
  }

  function startDaily() {
    var date = window.Rng.today();
    state.mode = { type: "daily", value: date, pools: window.Modes.buildDailyPools(date) };
    state.slots = window.FORMATION;
    state.squad = {};
    state.slotIndex = 0;
    state.bracket = null;
    state.history = [];
    renderDraft();
  }

  // ---------------------------------------------------------------- mode select
  function renderModeSelect() {
    app.innerHTML = "";
    var section = el(
      '<section class="screen modes">' +
        "<h2>Choose your squad</h2>" +
        '<p class="slot-blurb">How do you want to build your team?</p>' +
        '<div class="mode-grid">' +
          modeCard("all-time", "🌍", "All-Time", "Themed tiers — pit the very best of every era against each other.") +
          modeCard("decade", "📅", "By Decade", "Field the greatest XI of a single decade.") +
          modeCard("nation", "🏳️", "By Nation", "Build an all-time team from one country.") +
          modeCard("confed", "🌐", "By Region", "An all-time XI from a whole confederation.") +
        "</div>" +
        '<div class="team-nav"><button class="btn ghost" id="backStart">← Back</button></div>' +
      "</section>"
    );
    app.appendChild(section);

    section.querySelector('[data-mode="all-time"]').onclick = function () {
      state.mode = { type: "all-time", value: null };
      state.slots = window.SLOTS;
      state.squad = {};
      state.slotIndex = 0;
      renderDraft();
    };
    section.querySelector('[data-mode="decade"]').onclick = function () { renderFilterSelect("decade"); };
    section.querySelector('[data-mode="nation"]').onclick = function () { renderFilterSelect("nation"); };
    section.querySelector('[data-mode="confed"]').onclick = function () { renderFilterSelect("confed"); };
    document.getElementById("backStart").onclick = renderStart;
  }

  function modeCard(key, icon, title, desc) {
    return (
      '<div class="mode-card" data-mode="' + key + '" role="button" tabindex="0">' +
        '<div class="mode-icon">' + icon + "</div>" +
        '<div class="mode-title">' + title + "</div>" +
        '<div class="mode-desc">' + desc + "</div>" +
      "</div>"
    );
  }

  // ---------------------------------------------------------------- decade / nation / region pick
  function renderFilterSelect(type) {
    var options = type === "decade" ? window.Modes.availableDecades()
                : type === "nation" ? window.Modes.availableNations()
                : window.Modes.availableConfederations();
    var heading = type === "decade" ? "Pick a decade"
                : type === "nation" ? "Pick a nation"
                : "Pick a region";
    app.innerHTML = "";

    var cards = options.map(function (o) {
      var face = type === "decade" ? '<div class="filter-decade">' + o.label + "</div>"
                                   : '<div class="filter-flag">' + o.flag + "</div>";
      var name = type === "decade" ? "" : '<div class="filter-name">' + o.label + "</div>";
      return (
        '<div class="filter-card" data-value="' + o.value + '" role="button" tabindex="0">' +
          face + name +
          '<div class="filter-count">' + o.count + " legends</div>" +
        "</div>"
      );
    }).join("");

    var section = el(
      '<section class="screen filter">' +
        "<h2>" + heading + "</h2>" +
        '<p class="slot-blurb">Only teams with a full squad of legends are shown.</p>' +
        '<div class="filter-grid">' + cards + "</div>" +
        '<div class="team-nav"><button class="btn ghost" id="backModes">← Back</button></div>' +
      "</section>"
    );
    app.appendChild(section);

    section.querySelectorAll(".filter-card").forEach(function (node) {
      node.onclick = function () {
        state.mode = { type: type, value: node.getAttribute("data-value") };
        state.slots = window.FORMATION;
        state.squad = {};
        state.slotIndex = 0;
        renderDraft();
      };
    });
    document.getElementById("backModes").onclick = renderModeSelect;
  }

  // ---------------------------------------------------------------- draft
  function renderDraft() {
    var slot = state.slots[state.slotIndex];
    app.innerHTML = "";

    var cards = window.Modes.poolFor(state.mode, slot, state.squad)
      .map(function (id) { return window.PLAYER_BY_ID[id]; })
      .filter(Boolean)
      .map(function (p) {
        return pdCard(p, {
          pickKey: slot.key,
          selected: state.squad[slot.key] && state.squad[slot.key].id === p.id,
        });
      })
      .join("");

    var context = state.mode.type === "all-time" ? "" :
      '<div class="draft-context">' + contextLabel() + "</div>";

    var section = el(
      '<section class="screen draft">' +
        '<div class="draft-head">' +
          context +
          '<div class="draft-progress">Pick ' + (state.slotIndex + 1) + " of " + state.slots.length + "</div>" +
          "<h2>" + slot.label + "</h2>" +
          '<p class="slot-blurb">' + slot.blurb + "</p>" +
        "</div>" +
        '<div class="pick-grid">' + cards + "</div>" +
        '<div class="draft-nav">' +
          '<button class="btn ghost" id="backBtn">← Back</button>' +
          '<div class="pitch-dots">' + dotsHTML() + "</div>" +
        "</div>" +
      "</section>"
    );
    app.appendChild(section);

    section.querySelectorAll("[data-pick]").forEach(function (node) {
      var choose = function () {
        state.squad[slot.key] = window.PLAYER_BY_ID[node.getAttribute("data-id")];
        advanceDraft();
      };
      node.addEventListener("click", choose);
      node.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); choose(); }
      });
    });
    document.getElementById("backBtn").onclick = function () {
      if (state.slotIndex > 0) { state.slotIndex--; renderDraft(); }
      else if (state.mode.type === "daily") renderStart();
      else renderModeSelect();
    };
  }

  function dotsHTML() {
    return state.slots.map(function (s, i) {
      var cls = state.squad[s.key] ? "dot filled" : (i === state.slotIndex ? "dot active" : "dot");
      return '<span class="' + cls + '"></span>';
    }).join("");
  }

  function advanceDraft() {
    if (state.slotIndex < state.slots.length - 1) {
      state.slotIndex++;
      renderDraft();
    } else if (squadComplete()) {
      renderTeam();
    } else {
      state.slotIndex = state.slots.findIndex(function (s) { return !state.squad[s.key]; });
      renderDraft();
    }
  }

  // ---------------------------------------------------------------- pitch view
  // Lay the chosen XI out on a 4-3-3 pitch (GK at the bottom, attack on top).
  var LINE_Y = { FWD: 17, MID: 43, DEF: 69, GK: 89 };

  function pitchTokens() {
    var byLine = { GK: [], DEF: [], MID: [], FWD: [] };
    state.slots.forEach(function (s) { byLine[s.line].push(s); });

    var tokens = [];
    Object.keys(byLine).forEach(function (line) {
      var arr = byLine[line];
      arr.forEach(function (slot, i) {
        var p = state.squad[slot.key];
        if (!p) return;
        var x = ((i + 1) / (arr.length + 1)) * 100;
        var surname = p.name.split(" ").slice(-1)[0];
        tokens.push(
          '<div class="pitch-token" style="left:' + x.toFixed(1) + "%;top:" + LINE_Y[line] + '%" ' +
            'title="' + p.name + " — " + p.club + " (" + p.decade + ')">' +
            '<div class="token-badge">' + p.flag + '<span class="token-ovr">' + p.ovr + "</span></div>" +
            '<div class="token-name">' + surname + "</div>" +
          "</div>"
        );
      });
    });
    return tokens.join("");
  }

  function pitchHTML() {
    return (
      '<div class="pitch">' +
        '<div class="m-circle"></div>' +
        '<div class="m-halfway"></div>' +
        '<div class="m-box top"></div>' +
        '<div class="m-box bottom"></div>' +
        pitchTokens() +
      "</div>"
    );
  }

  // ---------------------------------------------------------------- sharing
  function resultSquares() {
    var total = state.bracket ? state.bracket.length : state.history.length;
    var sq = [];
    for (var i = 0; i < total; i++) {
      if (i < state.history.length) sq.push(state.history[i].result === "win" ? "🟩" : "🟥");
      else sq.push("⬜");
    }
    return sq.join("");
  }

  // Aggregate the finished (or abandoned) run into shareable stats.
  function runStats() {
    var won = state.history.filter(function (h) { return h.result === "win"; }).length;
    var total = state.bracket ? state.bracket.length : state.history.length;
    var gf = state.history.reduce(function (s, h) { return s + h.home; }, 0);
    var ga = state.history.reduce(function (s, h) { return s + h.away; }, 0);
    var best = null; // toughest side beaten, by combined rating
    state.history.forEach(function (h, i) {
      if (h.result === "win" && state.bracket[i]) {
        var o = state.bracket[i];
        var st = o.att + o.mid + o.def;
        if (!best || st > best.st) best = { o: o, st: st };
      }
    });
    return {
      won: won, total: total, gf: gf, ga: ga, best: best,
      champion: won === total && state.history.length === total,
    };
  }

  function buildShareText() {
    var s = runStats();
    var last = state.history[state.history.length - 1];
    var title = state.mode.type === "daily"
      ? "🏆 All-Time World Cup — Daily " + state.mode.value
      : "🏆 All-Time World Cup";
    var lines = [title, window.Modes.label(state.mode)];
    if (s.champion) {
      lines.push("👑 CHAMPIONS — won all " + s.total + "!");
    } else {
      lines.push("Out in the " + stageOf(state.history.length - 1) + " · " + s.won + "/" + s.total);
    }
    lines.push(resultSquares());
    if (!s.champion && last) {
      lines.push("Fell to " + last.flag + " " + last.name + " " + last.year + " (" + last.home + "–" + last.away + ")");
    }
    if (s.best) lines.push("Best win: beat " + s.best.o.flag + " " + s.best.o.name + " " + s.best.o.year);
    lines.push("", window.location.href);
    return lines.join("\n");
  }

  function toast(msg) {
    var t = el('<div class="toast">' + msg + "</div>");
    document.body.appendChild(t);
    var raf = window.requestAnimationFrame || function (cb) { return setTimeout(cb, 16); };
    raf(function () { t.classList.add("show"); });
    setTimeout(function () {
      t.classList.remove("show");
      setTimeout(function () { t.remove(); }, 300);
    }, 1600);
  }

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast("Result copied!"); }
    catch (e) { toast("Copy failed — select and copy manually"); }
    ta.remove();
  }

  function shareResult() {
    var text = buildShareText();
    if (navigator.share) {
      navigator.share({ title: "All-Time World Cup Simulator", text: text }).catch(function () {});
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { toast("Result copied!"); }).catch(function () { fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }

  // ---------------------------------------------------------------- team review
  function renderTeam() {
    var r = window.Engine.rateSquad(state.squad, state.slots);
    app.innerHTML = "";
    app.appendChild(el(
      '<section class="screen team">' +
        '<div class="draft-context">' + contextLabel() + "</div>" +
        "<h2>Your Starting XI</h2>" +
        '<div class="ratings">' +
          ratingBox("Attack", r.att) +
          ratingBox("Midfield", r.mid) +
          ratingBox("Defence", r.def) +
        "</div>" +
        pitchHTML() +
        '<div class="team-nav">' +
          '<button class="btn ghost" id="redraftBtn">↺ Re-draft</button>' +
          '<button class="btn primary big" id="toGauntletBtn">Enter the Gauntlet →</button>' +
        "</div>" +
      "</section>"
    ));
    document.getElementById("redraftBtn").onclick = function () {
      state.squad = {}; state.slotIndex = 0; renderDraft();
    };
    document.getElementById("toGauntletBtn").onclick = function () {
      state.bracket = state.mode.type === "daily"
        ? buildBracket(window.Rng.fromString(state.mode.value + "|bracket"))
        : buildBracket();
      state.round = 0;
      state.history = [];
      renderGauntlet();
    };
  }

  function ratingBox(label, val) {
    return (
      '<div class="rating-box">' +
        '<div class="rb-val">' + Math.round(val) + "</div>" +
        '<div class="rb-label">' + label + "</div>" +
      "</div>"
    );
  }

  // ---------------------------------------------------------------- gauntlet
  function renderGauntlet() {
    if (!state.bracket) state.bracket = buildBracket();
    var opp = state.bracket[state.round];
    var total = state.bracket.length;
    var me = window.Engine.rateSquad(state.squad, state.slots);
    var s = scaleForMode(state.mode);
    var oppRating = { att: opp.att * s, mid: opp.mid * s, def: opp.def * s };
    var odds = window.Engine.winProbability(me, oppRating);
    var scaleNote = s < 0.99
      ? '<div class="scale-note">⚖️ Opponents tuned to your ' +
          (state.mode.type === "confed" ? "region" : state.mode.type === "nation" ? "nation" : "era") +
          " pool</div>"
      : "";

    app.innerHTML = "";
    app.appendChild(el(
      '<section class="screen gauntlet">' +
        '<div class="round-pill">' + stageOf(state.round) + " · Match " + (state.round + 1) + " / " + total + "</div>" +
        scaleNote +
        '<div class="matchup">' +
          '<div class="side me">' +
            '<div class="side-flag">⭐</div>' +
            '<div class="side-name">' + window.Modes.label(state.mode) + "</div>" +
            '<div class="side-sub">ATT ' + Math.round(me.att) + " · MID " + Math.round(me.mid) + " · DEF " + Math.round(me.def) + "</div>" +
          "</div>" +
          '<div class="vs">VS</div>' +
          '<div class="side opp">' +
            '<div class="side-flag">' + opp.flag + "</div>" +
            '<div class="side-name">' + opp.name + " " + opp.year + "</div>" +
            '<div class="side-sub">' + opp.tag + "</div>" +
          "</div>" +
        "</div>" +
        '<p class="opp-blurb">' + opp.blurb + "</p>" +
        '<div class="odds">Win probability: <strong>' + odds + "%</strong></div>" +
        '<button class="btn primary big" id="kickoffBtn">Kick Off ⚽</button>' +
        progressTrack() +
      "</section>"
    ));
    document.getElementById("kickoffBtn").onclick = function () { playMatch(me, oppRating, opp); };
  }

  function progressTrack() {
    var dots = state.bracket.map(function (o, i) {
      var cls = i < state.round ? "track-dot beat" : (i === state.round ? "track-dot now" : "track-dot");
      // Visual divider between the group stage and the knockout rounds.
      var sep = i === window.GAUNTLET.group ? '<span class="track-sep">▸</span>' : "";
      return sep + '<span class="' + cls + '" title="' + o.name + " " + o.year + " (" + o.tag + ')">' + o.flag + "</span>";
    }).join("");
    return '<div class="track">' + dots + "</div>";
  }

  // ---------------------------------------------------------------- match
  function playMatch(me, oppRating, opp) {
    // Daily uses a per-round seeded rng so a given XI always yields the same
    // result — it's a drafting puzzle, not a luck re-roll.
    var rng = state.mode.type === "daily"
      ? window.Rng.fromString(state.mode.value + "|match|" + state.round)
      : null;
    var res = window.Engine.simulateMatch(me, oppRating, rng);
    state.history[state.round] = {
      name: opp.name, year: opp.year, flag: opp.flag,
      result: res.result, home: res.home, away: res.away,
    };
    var scoreline = res.home + " – " + res.away;
    var pens = res.penalties
      ? '<div class="pens">(' + res.penalties.home + " – " + res.penalties.away + " on penalties)</div>"
      : "";

    app.innerHTML = "";
    app.appendChild(el(
      '<section class="screen result ' + (res.result === "win" ? "won" : "lost") + '">' +
        '<div class="result-tag">' + (res.result === "win" ? "VICTORY" : "DEFEAT") + "</div>" +
        '<div class="scoreboard">' +
          '<div class="sb-team">⭐ You</div>' +
          '<div class="sb-score">' + scoreline + "</div>" +
          '<div class="sb-team">' + opp.flag + " " + opp.name + "</div>" +
        "</div>" +
        pens +
        '<p class="commentary">' + commentary(res, opp) + "</p>" +
        '<div class="result-nav"></div>' +
      "</section>"
    ));

    var nav = app.querySelector(".result-nav");
    if (res.result === "win") {
      if (state.round >= state.bracket.length - 1) {
        nav.appendChild(buttonEl("🏆 See Final Standings →", "primary big", renderSummary));
      } else {
        var nextStage = stageOf(state.round + 1) !== stageOf(state.round)
          ? "Into the Knockouts →" : "Next Opponent →";
        nav.appendChild(buttonEl(nextStage, "primary big", function () {
          state.round++;
          renderGauntlet();
        }));
      }
    } else {
      nav.appendChild(buttonEl("See Final Standings →", "primary big", renderSummary));
    }
  }

  function commentary(res, opp) {
    var gf = res.home, ga = res.away;
    if (res.penalties) {
      return res.result === "win"
        ? "Nerves of steel from the spot! After " + gf + "–" + ga + " couldn't separate them, your legends hold their nerve to knock out " + opp.name + " " + opp.year + "."
        : "Agony from twelve yards. " + opp.name + " " + opp.year + " edge a shootout after a " + gf + "–" + ga + " deadlock.";
    }
    if (res.result === "win") {
      if (gf - ga >= 3) return "A statement performance — " + opp.name + " " + opp.year + " are swept aside in style.";
      if (gf - ga === 1) return "A nervy, hard-fought win. The greats find a way past " + opp.name + " " + opp.year + ".";
      return "Job done. Your legends see off " + opp.name + " " + opp.year + ".";
    }
    if (ga - gf >= 3) return opp.name + " " + opp.year + " were simply irresistible. The dream ends here.";
    return "So close. " + opp.name + " " + opp.year + " find the decisive goal and the gauntlet claims another challenger.";
  }

  // ---------------------------------------------------------------- final standings
  function xiNames() {
    return state.slots.map(function (s) { return state.squad[s.key]; }).filter(Boolean);
  }

  function matchRows() {
    return state.history.map(function (h, i) {
      var opp = state.bracket[i];
      var stage = i < window.GAUNTLET.group ? "G" : "K";
      var win = h.result === "win";
      return (
        '<div class="match-row ' + (win ? "w" : "l") + '">' +
          '<span class="mr-stage" title="' + (stage === "G" ? "Group Stage" : "Knockout") + '">' + stage + "</span>" +
          '<span class="mr-flag">' + opp.flag + "</span>" +
          '<span class="mr-name">' + opp.name + " " + opp.year + "</span>" +
          '<span class="mr-score">' + h.home + "–" + h.away + "</span>" +
          '<span class="mr-mark">' + (win ? "✓" : "✗") + "</span>" +
        "</div>"
      );
    }).join("");
  }

  function renderSummary() {
    var s = runStats();
    if (state.mode.type === "daily") {
      saveDaily(state.mode.value, { won: s.won, total: s.total, champion: s.champion });
    }
    var headline = s.champion
      ? "👑 CHAMPIONS OF HISTORY"
      : "Out in the " + stageOf(state.history.length - 1);
    var sub = s.champion
      ? "Your " + window.Modes.label(state.mode) + " beat every side drawn against them. Immortal."
      : "Your " + window.Modes.label(state.mode) + " reached match " + state.history.length + " of " + s.total + ".";

    var xi = xiNames();
    var chips = xi.map(function (p) {
      return '<span class="xi-chip">' + p.flag + " " + p.name + "</span>";
    }).join("");

    var stats =
      statBox(s.won + "/" + s.total, "Won") +
      statBox(s.gf + "–" + s.ga, "Goals") +
      (s.best ? statBox(s.best.o.flag + " " + s.best.o.year, "Best Win") : statBox("–", "Best Win"));

    app.innerHTML = "";
    app.appendChild(el(
      '<section class="screen summary ' + (s.champion ? "champ" : "out") + '">' +
        (s.champion ? '<div class="trophy big-trophy">🏆</div>' : "") +
        '<div class="summary-result">' + headline + "</div>" +
        '<p class="summary-sub">' + sub + "</p>" +
        '<div class="share-track">' + resultSquares() + "</div>" +
        '<div class="summary-stats">' + stats + "</div>" +
        '<div class="match-list">' + matchRows() + "</div>" +
        '<div class="summary-xi"><div class="sxi-label">' + window.Modes.label(state.mode) + "</div>" + chips + "</div>" +
        '<div class="team-nav">' +
          '<button class="btn ghost" id="copyBtn">📋 Copy</button>' +
          '<button class="btn ghost" id="imgBtn">📸 Save Image</button>' +
          '<button class="btn primary big" id="againBtn">Play Again</button>' +
        "</div>" +
        '<div class="share-hint">Screenshot this or save the image to share your run!</div>' +
      "</section>"
    ));
    document.getElementById("copyBtn").onclick = shareResult;
    document.getElementById("imgBtn").onclick = saveImage;
    document.getElementById("againBtn").onclick = renderStart;
  }

  function statBox(val, label) {
    return '<div class="stat-box"><div class="sb-val">' + val + '</div><div class="sb-label">' + label + "</div></div>";
  }

  // ---------------------------------------------------------------- shareable image card
  // Rendered with plain canvas shapes/text (no emoji) so it looks identical
  // on every device, then offered via the native share sheet or a download.
  function drawCard() {
    var W = 1080, H = 1350;
    var c = document.createElement("canvas");
    c.width = W; c.height = H;
    var x = c.getContext("2d");
    var s = runStats();

    // background
    var bg = x.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, "#0f5934");
    bg.addColorStop(1, "#08251a");
    x.fillStyle = bg; x.fillRect(0, 0, W, H);
    x.strokeStyle = "rgba(245,197,66,0.55)"; x.lineWidth = 10;
    x.strokeRect(20, 20, W - 40, H - 40);

    var cx = W / 2;
    x.textAlign = "center";

    x.fillStyle = "#f5c542";
    x.font = "700 40px Arial";
    x.fillText("ALL-TIME WORLD CUP", cx, 110);

    x.fillStyle = "#eaf3ee";
    x.font = "800 64px Arial";
    x.fillText(window.Modes.label(state.mode), cx, 185);

    // result headline
    x.fillStyle = s.champion ? "#f5c542" : "#e0533d";
    x.font = "800 56px Arial";
    var head = s.champion ? "CHAMPIONS" : "OUT — " + stageOf(state.history.length - 1).toUpperCase();
    x.fillText(head, cx, 270);
    x.fillStyle = "#9fb8ac";
    x.font = "600 34px Arial";
    x.fillText("Record: " + s.won + " / " + s.total + "    Goals: " + s.gf + "–" + s.ga, cx, 320);

    // result squares
    var n = state.bracket.length;
    var sq = 58, gap = 12, totalW = n * sq + (n - 1) * gap;
    var sx = cx - totalW / 2, sy = 360;
    for (var i = 0; i < n; i++) {
      var done = i < state.history.length;
      x.fillStyle = !done ? "rgba(255,255,255,0.12)"
        : (state.history[i].result === "win" ? "#2ec16b" : "#e0533d");
      roundRect(x, sx + i * (sq + gap), sy, sq, sq, 10); x.fill();
      if (i === window.GAUNTLET.group - 1 && i < n - 1) {
        // small gold tick marking the group→knockout boundary
        x.fillStyle = "#f5c542";
        x.fillRect(sx + i * (sq + gap) + sq + gap / 2 - 2, sy - 8, 4, sq + 16);
      }
    }

    // match list
    var ly = 500, lh = 64;
    x.textAlign = "left";
    state.history.forEach(function (h, idx) {
      var o = state.bracket[idx];
      var y = ly + idx * lh;
      var win = h.result === "win";
      x.fillStyle = "rgba(255,255,255,0.05)";
      roundRect(x, 90, y - 38, W - 180, 52, 10); x.fill();
      x.fillStyle = win ? "#2ec16b" : "#e0533d";
      roundRect(x, 102, y - 30, 36, 36, 8); x.fill();
      x.fillStyle = "#08251a"; x.font = "800 26px Arial"; x.textAlign = "center";
      x.fillText(win ? "✓" : "✗", 120, y - 3);
      x.textAlign = "left";
      x.fillStyle = "#eaf3ee"; x.font = "600 30px Arial";
      x.fillText((idx < window.GAUNTLET.group ? "Group · " : "KO · ") + o.name + " " + o.year, 158, y - 5);
      x.textAlign = "right";
      x.fillStyle = "#f5c542"; x.font = "800 32px Arial";
      x.fillText(h.home + "–" + h.away, W - 110, y - 4);
      x.textAlign = "left";
    });

    // XI footer
    var xi = xiNames();
    var fy = ly + state.history.length * lh + 36;
    x.textAlign = "center";
    x.fillStyle = "#9fb8ac"; x.font = "700 26px Arial";
    x.fillText("YOUR XI", cx, fy);
    x.fillStyle = "#eaf3ee"; x.font = "500 27px Arial";
    var names = xi.map(function (p) { return p.name; });
    wrapCentered(x, names.join("  •  "), cx, fy + 40, W - 160, 36);

    x.fillStyle = "rgba(245,197,66,0.8)"; x.font = "700 24px Arial";
    x.fillText("Play it yourself — All-Time World Cup Simulator", cx, H - 50);
    return c;
  }

  function roundRect(x, X, Y, w, h, r) {
    x.beginPath();
    x.moveTo(X + r, Y);
    x.arcTo(X + w, Y, X + w, Y + h, r);
    x.arcTo(X + w, Y + h, X, Y + h, r);
    x.arcTo(X, Y + h, X, Y, r);
    x.arcTo(X, Y, X + w, Y, r);
    x.closePath();
  }

  function wrapCentered(x, text, cx, y, maxW, lh) {
    var words = text.split(" "), line = "", yy = y;
    for (var i = 0; i < words.length; i++) {
      var test = line + words[i] + " ";
      if (x.measureText(test).width > maxW && line) {
        x.fillText(line.trim(), cx, yy); line = words[i] + " "; yy += lh;
      } else line = test;
    }
    x.fillText(line.trim(), cx, yy);
  }

  function saveImage() {
    var canvas;
    try { canvas = drawCard(); }
    catch (e) { toast("Couldn't build image"); return; }
    canvas.toBlob(function (blob) {
      if (!blob) { toast("Couldn't build image"); return; }
      var fname = "world-cup-" + window.Modes.label(state.mode).replace(/\s+/g, "-").toLowerCase() + ".png";
      var file = null;
      try { file = new File([blob], fname, { type: "image/png" }); } catch (e) {}
      if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], text: buildShareText() }).catch(function () { downloadBlob(blob, fname); });
      } else {
        downloadBlob(blob, fname);
      }
    }, "image/png");
  }

  function downloadBlob(blob, fname) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    toast("Image saved!");
  }

  // ---------------------------------------------------------------- boot
  renderStart();
})();

</script>
</body>
</html>
