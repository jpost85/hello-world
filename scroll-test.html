<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scroll layer test</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; overflow:hidden; overscroll-behavior:none;
               font-family: system-ui, sans-serif; }
  /* Mirrors the game: #app pinned, #stage has the sky gradient, a fixed sky
     layer (z0) sits behind an overflow:auto scroller (z1). */
  #app   { position: fixed; inset:0; overflow:hidden; }
  #stage { position:absolute; inset:0; overflow:hidden;
           background: linear-gradient(#9ecbff, #dff0ff); }

  /* THE FIXED CELESTIAL LAYER — should never move when you scroll */
  #sky { position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden;
         transform: translateZ(0); will-change: transform; }
  #sun  { position:absolute; left:50%; top:70px; width:60px; height:60px; margin-left:-30px;
          border-radius:50%; background:radial-gradient(circle at 38% 38%,#fff6c8,#ffd24a 60%,#ffb020);
          box-shadow:0 0 30px 8px rgba(255,200,60,.5); }
  .star { position:absolute; width:4px; height:4px; border-radius:50%; background:#fff;
          box-shadow:0 0 4px 1px #fff; }
  #label { position:absolute; left:0; right:0; top:140px; text-align:center; z-index:0;
           font-weight:700; color:#1a3; text-shadow:0 1px 2px #fff; }

  /* THE SCROLLER — its tall content scrolls; the sky behind must stay put */
  #scroller { position:absolute; top:0; left:0; right:0; bottom:0; z-index:1;
              overflow:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  #world { position:relative; width:100%; height:3000px;
           background: repeating-linear-gradient(
             to bottom, rgba(60,80,120,.0) 0 78px, rgba(40,60,100,.85) 78px 80px); }
  .floor { position:absolute; left:8px; color:#fff; font:600 13px system-ui; }
</style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="sky">
        <div id="sun"></div>
        <div id="label">⬆ SUN + ✦ stars should stay HERE while you scroll ⬆</div>
      </div>
      <div id="scroller">
        <div id="world"></div>
      </div>
    </div>
  </div>
<script>
  // scatter some fixed stars in the sky layer
  var sky = document.getElementById('sky');
  for (var i=0;i<40;i++){
    var s=document.createElement('div'); s.className='star';
    s.style.left=(Math.random()*100)+'%'; s.style.top=(Math.random()*40+5)+'%';
    sky.appendChild(s);
  }
  // label the scrolling floors so movement is obvious
  var w=document.getElementById('world');
  for (var f=0; f<38; f++){
    var d=document.createElement('div'); d.className='floor';
    d.style.top=(f*80+4)+'px'; d.textContent='Floor '+(38-f)+' — scroll me';
    w.appendChild(d);
  }
  document.getElementById('scroller').scrollTop = 1400; // start mid-way
</script>
</body>
</html>
