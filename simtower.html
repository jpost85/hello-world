<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroTower — a tiny Sim Tower riff</title>
<style>
  :root {
    --sky-top: #6db3e8;
    --sky-bot: #cfe9fb;
    --panel: #1f2933;
    --panel-2: #2b3947;
    --accent: #ffcf4d;
    --good: #4ade80;
    --bad: #f87171;
    --text: #e7eef5;
    --muted: #9fb1c1;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: #0e1419; color: var(--text);
    overflow: hidden;
  }
  #app { position: relative; height: 100vh; width: 100vw; overflow: hidden; }

  /* Sidebar — slides in/out as a drawer */
  #sidebar {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 250px; z-index: 30;
    background: var(--panel);
    border-right: 2px solid #000;
    display: flex; flex-direction: column;
    padding: 12px; gap: 10px;
    overflow-y: auto;
    transform: translateX(0);
    transition: transform .25s ease;
  }
  #app.nav-closed #sidebar { transform: translateX(-100%); }
  #sidebar h1 {
    font-size: 20px; margin: 0;
    letter-spacing: 1px;
    color: var(--accent);
    text-shadow: 1px 1px 0 #000;
  }
  #sidebar h1 small { display:block; font-size: 11px; color: var(--muted); letter-spacing:0; }

  .stats { display: grid; grid-template-columns: 1fr auto; gap: 4px 8px; font-size: 13px; }
  .stats .k { color: var(--muted); }
  .stats .v { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }

  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 6px 0 2px; }

  .tools { display: flex; flex-direction: column; gap: 6px; }
  .tool {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    padding: 7px 9px; cursor: pointer; user-select: none;
    transition: transform .05s, background .1s;
  }
  .tool:hover { background: #36495b; }
  .tool:active { transform: translateY(1px); }
  .tool.selected { outline: 2px solid var(--accent); background: #36495b; }
  .tool .swatch { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #000; flex: 0 0 18px; }
  .tool .label { flex: 1; font-size: 13px; font-weight: 600; }
  .tool .cost { font-size: 11px; color: var(--muted); }
  .tool-desc {
    min-height: 28px; font-size: 11px; line-height: 1.35; color: var(--text);
    background: #161d24; border: 1px solid #000; border-radius: 6px; padding: 6px 8px;
  }
  .tool-group { display: flex; flex-direction: column; }
  .group-head {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); padding: 5px 2px 3px;
  }
  .group-head:hover { color: var(--text); }
  .group-head .chev { display: inline-block; font-size: 9px; margin-right: 5px; transition: transform .15s; }
  .tool-group.collapsed .group-head .chev { transform: rotate(-90deg); }
  .group-head .count { font-weight: 700; opacity: .6; }
  .group-body { display: flex; flex-direction: column; gap: 6px; }
  .tool-group.collapsed .group-body { display: none; }

  .controls { display:flex; gap:6px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 60px;
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    color: var(--text); padding: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer;
  }
  .btn:hover { background: #36495b; }
  .btn.active { background: var(--accent); color: #1a1a1a; }

  #log {
    margin-top: auto; font-size: 11px; color: var(--muted);
    background: #161d24; border: 1px solid #000; border-radius: 6px;
    padding: 6px; height: 110px; overflow-y: auto; line-height: 1.5;
  }
  #log .entry { margin-bottom: 2px; }
  #log .entry.good { color: var(--good); }
  #log .entry.bad { color: var(--bad); }

  /* Tower view */
  #stage {
    position: absolute; top: 0; right: 0; bottom: 0; left: 250px;
    overflow: hidden;
    background: linear-gradient(var(--sky-top), var(--sky-bot));
    transition: left .25s ease;
  }
  #app.nav-closed #stage { left: 0; }
  #scroller {
    position: absolute; top: 42px; left: 0; right: 0; bottom: 0; z-index: 1;
    overflow: auto; -webkit-overflow-scrolling: touch;
  }
  #world { position: relative; }

  /* Top HUD — always visible, holds the drawer toggle + key stats */
  #hud {
    position: absolute; top: 0; left: 0; right: 0; height: 42px; z-index: 15;
    display: flex; align-items: center; gap: 10px; padding: 0 10px;
    background: rgba(20,28,36,.92); border-bottom: 2px solid #000;
    color: var(--text); font-size: 13px;
    -webkit-user-select: none; user-select: none;
  }
  #hud .hud-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  #hud .hud-item b { color: var(--accent); }
  #hud .spacer { flex: 1; }
  #menuToggle {
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    color: var(--text); font-size: 16px; line-height: 1; cursor: pointer;
    width: 34px; height: 30px; flex: 0 0 auto;
  }
  #menuToggle:active { transform: translateY(1px); }
  #soundToggle {
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    color: var(--text); font-size: 14px; line-height: 1; cursor: pointer;
    width: 34px; height: 30px; flex: 0 0 auto; margin-left: 4px;
  }
  #soundToggle:active { transform: translateY(1px); }

  /* Mobile: drawer overlays the tower instead of shrinking it */
  @media (max-width: 700px) {
    #stage { left: 0 !important; }
    #sidebar { width: 84%; max-width: 300px; box-shadow: 6px 0 20px rgba(0,0,0,.55); }
    #hud .hud-item.time { display: none; }
  }
  @media (max-width: 420px) {
    #hud .hud-item.stars { display: none; }
  }

  /* Drawer header + close button (mobile) */
  .side-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  #closeNav {
    display: none; flex: 0 0 auto;
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    color: var(--text); width: 30px; height: 30px; font-size: 15px; line-height: 1; cursor: pointer;
  }
  #closeNav:active { transform: translateY(1px); }
  @media (max-width: 700px) { #closeNav { display: block; } }

  /* Tap-anywhere backdrop to dismiss the drawer on mobile */
  #backdrop {
    position: absolute; inset: 0; z-index: 25;
    background: rgba(0,0,0,.45); opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
  }
  @media (max-width: 700px) {
    #app:not(.nav-closed) #backdrop { opacity: 1; pointer-events: auto; }
  }

  /* Night-time lit windows */
  .unit.lit::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 38%, rgba(255,214,120,.45), transparent 72%);
  }

  /* Tap-to-build confirm bar (touch devices) */
  #placeBar {
    position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 18;
    display: none; align-items: center; gap: 8px;
    background: rgba(20,28,36,.96); border: 2px solid #000; border-radius: 12px;
    padding: 8px 10px; font-size: 13px; box-shadow: 0 6px 18px rgba(0,0,0,.45);
    max-width: 92%;
  }
  #placeBar.show { display: flex; }
  #placeBar #placeInfo { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #placeBar .btn { flex: 0 0 auto; min-width: auto; padding: 8px 12px; }
  #placeBuild { background: var(--good); color: #10241a; }
  #placeBuild:disabled { opacity: .45; }

  .floor-row { position: absolute; left: 0; display: flex; }
  .cell {
    position: absolute; box-sizing: border-box;
    border-right: 1px solid rgba(0,0,0,.08);
    border-bottom: 1px solid rgba(0,0,0,.08);
  }
  .ground { background: #5a8a3c; }
  .empty-buildable { background: rgba(255,255,255,.03); }
  .empty-buildable:hover { background: rgba(255,207,77,.25); cursor: pointer; }

  .unit {
    position: absolute; box-sizing: border-box;
    border: 1px solid rgba(0,0,0,.32);
    overflow: hidden; cursor: pointer;
    background: var(--wall, #c9d3da);
  }
  .u-face { position: absolute; inset: 0; }
  .u-extra { position: absolute; left: 0; right: 0; top: 0; pointer-events: none; }
  .unit .occ { position:absolute; bottom:0; left:0; right:0; height:3px; z-index:4; }
  .u-tag {
    position:absolute; top:1px; left:2px; z-index:4;
    font-size:8px; font-weight:700; letter-spacing:.5px;
    color: rgba(0,0,0,.5); pointer-events:none;
  }
  .unit-shop .u-tag, .unit-restaurant .u-tag, .unit-cinema .u-tag {
    top:auto; bottom:4px; color: rgba(255,255,255,.85); text-shadow:0 1px 1px rgba(0,0,0,.6);
  }
  .u-vac {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) rotate(-6deg);
    z-index:4; display:none; font-size:7px; font-weight:800; letter-spacing:.5px;
    background:#ffe9a8; color:#7a5a12; border:1px solid #b9912f; border-radius:2px;
    padding:1px 3px; box-shadow:0 1px 2px rgba(0,0,0,.3); white-space:nowrap;
  }
  .unit.vacant .u-vac { display:block; }

  .person {
    position: absolute; width: 5px; height: 9px; border-radius: 2px 2px 1px 1px;
    bottom: 2px; transition: left .25s linear; z-index: 2;
    background: #aab7c4; box-shadow: 0 1px 0 rgba(0,0,0,.3);
    animation: bob .5s infinite alternate ease-in-out;
  }
  .person::before {
    content:""; position:absolute; top:-3px; left:0; width:5px; height:3px;
    border-radius:50%; background:inherit; filter:brightness(1.25);
  }
  .person.role-work    { background:#5b8def; }
  .person.role-home    { background:#56c271; }
  .person.role-hotel   { background:#d9b36b; }
  .person.role-visitor { background:#b4bfca; }
  @keyframes bob { from{ transform:translateY(0);} to{ transform:translateY(-1.5px);} }

  #ghost {
    position: absolute; pointer-events: none; border: 2px dashed #fff;
    background: rgba(255,207,77,.3); display: none; z-index: 5;
  }
  #ghost.invalid { background: rgba(248,113,113,.35); border-color: #f87171; }

  #toast {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.8); color: #fff; padding: 8px 16px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 20;
  }
  #toast.show { opacity: 1; }

  .hint { font-size: 11px; color: var(--muted); line-height: 1.4; }
  kbd { background:#000; border-radius:3px; padding:0 4px; font-size:10px; }

  /* ---------- Unit interiors ---------- */
  /* Window facade shared by residential / office / hotel */
  .win .u-face {
    background:
      linear-gradient(180deg, var(--wall) 0 5px, transparent 5px calc(100% - 6px), var(--wall) calc(100% - 6px) 100%),
      repeating-linear-gradient(90deg, var(--frame, #5a6b7a) 0 2px, var(--glass) 2px 11px);
  }
  .win.lit { --glass: #ffe7a6; }            /* warm light spills from windows at night */

  .unit-office    { --wall:#7f93a6; --glass:#bfe0f5; --frame:#52677d; }
  .unit-apartment { --wall:#caa06a; --glass:#ffe4b3; --frame:#9c7642; }
  .unit-condo     { --wall:#c98f53; --glass:#ffd9a0; --frame:#8f5f2c; }
  .unit-hotel     { --wall:#4fae9f; --glass:#cdeee8; --frame:#2f7d72; }
  /* a thin balcony rail across condos */
  .unit-condo .u-extra {
    top:auto; bottom:5px; height:4px;
    background: repeating-linear-gradient(90deg, #6b4a22 0 1px, transparent 1px 5px);
    border-top:1px solid #6b4a22;
  }

  /* Storefronts */
  .unit-shop .u-face {
    background:
      radial-gradient(circle at 22% 54%, #7b54a6 0 2px, transparent 3px),   /* product */
      radial-gradient(circle at 50% 54%, #c98a5e 0 2px, transparent 3px),   /* product */
      radial-gradient(circle at 78% 54%, #5b8def 0 2px, transparent 3px),   /* product */
      linear-gradient(180deg, transparent 0 62%, #c3a9e4 62% calc(62% + 2px), transparent calc(62% + 2px)), /* shelf */
      linear-gradient(180deg, transparent 0 6px, #ead9fb 6px calc(100% - 4px), #5a3f86 calc(100% - 4px));   /* glass + base */
  }
  .unit-shop .u-extra {
    height:6px; border-bottom:1px solid rgba(0,0,0,.3);
    background: repeating-linear-gradient(90deg, #efe0ff 0 7px, #7e5fb0 7px 14px);
  }
  .unit-restaurant .u-face {
    background:
      linear-gradient(#a9714a,#a9714a) 18% 72% / 13px 3px no-repeat,   /* table */
      linear-gradient(#a9714a,#a9714a) 64% 72% / 13px 3px no-repeat,   /* table */
      radial-gradient(circle at 13% 82%, #7a4f33 0 1.6px, transparent 2.2px),  /* chair */
      radial-gradient(circle at 31% 82%, #7a4f33 0 1.6px, transparent 2.2px),  /* chair */
      radial-gradient(circle at 59% 82%, #7a4f33 0 1.6px, transparent 2.2px),  /* chair */
      radial-gradient(circle at 77% 82%, #7a4f33 0 1.6px, transparent 2.2px),  /* chair */
      linear-gradient(180deg, transparent 0 6px, #f6e7d6 6px calc(100% - 4px), #8a5a44 calc(100% - 4px)); /* glass + floor */
  }
  .unit-restaurant .u-extra {
    height:6px; border-bottom:1px solid rgba(0,0,0,.3);
    background: repeating-linear-gradient(90deg, #ef6f6f 0 8px, #f7dada 8px 16px);
  }
  .unit-cinema .u-face {
    background: linear-gradient(180deg, #2a1f3d 0 8px, #5a3f86 8px calc(100% - 4px), #1f1630 calc(100% - 4px));
  }
  .unit-cinema .u-extra {
    height:8px;
    background: radial-gradient(circle at 5px 4px, #ffe27a 0 1.6px, transparent 2.2px) repeat-x;
    background-size:10px 8px;
  }
  .unit-cinema.lit .u-extra { filter: drop-shadow(0 0 2px #ffd34d); }

  /* Outdoor spaces — open to the sky (no walls), so the backdrop shows through */
  .unit-terrace, .unit-garden { --wall: transparent; border: none; }
  .unit-terrace .u-face {
    background:
      radial-gradient(circle at 22% 56%, #ef8f6f 0 7px, transparent 8px),   /* parasol */
      radial-gradient(circle at 68% 56%, #6fb0ef 0 7px, transparent 8px),   /* parasol */
      radial-gradient(circle at 90% 74%, #4e9d54 0 3px, transparent 4px),   /* planter */
      linear-gradient(180deg, transparent 0 calc(100% - 12px), #8a949e calc(100% - 12px) calc(100% - 11px), transparent calc(100% - 11px)), /* rail */
      linear-gradient(180deg, transparent 0 calc(100% - 10px), #d4b884 calc(100% - 10px) calc(100% - 3px), #a8854f calc(100% - 3px)); /* deck */
  }
  .unit-garden .u-face {
    background:
      radial-gradient(circle at 22% 52%, #3f8f46 0 8px, transparent 9px),   /* tree */
      radial-gradient(circle at 52% 60%, #5bb061 0 6px, transparent 7px),   /* shrub */
      radial-gradient(circle at 80% 54%, #3f8f46 0 8px, transparent 9px),   /* tree */
      linear-gradient(180deg, transparent 0 calc(100% - 12px), #6cae54 calc(100% - 12px) calc(100% - 3px), #4f8b3d calc(100% - 3px)); /* lawn */
  }
  .unit-terrace .u-extra {         /* a bench and a shrub on the deck */
    left:0; right:0; top:auto; bottom:4px; height:7px;
    background:
      radial-gradient(circle at 44% 48%, #4e9d54 0 3px, transparent 4px),
      linear-gradient(90deg, transparent 60%, #7a5a36 60% 84%, transparent 84%);
  }
  .unit-terrace .u-tag, .unit-garden .u-tag { color: rgba(0,0,0,.55); }

  /* Pool — open water with a deck lip and surface ripples */
  .unit-pool { --wall: transparent; border: none; }
  .unit-pool .u-face {
    background: linear-gradient(180deg, transparent 0 calc(100% - 14px), #4cb6e0 calc(100% - 14px) calc(100% - 4px), #b9c7cf calc(100% - 4px));
  }
  .unit-pool .u-extra {
    top:auto; bottom:4px; height:10px;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,.35) 0 2px, transparent 2px 9px);
  }
  .unit-pool .u-tag { color: rgba(0,0,0,.55); }

  /* Playground — grass with colourful play equipment */
  .unit-playground { --wall: transparent; border: none; }
  .unit-playground .u-face {
    background:
      radial-gradient(circle at 28% 56%, #ef6f6f 0 5px, transparent 6px),
      radial-gradient(circle at 78% 60%, #f3c54e 0 4px, transparent 5px),
      linear-gradient(180deg, transparent 0 calc(100% - 9px), #8ec25a calc(100% - 9px));
  }
  .unit-playground .u-extra {
    top:auto; bottom:9px; height:9px;
    background: linear-gradient(90deg, transparent 46%, #5b8def 46% 49%, transparent 49%);
  }
  .unit-playground .u-tag { color: rgba(0,0,0,.55); }

  /* Rooftop bar — bar counter, warm glow, bottles */
  .unit-skybar { --wall: transparent; border: none; }
  .unit-skybar .u-face {
    background:
      radial-gradient(circle at 50% 34%, rgba(255,210,120,.45) 0 9px, transparent 10px),
      linear-gradient(180deg, transparent 0 calc(100% - 11px), #6b4a2e calc(100% - 11px) calc(100% - 4px), #38260f calc(100% - 4px));
  }
  .unit-skybar .u-extra {
    top:auto; bottom:11px; height:6px;
    background: repeating-linear-gradient(90deg, #ffd98a 0 2px, transparent 2px 10px);
  }

  /* Indoor amenities — enclosed rooms */
  .unit-gym .u-face {
    background:
      radial-gradient(circle at 26% 62%, #3a3a3a 0 2px, transparent 3px),
      radial-gradient(circle at 33% 62%, #3a3a3a 0 2px, transparent 3px),
      linear-gradient(180deg, #9fb0a6 0 4px, #d7e6df 4px calc(100% - 4px), #6f8076 calc(100% - 4px));
  }
  .unit-gym .u-extra { top:auto; bottom:5px; height:7px; background: linear-gradient(90deg, transparent 56%, #5b8def 56% 78%, transparent 78%); }
  .unit-spa .u-face {
    background:
      radial-gradient(circle at 42% 62%, #8fd3ea 0 5px, transparent 6px),
      linear-gradient(180deg, #86b8b0 0 4px, #cfeae6 4px calc(100% - 4px), #5a857f calc(100% - 4px));
  }
  .unit-conference .u-face {
    background:
      radial-gradient(circle at 30% 60%, #5b4630 0 2px, transparent 2.8px),  /* chair */
      radial-gradient(circle at 50% 58%, #5b4630 0 2px, transparent 2.8px),  /* chair */
      radial-gradient(circle at 70% 60%, #5b4630 0 2px, transparent 2.8px),  /* chair */
      linear-gradient(180deg, #b0a48c 0 4px, #ece3d2 4px calc(100% - 4px), #7a6f59 calc(100% - 4px));
  }
  .unit-conference .u-extra {
    top:auto; bottom:7px; left:20%; right:20%; height:5px;
    background:#6b4a2e; border-radius:2px; box-shadow:0 3px 0 -1px #4a3420;
  }

  /* Lobby — columns, ceiling trim, marble floor */
  .unit-lobby { --wall:#e7d8ad; }
  .unit-lobby .u-face {
    background:
      linear-gradient(180deg, #cdb988 0 4px, transparent 4px),
      linear-gradient(180deg, transparent 0 calc(100% - 6px), #b9a36a calc(100% - 6px)),
      repeating-linear-gradient(90deg, #ddcc97 0 13px, #c6b079 13px 16px);
  }

  /* Floor slab */
  .unit-floor { --wall:#b8bfc7; }
  .unit-floor .u-face { background: linear-gradient(180deg, #c8cfd6, #a9b1b9); }

  /* Stairs — an actual ascending staircase */
  .unit-stair { --wall:#8d99ae; }
  .unit-stair .u-face {
    background:
      linear-gradient(#e6ebf0,#e6ebf0) 2px 29px / 8px 3px no-repeat,
      linear-gradient(#e6ebf0,#e6ebf0) 7px 24px / 8px 3px no-repeat,
      linear-gradient(#e6ebf0,#e6ebf0) 12px 19px / 8px 3px no-repeat,
      linear-gradient(#e6ebf0,#e6ebf0) 17px 14px / 8px 3px no-repeat,
      linear-gradient(#e6ebf0,#e6ebf0) 22px 9px / 8px 3px no-repeat,
      linear-gradient(#e6ebf0,#e6ebf0) 27px 4px / 8px 3px no-repeat,
      linear-gradient(180deg, #98a4b3, #7c8898);
  }

  /* Small props — subtle furnishings */
  .unit-lobby .u-extra {           /* reception counter on the marble floor */
    left:0; right:0; top:auto; bottom:6px; height:8px;
    background: linear-gradient(180deg, #c79a5e 0 2px, #8a6a3e 2px);
    border-top:1px solid #e2c389;
  }
  .unit-office .u-extra {          /* a row of desks */
    left:0; right:0; top:auto; bottom:5px; height:4px;
    background: repeating-linear-gradient(90deg, #5d6b7a 0 6px, transparent 6px 13px);
  }
  .unit-apartment .u-extra {       /* a sofa / bed */
    left:10%; right:10%; top:auto; bottom:5px; height:5px;
    background: linear-gradient(180deg, #cf9468 0 2px, #9c6a3e 2px);
    border-radius:2px 2px 0 0;
  }

  /* Elevator shaft (closed doors) + moving car */
  .unit-elevator { --wall:#2b3440; }
  .unit-elevator .u-face {
    background: linear-gradient(90deg,
      #141a22 0 3px,
      #454f5e 3px calc(50% - 1px),
      #20272f calc(50% - 1px) calc(50% + 1px),
      #454f5e calc(50% + 1px) calc(100% - 3px),
      #141a22 calc(100% - 3px));
  }
  .elev-car {
    position:absolute; z-index:3; border-radius:1px;
    background: linear-gradient(180deg, #f9e7b0 0 2px, #f0d585 2px calc(100% - 3px), #c89a46 calc(100% - 3px));
    border:1px solid #6b5418; box-shadow: inset 0 0 3px rgba(0,0,0,.45);
    display:flex; align-items:flex-end; justify-content:center; gap:1px; padding-bottom:1px;
  }
  .elev-car i { width:2px; height:4px; background:#33414f; border-radius:1px; display:inline-block; }

  /* ---------- Sky backdrop ---------- */
  #sky { position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  #sun, #moon { position:absolute; width:46px; height:46px; border-radius:50%; transition:opacity .8s; }
  #sun  { background:radial-gradient(circle at 38% 38%, #fff6c8, #ffd24a 60%, #ffb020); box-shadow:0 0 30px 8px rgba(255,200,60,.5); }
  #moon { background:radial-gradient(circle at 40% 38%, #fdfdff, #d4dcec 60%, #aab4c8); box-shadow:0 0 18px 4px rgba(200,215,255,.35); }
  #stars { position:absolute; inset:0; transition:opacity 1s; }
  .star { position:absolute; width:2px; height:2px; border-radius:50%; background:#fff; opacity:.85; animation:twinkle 3s infinite ease-in-out; }
  @keyframes twinkle { 0%,100%{ opacity:.2; } 50%{ opacity:.9; } }
  #clouds { position:absolute; inset:0; transition:opacity 1s; }
  .cloud {
    position:absolute; background:rgba(255,255,255,.82); border-radius:50px;
    filter: blur(1px); box-shadow:0 6px 14px rgba(255,255,255,.5);
  }
  .cloud::before, .cloud::after { content:""; position:absolute; background:inherit; border-radius:50%; }
  .cloud::before { width:55%; height:160%; top:-55%; left:12%; }
  .cloud::after  { width:42%; height:150%; top:-45%; right:14%; }
  .cloud.c1 { width:120px; height:26px; top:14%; animation:drift 70s linear infinite; }
  .cloud.c2 { width:84px;  height:18px; top:30%; animation:drift 95s linear infinite; animation-delay:-30s; }
  .cloud.c3 { width:150px; height:30px; top:8%;  animation:drift 120s linear infinite; animation-delay:-60s; }
  @keyframes drift { from{ transform:translateX(-180px); } to{ transform:translateX(110vw); } }
  #skyline {
    position:absolute; left:0; right:0; bottom:0; height:70px; opacity:.4;
    background:
      linear-gradient(180deg, transparent, rgba(20,30,45,.5)),
      repeating-linear-gradient(90deg, #20303f 0 18px, #1a2735 18px 22px, #243748 22px 46px, #1a2735 46px 50px);
    -webkit-mask-image: linear-gradient(180deg, transparent, #000 40%);
            mask-image: linear-gradient(180deg, transparent, #000 40%);
  }

  /* ---------- Juice / effects ---------- */
  .float-text {
    position:absolute; z-index:19; font-weight:800; font-size:14px; color:var(--good);
    text-shadow:0 1px 3px rgba(0,0,0,.7); pointer-events:none; transform:translateX(-50%);
    animation: floatup 1.3s ease-out forwards;
  }
  .float-text.bad { color:var(--bad); }
  @keyframes floatup { from{ opacity:1; } to{ transform:translate(-50%,-42px); opacity:0; } }

  .banner {
    position:absolute; left:50%; top:38%; transform:translate(-50%,-50%);
    z-index:21; pointer-events:none; white-space:nowrap;
    font-size:26px; font-weight:900; letter-spacing:1px; color:#fff;
    text-shadow:0 2px 0 #b8860b, 0 0 18px rgba(255,210,80,.9);
    animation: pop 2.6s ease-out forwards;
  }
  @keyframes pop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(.4); }
    15%  { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
    30%  { transform:translate(-50%,-50%) scale(1); }
    80%  { opacity:1; }
    100% { opacity:0; transform:translate(-50%,-130%) scale(1); }
  }

  .smoke {
    position:absolute; width:10px; height:10px; border-radius:50%; z-index:6;
    background:radial-gradient(circle, rgba(80,80,80,.8), rgba(80,80,80,0) 70%);
    pointer-events:none; animation: rise 2s ease-out forwards;
  }
  @keyframes rise {
    from { opacity:.8; transform:translateY(0) scale(.6); }
    to   { opacity:0;  transform:translateY(-46px) scale(2.2); }
  }

  #hud .hud-item b.bump { animation: cashbump .5s ease; }
  @keyframes cashbump { 0%{ transform:scale(1);} 35%{ transform:scale(1.25); color:#fff;} 100%{ transform:scale(1);} }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="side-head">
      <h1>MicroTower <small>a tiny Sim Tower riff</small></h1>
      <button id="closeNav" title="Hide menu">✕</button>
    </div>

    <div class="stats">
      <span class="k">Cash</span><span class="v" id="s-cash">$0</span>
      <span class="k">Population</span><span class="v" id="s-pop">0</span>
      <span class="k">Floors</span><span class="v" id="s-floors">0</span>
      <span class="k">Day / Time</span><span class="v" id="s-time">1 · 6:00</span>

    <div class="hint">Pick a tool, then tap an empty plot to build. <kbd>Esc</kbd> or Pointer to inspect/sell. On mobile, ✕ or tapping outside closes this menu. Progress auto-saves.</div>

    <div id="toast"></div>
  </div>
</div>

<script>
(() => {
"use strict";

// ---------- Configuration ----------
const CELL_W = 32;          // px per grid column
const CELL_H = 36;          // px per floor
const COLS = 40;            // tower width in cells
const GROUND_ROW = 0;       // logical floor index 0 == ground/lobby level
const MAX_FLOORS = 30;      // floors above ground you may build
const BASEMENT_FLOORS = 4;  // below ground (for parking-ish / future)
const START_CASH = 120000;

// Unit definitions. width in cells, height in floors.
const TYPES = {
  pointer:   { name: "Pointer",     cost: 0,     w: 0, h: 0, color: "transparent", tool: true },
  lobby:     { name: "Lobby",       cost: 0,     w: 1, h: 1, color: "#d9c79a", income: 0,    cap: 0,  kind: "transit" },
  office:    { name: "Office",      cost: 40000, w: 3, h: 1, color: "#9ec9e8", income: 0,    cap: 6,  kind: "work",  rent: 9000 },
  apartment: { name: "Apartment",   cost: 30000, w: 2, h: 1, color: "#f6c177", income: 0,    cap: 3,  kind: "home",  rent: 5000 },
  condo:     { name: "Condo",       cost: 60000, w: 3, h: 1, color: "#f2a65a", income: 0,    cap: 4,  kind: "home",  rent: 11000 },
  hotel:     { name: "Hotel Room",  cost: 28000, w: 3, h: 1, color: "#7fd1c4", income: 0,    cap: 5,  kind: "hotel", rent: 2200 },
  shop:      { name: "Retail Shop", cost: 25000, w: 2, h: 1, color: "#c3a6e0", income: 0,    cap: 0,  kind: "shop", draw: 1 },
  restaurant:{ name: "Restaurant",  cost: 35000, w: 3, h: 1, color: "#f08c8c", income: 0,    cap: 0,  kind: "shop", draw: 1.3 },
  cinema:    { name: "Cinema",      cost: 70000, w: 4, h: 1, color: "#b08be0", income: 0,    cap: 0,  kind: "shop", draw: 2.5 },
  terrace:   { name: "Terrace",     cost: 20000, w: 3, h: 1, color: "#cbb083", income: 0,    cap: 0,  kind: "outdoor", appeal: 12 },
  garden:    { name: "Sky Garden",  cost: 45000, w: 4, h: 1, color: "#6cae54", income: 0,    cap: 0,  kind: "outdoor", appeal: 20 },
  pool:      { name: "Pool",        cost: 55000, w: 3, h: 1, color: "#4cb6e0", income: 0,    cap: 0,  kind: "outdoor", appeal: 22 },
  playground:{ name: "Playground",  cost: 22000, w: 3, h: 1, color: "#8ec25a", income: 0,    cap: 0,  kind: "outdoor", appeal: 16, favors: "home" },
  skybar:    { name: "Rooftop Bar", cost: 48000, w: 3, h: 1, color: "#6b4a2e", income: 0,    cap: 0,  kind: "outdoor", appeal: 13, draw: 1.6 },
  gym:       { name: "Gym",         cost: 30000, w: 3, h: 1, color: "#9fb0a6", income: 0,    cap: 0,  kind: "amenity", appeal: 14 },
  spa:       { name: "Spa",         cost: 40000, w: 3, h: 1, color: "#86b8b0", income: 0,    cap: 0,  kind: "amenity", appeal: 18, favors: "hotel" },
  conference:{ name: "Conf. Room",  cost: 34000, w: 3, h: 1, color: "#b0a48c", income: 0,    cap: 0,  kind: "amenity", appeal: 16, favors: "work" },
  stair:     { name: "Stairs",      cost: 5000,  w: 1, h: 1, color: "#8d99ae", kind: "transit" },
  elevator:  { name: "Elevator",    cost: 18000, w: 1, h: 1, color: "#5c6b7a", kind: "transit" },
  floor:     { name: "Floor Slab",  cost: 8000,  w: 1, h: 1, color: "#b8bfc7", kind: "structure" },
};

// Build menu, organized into collapsible sections (the Pointer is shown above them).
const TOOL_GROUPS = [
  { title: "Rooms",     keys: ["office","apartment","condo","hotel","shop","restaurant","cinema"] },
  { title: "Amenities", keys: ["terrace","garden","pool","playground","skybar","gym","spa","conference"] },
  { title: "Transit",   keys: ["floor","stair","elevator"] },
];
const UI_KEY = "microtower.ui.v1";
// Which sections start collapsed (Amenities is the longest, so it's tucked away).
let uiCollapsed = { Rooms: false, Amenities: true, Transit: false };
try {
  const rawUi = localStorage.getItem(UI_KEY);
  if (rawUi) uiCollapsed = Object.assign(uiCollapsed, JSON.parse(rawUi));
} catch (e) {}
function saveUi() { try { localStorage.setItem(UI_KEY, JSON.stringify(uiCollapsed)); } catch (e) {} }
const STAR_THRESHOLDS = [10, 40, 100, 200, 350];
const SAVE_KEY = "microtower.save.v1";

// One-line "what it does" blurbs shown as tooltips / in the info line.
const TYPE_DESC = {
  pointer:   "Inspect a room's stats, or sell it back for half its cost.",
  floor:     "Structural slab. Lets people walk across a floor — earns nothing on its own.",
  office:    "Workspace for up to 6 staff. Pays steady daily rent.",
  apartment: "Home for up to 3 residents. Pays daily rent.",
  condo:     "Premium home for 4 residents. Higher rent than an apartment.",
  hotel:     "Guests check in each evening and pay a nightly rate per room.",
  shop:      "Earns from foot traffic — the busier your tower, the bigger the sales.",
  restaurant:"Like a shop, but draws larger crowds and earns more.",
  cinema:    "Highest-draw venue. A big earner once your tower is busy.",
  terrace:   "Open-air deck. Lifts satisfaction of nearby tenants. Needs open sky above.",
  garden:    "Lush rooftop park. A strong satisfaction boost for nearby tenants. Needs open sky above.",
  pool:      "Rooftop pool. A big satisfaction boost for nearby tenants. Needs open sky above.",
  playground:"Outdoor play area. Especially pleases nearby homes. Needs open sky above.",
  skybar:    "Rooftop bar. Charges admission for daily income AND boosts satisfaction. Needs open sky above.",
  gym:       "Indoor fitness center. Boosts nearby satisfaction; works mid-tower, no open sky needed.",
  spa:       "Indoor spa. Especially delights nearby hotel guests.",
  conference:"Indoor meeting space. Especially boosts nearby offices.",
  stair:     "Cheap transit. Rooms need a stair or elevator within 8 cells.",
  elevator:  "Vertical transit. Stack several in a column to form a riding shaft.",
  lobby:     "Ground-floor entrance. Free, pre-built, and can't be sold.",
};

// ---------- State ----------
const state = {
  cash: START_CASH,
  pop: 0,
  day: 1,
  minutes: 6 * 60,   // start at 6:00am
  speed: 1,
  tool: "pointer",
  units: [],         // {id,type,col,row,w,h,el,occupants,satisfaction}
  grid: {},          // "col,row" -> unit id  (occupancy map)
  nextId: 1,
  people: [],
  shafts: [],
  transitRuns: [],
  stars: 0,
  isNight: false,
  pending: null,
};

// ---------- DOM ----------
const world = document.getElementById("world");
const stage = document.getElementById("stage");
const scroller = document.getElementById("scroller");
const ghost = document.getElementById("ghost");
const toastEl = document.getElementById("toast");
const logEl = document.getElementById("log");
const sunEl = document.getElementById("sun");
const moonEl = document.getElementById("moon");
const starsEl = document.getElementById("stars");
const cloudsEl = document.getElementById("clouds");

const worldWidth = COLS * CELL_W;
const totalRows = MAX_FLOORS + 1; // ground + above
const worldHeight = totalRows * CELL_H + 40; // +ground strip
world.style.width = worldWidth + "px";
world.style.height = worldHeight + "px";

// Convert logical row (0=ground, positive=up) to a pixel top.
// Higher floors are visually higher => smaller top value.
function rowTop(row) {
  return (MAX_FLOORS - row) * CELL_H;
}
function colLeft(col) { return col * CELL_W; }

// ---------- Build the static background grid ----------
function buildBackground() {
  // ground strip
  const ground = document.createElement("div");
  ground.className = "cell ground";
  ground.style.left = "0px";
  ground.style.top = rowTop(0) + CELL_H + "px";
  ground.style.width = worldWidth + "px";
  ground.style.height = "40px";
  world.appendChild(ground);

  // buildable empty cells, one element per (col,row)
  for (let row = 0; row <= MAX_FLOORS; row++) {
    for (let col = 0; col < COLS; col++) {
      const c = document.createElement("div");
      c.className = "cell empty-buildable";
      c.style.left = colLeft(col) + "px";
      c.style.top = rowTop(row) + "px";
      c.style.width = CELL_W + "px";
      c.style.height = CELL_H + "px";
      c.dataset.col = col;
      c.dataset.row = row;
      world.appendChild(c);
    }
  }
}

// ---------- Tools UI ----------
function buildToolbar() {
  const tools = document.getElementById("tools");
  const descEl = document.getElementById("toolDesc");
  tools.innerHTML = "";

  const makeTool = (key) => {
    const t = TYPES[key];
    const desc = TYPE_DESC[key] || "";
    const div = document.createElement("div");
    div.className = "tool" + (key === state.tool ? " selected" : "");
    div.dataset.tool = key;
    div.title = desc; // native tooltip on hover (desktop)
    div.innerHTML = `
      <span class="swatch" style="background:${t.color === 'transparent' ? '#444' : t.color}"></span>
      <span class="label">${t.name}</span>
      <span class="cost">${t.cost ? "$" + t.cost.toLocaleString() : (key==='pointer'?'inspect':'free')}</span>`;
    div.addEventListener("click", () => selectTool(key));
    // Hover previews the description in the info line; leaving restores the selected tool's.
    div.addEventListener("mouseenter", () => { if (descEl) descEl.textContent = desc; });
    div.addEventListener("mouseleave", () => { if (descEl) descEl.textContent = TYPE_DESC[state.tool] || ""; });
    return div;
  };

  // Pointer (inspect / sell) sits above the sections, always visible.
  tools.appendChild(makeTool("pointer"));

  TOOL_GROUPS.forEach(g => {
    const group = document.createElement("div");
    group.className = "tool-group" + (uiCollapsed[g.title] ? " collapsed" : "");

    const head = document.createElement("div");
    head.className = "group-head";
    head.innerHTML = `<span><span class="chev">▾</span>${g.title}</span><span class="count">${g.keys.length}</span>`;
    head.addEventListener("click", () => {
      group.classList.toggle("collapsed");
      uiCollapsed[g.title] = group.classList.contains("collapsed");
      saveUi();
    });

    const body = document.createElement("div");
    body.className = "group-body";
    g.keys.forEach(k => body.appendChild(makeTool(k)));

    group.appendChild(head);
    group.appendChild(body);
    tools.appendChild(group);
  });
}

function selectTool(key) {
  state.tool = key;
  document.querySelectorAll(".tool").forEach(el =>
    el.classList.toggle("selected", el.dataset.tool === key));
  ghost.style.display = "none";
  if (typeof clearPending === "function") clearPending();
  const descEl = document.getElementById("toolDesc");
  if (descEl) descEl.textContent = TYPE_DESC[key] || "";
  // On phones, get the drawer out of the way so the tower is tappable.
  if (key !== "pointer" && typeof isMobile === "function" && isMobile()) {
    document.getElementById("app").classList.add("nav-closed");
  }
}

// ---------- Helpers ----------
function key(col, row) { return col + "," + row; }

function cellsFree(col, row, w, h) {
  if (col < 0 || col + w > COLS) return false;
  if (row < 0 || row + h - 1 > MAX_FLOORS) return false;
  for (let dr = 0; dr < h; dr++)
    for (let dc = 0; dc < w; dc++)
      if (state.grid[key(col + dc, row + dr)]) return false;
  return true;
}

// Outdoor spaces must be open to the sky: nothing on the floor directly above.
function hasOpenSkyAbove(col, row, w) {
  for (let dc = 0; dc < w; dc++)
    if (state.grid[key(col + dc, row + 1)]) return false;
  return true;
}

// Structural support: anything above the ground floor must rest on the floor
// directly below it, overhanging that support by at most one cell on each side.
function isSupported(col, row, w) {
  if (row === 0) return true; // ground floor sits on the ground
  let first = -1, last = -1;
  for (let dc = 0; dc < w; dc++) {
    if (state.grid[key(col + dc, row - 1)]) { if (first === -1) first = dc; last = dc; }
  }
  if (first === -1) return false;            // nothing underneath at all -> floating
  return first <= 1 && (w - 1 - last) <= 1;  // overhang at most one cell each side
}

// Would a unit placed here sit directly on top of an outdoor space?
function coversOutdoor(col, row, w) {
  for (let dc = 0; dc < w; dc++) {
    const id = state.grid[key(col + dc, row - 1)];
    if (id) {
      const below = state.units.find(x => x.id === id);
      if (below && TYPES[below.type].kind === "outdoor") return true;
    }
  }
  return false;
}

// A habitable unit needs a stair or elevator on the same floor within 8 cells.
function hasTransitAccess(col, row, w) {
  if (row === 0) return true;
  for (const u of state.units) {
    if ((u.type === "stair" || u.type === "elevator") &&
        u.row <= row && u.row + u.h - 1 >= row) {
      const gap = Math.max(u.col - (col + w), col - (u.col + u.w), 0);
      if (gap <= 8) return true;
    }
  }
  return false;
}

// ---------- Placement ----------
function tryBuild(col, row, key_) {
  const t = TYPES[key_];
  if (!t || t.tool) return;
  if (!cellsFree(col, row, t.w, t.h)) { toast("Space is occupied or out of bounds."); sfx("error"); return; }
  if (!isSupported(col, row, t.w)) {
    toast("Must rest on the ground or the floor below (1-cell overhang max).");
    sfx("error");
    return;
  }
  if (state.cash < t.cost) { toast("Not enough cash."); sfx("error"); flash(false); return; }
  if ((t.kind === "work" || t.kind === "home" || t.kind === "shop" || t.kind === "hotel" || t.kind === "outdoor" || t.kind === "amenity") && !hasTransitAccess(col, row, t.w)) {
    toast("Needs stairs or an elevator within 8 cells on this floor."); sfx("error");
    return;
  }
  if (t.kind === "outdoor" && !hasOpenSkyAbove(col, row, t.w)) {
    toast("Outdoor spaces need open sky directly above."); sfx("error");
    return;
  }
  if (t.kind !== "outdoor" && coversOutdoor(col, row, t.w)) {
    toast("Can't build right on top of an outdoor space — it needs open sky."); sfx("error");
    return;
  }

  const unit = {
    id: state.nextId++,
    type: key_, col, row, w: t.w, h: t.h,
    occupants: 0, satisfaction: 100,
    revenueTimer: Math.random() * 60,
  };
  placeUnit(unit);
  if (key_ === "elevator" || key_ === "stair") rebuildShafts();
  state.cash -= t.cost;
  log(`Built ${t.name} on floor ${row} for $${t.cost.toLocaleString()}`, "good");
  sfx("build");
  refreshStats();
  saveGame(true);
}

function placeUnit(unit) {
  const t = TYPES[unit.type];
  for (let dr = 0; dr < unit.h; dr++)
    for (let dc = 0; dc < unit.w; dc++)
      state.grid[key(unit.col + dc, unit.row + dr)] = unit.id;

  const winTypes = ["office", "apartment", "condo", "hotel"];
  const el = document.createElement("div");
  el.className = "unit unit-" + unit.type + (winTypes.includes(unit.type) ? " win" : "");
  el.style.left = colLeft(unit.col) + "px";
  el.style.top = rowTop(unit.row + unit.h - 1) + "px";
  el.style.width = (unit.w * CELL_W) + "px";
  el.style.height = (unit.h * CELL_H) + "px";
  el.dataset.id = unit.id;
  el.innerHTML = unitInnerHTML(unit.type);
  el.addEventListener("click", (e) => { e.stopPropagation(); onUnitClick(unit); });
  world.appendChild(el);
  unit.el = el;
  state.units.push(unit);
  updateUnitVisual(unit);
}

// Layered interior markup for a unit: facade + type extras + tag + vacancy sign + occupancy bar.
function unitInnerHTML(type) {
  const t = TYPES[type];
  const tag = (type === "floor") ? "" : `<div class="u-tag">${shortLabel(type)}</div>`;
  const vac = (t.cap > 0) ? `<div class="u-vac">FOR LEASE</div>` : "";
  return `<div class="u-face"></div><div class="u-extra"></div>${tag}${vac}<div class="occ"></div>`;
}

function shortLabel(type) {
  return ({office:"OFF", apartment:"APT", condo:"CONDO", hotel:"🛏", shop:"SHOP", restaurant:"REST",
           cinema:"🎬", terrace:"⛱", garden:"🌳", pool:"POOL", playground:"PLAY", skybar:"BAR",
           gym:"GYM", spa:"SPA", conference:"CONF", stair:"⇅", elevator:"▮", floor:"", lobby:"LOBBY"})[type] || type;
}

function onUnitClick(unit) {
  if (state.tool === "pointer") {
    const t = TYPES[unit.type];
    const refund = Math.floor(t.cost * 0.5);
    if (unit.type === "lobby") { toast("The lobby can't be sold."); return; }
    if (confirm(`${t.name} on floor ${unit.row}\nOccupants: ${unit.occupants}/${t.cap||0}\nSatisfaction: ${Math.round(unit.satisfaction)}%\n\nSell for $${refund.toLocaleString()}?`)) {
      sellUnit(unit, refund);
    }
  }
}

function sellUnit(unit, refund) {
  for (let dr = 0; dr < unit.h; dr++)
    for (let dc = 0; dc < unit.w; dc++)
      delete state.grid[key(unit.col + dc, unit.row + dr)];
  unit.el.remove();
  state.units = state.units.filter(u => u.id !== unit.id);
  if (unit.type === "elevator" || unit.type === "stair") rebuildShafts();
  state.cash += refund;
  log(`Sold ${TYPES[unit.type].name} for $${refund.toLocaleString()}`, "bad");
  sfx("sell");
  refreshStats();
  saveGame(true);
}

function updateUnitVisual(unit) {
  const t = TYPES[unit.type];
  const occBar = unit.el.querySelector(".occ");
  if (t.cap > 0) {
    const ratio = unit.occupants / t.cap;
    occBar.style.background = ratio > 0.66 ? "var(--good)" : ratio > 0 ? "var(--accent)" : "var(--bad)";
    occBar.style.width = (ratio * 100) + "%";
    unit.el.classList.toggle("vacant", unit.occupants === 0);
  } else {
    occBar.style.width = "0";
  }
  unit.el.classList.toggle("lit", !!state.isNight && (unit.occupants > 0 || unit.type === "lobby"));
}

// ---------- Day / night sky ----------
const SKY = {
  night: ["#0b1a2b", "#16324a"],
  day:   ["#6db3e8", "#cfe9fb"],
  dusk:  ["#e8895a", "#f3cd9a"],
};
function lerpColor(a, b, f) {
  const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
  const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
  const c = pa.map((v,i) => Math.round(v + (pb[i]-v)*f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function bump(x, center, width) { return Math.max(0, 1 - Math.abs(x-center)/width); }
function clamp01(v) { return Math.max(0, Math.min(1, v)); }

// Place a celestial body along an arc: frac 0 = left horizon, .5 = zenith, 1 = right horizon.
function placeArc(el, frac) {
  if (frac < -0.05 || frac > 1.05) { el.style.opacity = "0"; return false; }
  const w = stage.clientWidth || 1000, hH = stage.clientHeight || 700;
  const horizon = hH * 0.80;
  el.style.left = (frac * (w + 60) - 30 - 23) + "px";
  el.style.top = (horizon - Math.sin(clamp01(frac) * Math.PI) * (horizon - 30) - 23) + "px";
  return true;
}

function updateSky(force) {
  const h = state.minutes / 60;
  const bright = Math.max(0, Math.sin((h - 6) / 12 * Math.PI)); // 0 at 6/18, 1 at noon
  const duskAmt = Math.max(bump(h, 6.5, 2.5), bump(h, 18, 2.5)) * 0.7;
  let top = lerpColor(SKY.night[0], SKY.day[0], bright);
  let bot = lerpColor(SKY.night[1], SKY.day[1], bright);
  top = lerpColor(top, SKY.dusk[0], duskAmt);
  bot = lerpColor(bot, SKY.dusk[1], duskAmt);
  stage.style.background = `linear-gradient(${top}, ${bot})`;

  // Sun rides 6:00 → 18:00; moon rides 18:00 → 6:00.
  if (placeArc(sunEl, (h - 6) / 12)) sunEl.style.opacity = String(clamp01(bright * 1.4));
  const moonH = h < 6 ? h + 24 : h;
  if (placeArc(moonEl, (moonH - 18) / 12)) moonEl.style.opacity = String(clamp01((1 - bright) - 0.15));
  starsEl.style.opacity = String(clamp01(1 - bright * 2.4));
  cloudsEl.style.opacity = String(0.25 + bright * 0.6);

  const isNight = bright < 0.12;
  if (force || isNight !== state.isNight) {
    state.isNight = isNight;
    state.units.forEach(u =>
      u.el.classList.toggle("lit", isNight && (u.occupants > 0 || u.type === "lobby")));
  }
}

function buildStars() {
  if (!starsEl) return;
  for (let i = 0; i < 60; i++) {
    const d = document.createElement("div");
    d.className = "star";
    d.style.left = (Math.random() * 100) + "%";
    d.style.top = (Math.random() * 68) + "%";
    d.style.animationDelay = (Math.random() * 3) + "s";
    starsEl.appendChild(d);
  }
}

// ---------- Mouse: ghost preview & building ----------
function pointFromEvent(e) {
  const rect = world.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.floor(x / CELL_W);
  const row = MAX_FLOORS - Math.floor(y / CELL_H);
  return { col, row };
}

scroller.addEventListener("mousemove", (e) => {
  if (IS_TOUCH) return; // touch uses the tap-to-place flow instead of hover
  const t = TYPES[state.tool];
  if (!t || t.tool || state.tool === "pointer") { ghost.style.display = "none"; return; }
  const { col, row } = pointFromEvent(e);
  if (row < 0 || row > MAX_FLOORS) { ghost.style.display = "none"; return; }
  showGhostAt(col, row, t);
});

// Touch devices have no hover preview, so they get a tap-to-place-then-confirm flow.
const IS_TOUCH = (typeof window !== "undefined") && (
  ("ontouchstart" in window) ||
  (typeof navigator !== "undefined" && navigator.maxTouchPoints > 0) ||
  (window.matchMedia && window.matchMedia("(pointer: coarse)").matches)
);

const placeBar = document.getElementById("placeBar");
const placeInfo = document.getElementById("placeInfo");
const placeBuildBtn = document.getElementById("placeBuild");

function showGhostAt(col, row, t) {
  ghost.style.display = "block";
  ghost.style.width = (t.w * CELL_W) + "px";
  ghost.style.height = (t.h * CELL_H) + "px";
  ghost.style.left = colLeft(col) + "px";
  ghost.style.top = rowTop(row + t.h - 1) + "px";
  const ok = cellsFree(col, row, t.w, t.h) && state.cash >= t.cost;
  ghost.classList.toggle("invalid", !ok);
  return ok;
}

function setPending(col, row) {
  const t = TYPES[state.tool];
  if (state.pending && state.pending.col === col && state.pending.row === row) {
    confirmPending();
    return;
  }
  state.pending = { col, row, tool: state.tool };
  const ok = showGhostAt(col, row, t);
  placeInfo.textContent = `${t.name} · floor ${row} · $${t.cost.toLocaleString()}`;
  placeBuildBtn.disabled = !ok;
  placeBar.classList.add("show");
}

function confirmPending() {
  if (!state.pending) return;
  const p = state.pending;
  tryBuild(p.col, p.row, p.tool);
  clearPending();
}

function clearPending() {
  state.pending = null;
  ghost.style.display = "none";
  placeBar.classList.remove("show");
}

placeBuildBtn.addEventListener("click", confirmPending);
document.getElementById("placeCancel").addEventListener("click", clearPending);

world.addEventListener("click", (e) => {
  if (state.tool === "pointer" || TYPES[state.tool].tool) return;
  const { col, row } = pointFromEvent(e);
  if (row < 0 || row > MAX_FLOORS) return;
  if (IS_TOUCH) setPending(col, row);
  else tryBuild(col, row, state.tool);
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") selectTool("pointer");
});

// ---------- Economy & simulation ----------
function rentableUnits() {
  return state.units.filter(u => {
    const k = TYPES[u.type].kind;
    return k === "work" || k === "home";
  });
}
function hotelUnits() {
  return state.units.filter(u => TYPES[u.type].kind === "hotel");
}

// Guests check into hotels in the evening and check out in the morning.
function simHotels() {
  const evening = state.minutes >= 17 * 60 || state.minutes < 60; // 5pm–1am
  const morning = state.minutes >= 6 * 60 && state.minutes < 11 * 60; // 6am–11am
  hotelUnits().forEach(u => {
    const t = TYPES[u.type];
    if (evening && u.occupants < t.cap) {
      const appeal = 0.05 + state.stars * 0.012 + amenityBonus(u) * 0.0009;
      if (Math.random() < appeal) { u.occupants++; state.pop++; updateUnitVisual(u); }
    } else if (morning && u.occupants > 0) {
      if (Math.random() < 0.25) { u.occupants--; state.pop--; updateUnitVisual(u); }
    }
  });
}

function avgSatisfaction() {
  const us = state.units.filter(u => TYPES[u.type].cap > 0);
  if (!us.length) return 100;
  return us.reduce((a, u) => a + u.satisfaction, 0) / us.length;
}

// How much nearby amenities (outdoor terraces/pools or indoor gyms/spas) lift a
// unit. Falls off with distance; the best within reach wins (8 cells, 3 floors).
// Targeted amenities (favors) help their preferred tenant kind more, others less.
function amenityBonus(u) {
  const uKind = TYPES[u.type].kind;
  let best = 0;
  for (const a of state.units) {
    const at = TYPES[a.type];
    if (at.kind !== "outdoor" && at.kind !== "amenity") continue;
    // A covered outdoor space (no open sky above) provides no benefit.
    if (at.kind === "outdoor" && !hasOpenSkyAbove(a.col, a.row, a.w)) continue;
    const dx = Math.max(a.col - (u.col + u.w), u.col - (a.col + a.w), 0);
    const dy = Math.abs(a.row - u.row);
    if (dx <= 8 && dy <= 3) {
      let appeal = at.appeal || 10;
      if (at.favors) appeal *= (at.favors === uKind) ? 1.3 : 0.4;
      const val = appeal * (1 - dy / 4);
      if (val > best) best = val;
    }
  }
  return best;
}

// Tenants move in over time if there is transit access and demand
function simTenants() {
  rentableUnits().forEach(u => {
    const t = TYPES[u.type];
    const amen = amenityBonus(u);
    if (u.occupants < t.cap) {
      // chance to gain a tenant scales with tower appeal + nearby outdoor space
      const appeal = 0.02 + state.stars * 0.01 + amen * 0.0009;
      if (Math.random() < appeal) {
        u.occupants++;
        state.pop++;
        updateUnitVisual(u);
        if (u.occupants === t.cap) log(`${t.name} on floor ${u.row} fully leased!`, "good");
      }
    }
    // satisfaction drifts toward a target set by transit access + outdoor amenities
    const access = hasTransitAccess(u.col, u.row, u.w);
    const target = Math.min(100, (access ? 85 : 40) + amen);
    u.satisfaction += (target - u.satisfaction) * 0.05;
    if (u.satisfaction < 30 && u.occupants > 0 && Math.random() < 0.1) {
      u.occupants--; state.pop--; updateUnitVisual(u);
      log(`A tenant left ${t.name} on floor ${u.row} (poor access).`, "bad");
    }
  });
}

// Daily rent payout
function collectRent() {
  let total = 0;
  rentableUnits().forEach(u => {
    const t = TYPES[u.type];
    total += Math.round((t.rent || 0) * (u.occupants / Math.max(1, t.cap)));
  });
  // hotels earn a nightly rate per checked-in guest
  hotelUnits().forEach(u => {
    total += Math.round((TYPES[u.type].rent || 0) * u.occupants);
  });
  // shops and admission venues (rooftop bar) earn from foot traffic, scaled by draw
  state.units.filter(u => TYPES[u.type].draw).forEach(u => {
    const draw = TYPES[u.type].draw || 1;
    const nearbyPop = state.pop; // simplified: whole tower foot traffic
    const earn = Math.min(8000 * draw, Math.round((nearbyPop * 120 + Math.random() * 1000) * draw));
    total += earn;
    u.occupants = Math.min(99, Math.round(earn / 100));
  });
  if (total !== 0) {
    state.cash += total;
    log(`Daily income: +$${total.toLocaleString()}`, "good");
    if (total > 0) { floatText(`+$${total.toLocaleString()}`); sfx("cash"); }
  }
  refreshStats();
}

// Random once-a-day events that keep the tower lively.
function maybeEvent() {
  if (state.units.length < 5) return;      // grace period while getting started
  if (Math.random() > 0.4) return;          // ~40% chance per day
  const roll = Math.random();
  if (roll < 0.30) {
    const bonus = 3000 + Math.round(state.pop * 80);
    state.cash += bonus;
    toast("📈 Economic boom!");
    sfx("bonus");
    floatText(`+$${bonus.toLocaleString()}`);
    log(`📈 Economic boom — investors pour in: +$${bonus.toLocaleString()}`, "good");
  } else if (roll < 0.55) {
    if (avgSatisfaction() >= 70) {
      const b = 5000;
      state.cash += b;
      toast("🎩 VIP inspection passed!");
      sfx("bonus");
      floatText(`+$${b.toLocaleString()}`);
      log(`🎩 VIP inspection passed — reputation bonus: +$${b.toLocaleString()}`, "good");
    } else {
      log("🎩 A VIP toured the tower and left unimpressed by tenant satisfaction.", "bad");
    }
  } else if (roll < 0.80) {
    const fee = 1000 + state.units.length * 150;
    state.cash -= fee;
    floatText(`-$${fee.toLocaleString()}`, "bad");
    log(`🔧 Routine maintenance and upkeep: -$${fee.toLocaleString()}`, "bad");
  } else {
    const targets = state.units.filter(u => {
      const k = TYPES[u.type].kind;
      return k === "work" || k === "home" || k === "hotel" || k === "shop";
    });
    if (targets.length) {
      const u = targets[Math.floor(Math.random() * targets.length)];
      const k = TYPES[u.type].kind;
      // Only residents/workers/guests count toward population; shop "occupants"
      // are foot-traffic figures and must not be subtracted from it.
      if ((k === "work" || k === "home" || k === "hotel") && u.occupants > 0) {
        state.pop -= u.occupants; u.occupants = 0; updateUnitVisual(u);
      }
      u.satisfaction = Math.max(0, u.satisfaction - 40);
      const repair = 4000;
      state.cash -= repair;
      toast("🔥 Fire!");
      sfx("fire");
      spawnSmoke(u);
      floatText(`-$${repair.toLocaleString()}`, "bad");
      log(`🔥 Fire in ${TYPES[u.type].name} on floor ${u.row}! Evacuated; repairs -$${repair.toLocaleString()}.`, "bad");
    }
  }
  refreshStats();
}

function recomputeStars() {
  // star rating by population thresholds (à la SimTower)
  let s = 0;
  for (let i = 0; i < STAR_THRESHOLDS.length; i++)
    if (state.pop >= STAR_THRESHOLDS[i]) s = i + 1;
  if (s !== state.stars) {
    if (s > state.stars) {
      log(`★ Promoted to ${s}-star tower!`, "good");
      banner(`★ ${s}-STAR TOWER! ★`);
      sfx("promote");
    }
    state.stars = s;
  }
}

// ---------- People dots (visual flavor) ----------
// Horizontal span (in cells) actually occupied on a given floor, so pedestrians
// stay inside the building's footprint instead of wandering into open sky.
function floorExtent(row) {
  let min = Infinity, max = -Infinity;
  for (const u of state.units) {
    if (u.row <= row && u.row + u.h - 1 >= row) {
      if (u.col < min) min = u.col;
      if (u.col + u.w - 1 > max) max = u.col + u.w - 1;
    }
  }
  return min === Infinity ? null : { min, max };
}

function spawnPerson() {
  if (state.people.length > 60) return;
  // Residents, workers and hotel guests stroll their own floors...
  const pool = state.units.filter(u => {
    const k = TYPES[u.type].kind;
    return (k === "work" || k === "home" || k === "hotel") && u.occupants > 0;
  });
  // ...and once anyone lives/works here, the lobby and amenities see visitors too.
  if (state.pop > 0) {
    for (const u of state.units) {
      const k = TYPES[u.type].kind;
      if (u.type === "lobby" || k === "outdoor" || k === "amenity") pool.push(u);
    }
  }
  if (pool.length === 0) return;
  const u = pool[Math.floor(Math.random() * pool.length)];
  const ext = floorExtent(u.row) || { min: u.col, max: u.col + u.w - 1 };
  const startCol = u.col + Math.random() * Math.max(1, u.w);
  const roleClass = { work: "role-work", home: "role-home", hotel: "role-hotel" }[TYPES[u.type].kind] || "role-visitor";
  const el = document.createElement("div");
  el.className = "person " + roleClass;
  el.style.left = colLeft(startCol) + "px";
  el.style.top = (rowTop(u.row) + CELL_H - 12) + "px";
  el.style.animationDelay = (Math.random() * 0.5) + "s";
  world.appendChild(el);
  state.people.push({ el, col: startCol, row: u.row, life: 200 + Math.random()*200,
    mode: "walk", goCol: null, targetRow: null, transitCol: 0, y: u.row });
}

// Pick a transit run serving this person's floor and send them to another floor.
function maybeCommute(p) {
  const runs = state.transitRuns.filter(r => r.lo <= p.row && p.row <= r.hi);
  if (!runs.length) return;
  const r = runs[Math.floor(Math.random() * runs.length)];
  const choices = [];
  for (let f = r.lo; f <= r.hi; f++) if (f !== p.row && floorExtent(f)) choices.push(f);
  if (!choices.length) return;
  p.targetRow = choices[Math.floor(Math.random() * choices.length)];
  p.goCol = r.col;
}

function movepeople() {
  for (let i = state.people.length - 1; i >= 0; i--) {
    const p = state.people[i];
    p.life--;

    if (p.mode === "ride") {
      // Travelling vertically along a stair/elevator column to the target floor.
      const dir = p.targetRow >= p.y ? 1 : -1;
      p.y += dir * 0.14;
      if ((dir > 0 && p.y >= p.targetRow) || (dir < 0 && p.y <= p.targetRow)) {
        p.y = p.targetRow; p.row = p.targetRow; p.col = p.transitCol;
        p.mode = "walk"; p.goCol = null;
      }
      p.el.style.left = (colLeft(p.transitCol) + CELL_W / 2 - 2.5) + "px";
      p.el.style.top = (rowTop(p.y) + CELL_H - 12) + "px";
      continue; // riders don't expire mid-trip
    }

    const ext = floorExtent(p.row);
    if (!ext || p.life <= 0) { p.el.remove(); state.people.splice(i, 1); continue; }

    if (p.goCol != null) {
      // Heading to a transit column to board.
      const d = p.goCol - p.col;
      if (Math.abs(d) <= 0.4) { p.mode = "ride"; p.transitCol = p.goCol; p.y = p.row; }
      else p.col += Math.sign(d) * 0.6;
    } else {
      p.col += (Math.random() - 0.5) * 1.5;
      p.col = Math.max(ext.min, Math.min(ext.max, p.col));
      if (Math.random() < 0.012) maybeCommute(p);
    }
    p.el.style.left = colLeft(p.col) + "px";
    p.el.style.top = (rowTop(p.row) + CELL_H - 12) + "px";
  }
}

// ---------- Elevator cars ----------
// Group stacked elevator cells in a column into shafts, each with a car that
// rides up and down. Recomputed whenever the tower changes.
// Find vertical runs of consecutive rows (length >= 2) per column; calls onRun.
function eachVerticalRun(predicate, onRun) {
  const byCol = {};
  state.units.forEach(u => { if (predicate(u)) (byCol[u.col] = byCol[u.col] || []).push(u.row); });
  Object.keys(byCol).forEach(colStr => {
    const col = Number(colStr);
    const rows = byCol[col].sort((a, b) => a - b);
    let lo = rows[0], prev = rows[0];
    for (let i = 1; i <= rows.length; i++) {
      if (i < rows.length && rows[i] === prev + 1) { prev = rows[i]; continue; }
      if (prev > lo) onRun(col, lo, prev); // a run needs 2+ cells
      if (i < rows.length) { lo = rows[i]; prev = rows[i]; }
    }
  });
}

function rebuildShafts() {
  state.shafts.forEach(s => s.carEl && s.carEl.remove());
  state.shafts = [];
  // Elevator shafts get an animated car.
  eachVerticalRun(u => u.type === "elevator", addShaft);
  // Transit runs (stairs OR elevators) let pedestrians change floors.
  state.transitRuns = [];
  eachVerticalRun(u => u.type === "stair" || u.type === "elevator",
    (col, lo, hi) => state.transitRuns.push({ col, lo, hi }));
}

function addShaft(col, lo, hi) {
  const carEl = document.createElement("div");
  carEl.className = "elev-car";
  carEl.style.left = (colLeft(col) + 3) + "px";
  carEl.style.width = (CELL_W - 6) + "px";
  carEl.style.height = (CELL_H - 6) + "px";
  carEl.innerHTML = "<i></i><i></i>";
  world.appendChild(carEl);
  state.shafts.push({ col, lo, hi, carEl, pos: lo, dir: 1 });
}

function moveShafts() {
  state.shafts.forEach(s => {
    s.pos += s.dir * 0.16;
    if (s.pos >= s.hi) { s.pos = s.hi; s.dir = -1; }
    if (s.pos <= s.lo) { s.pos = s.lo; s.dir = 1; }
    s.carEl.style.top = (rowTop(s.pos) + 3) + "px";
  });
}

// ---------- Time loop ----------
let lastTs = 0;
let minuteAccumulator = 0;

function tick(ts) {
  const dt = Math.min(100, ts - lastTs);
  lastTs = ts;
  if (state.speed > 0) {
    // advance sim minutes
    minuteAccumulator += dt * state.speed * 0.03; // tune: ~ minutes per ms (50% slower)
    while (minuteAccumulator >= 1) {
      advanceMinute();
      minuteAccumulator -= 1;
    }
  }
  requestAnimationFrame(tick);
}

function advanceMinute() {
  state.minutes++;
  if (state.minutes % 5 === 0) { simTenants(); simHotels(); movepeople(); }
  if (state.minutes % 20 === 0) spawnPerson();
  if (state.minutes >= 24 * 60) {
    state.minutes = 0;
    state.day++;
    collectRent();
    recomputeStars();
    maybeEvent();
    saveGame(true);
  }
  updateClock();
}

function updateClock() {
  const h = Math.floor(state.minutes / 60);
  const m = state.minutes % 60;
  const txt = `${state.day} · ${h}:${m.toString().padStart(2, "0")}`;
  document.getElementById("s-time").textContent = txt;
  document.getElementById("h-time").textContent = txt;
  updateSky(false);
}

// animation for people + elevator cars on a steadier cadence
setInterval(() => { if (state.speed > 0) { movepeople(); moveShafts(); } }, 250);

// ---------- Stats / UI ----------
let _lastCash = null;
function refreshStats() {
  const cash = "$" + state.cash.toLocaleString();
  const stars = "★".repeat(state.stars) + "☆".repeat(5 - state.stars);
  const floorsUsed = new Set(state.units.map(u => u.row)).size;
  document.getElementById("s-cash").textContent = cash;
  document.getElementById("s-pop").textContent = state.pop;
  document.getElementById("s-floors").textContent = floorsUsed;
  document.getElementById("s-stars").textContent = stars;
  const hCash = document.getElementById("h-cash");
  if (_lastCash !== null && state.cash !== _lastCash) {
    hCash.classList.remove("bump");
    void hCash.offsetWidth; // restart the animation
    hCash.classList.add("bump");
  }
  _lastCash = state.cash;
  hCash.textContent = cash;
  document.getElementById("h-pop").textContent = state.pop;
  document.getElementById("h-stars").textContent = stars;
  const nextEl = document.getElementById("s-next");
  nextEl.textContent = state.stars >= STAR_THRESHOLDS.length
    ? "MAX ★★★★★"
    : `${state.pop} / ${STAR_THRESHOLDS[state.stars]} pop`;
}

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toastEl.classList.remove("show"), 1800);
}
function flash(good) { /* hook for future fx */ }

// ---------- Juice / effects ----------
// A small number that floats up and fades, anchored in stage (screen) space.
function floatText(text, cls) {
  const el = document.createElement("div");
  el.className = "float-text" + (cls ? " " + cls : "");
  el.textContent = text;
  el.style.left = ((stage.clientWidth || 800) / 2) + "px";
  el.style.top = "70px";
  stage.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function banner(text) {
  const el = document.createElement("div");
  el.className = "banner";
  el.textContent = text;
  stage.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// Puffs of smoke rising from a unit, in world (scrolling) space.
function spawnSmoke(unit) {
  for (let i = 0; i < 6; i++) {
    const s = document.createElement("div");
    s.className = "smoke";
    s.style.left = (colLeft(unit.col) + Math.random() * unit.w * CELL_W) + "px";
    s.style.top = (rowTop(unit.row + unit.h - 1) + 4) + "px";
    s.style.animationDelay = (i * 0.18) + "s";
    world.appendChild(s);
    setTimeout(() => s.remove(), 2200 + i * 180);
  }
}

function log(msg, cls) {
  const e = document.createElement("div");
  e.className = "entry" + (cls ? " " + cls : "");
  const h = Math.floor(state.minutes / 60), m = state.minutes % 60;
  e.textContent = `[${h}:${m.toString().padStart(2,"0")}] ${msg}`;
  logEl.prepend(e);
  while (logEl.children.length > 40) logEl.lastChild.remove();
}

// ---------- Speed buttons ----------
document.querySelectorAll("[data-speed]").forEach(btn => {
  btn.addEventListener("click", () => {
    state.speed = Number(btn.dataset.speed);
    document.querySelectorAll("[data-speed]").forEach(b =>
      b.classList.toggle("active", b === btn));
  });
});

// ---------- Drawer toggle ----------
const app = document.getElementById("app");
function isMobile() { return window.matchMedia("(max-width: 700px)").matches; }
function openNav()  { app.classList.remove("nav-closed"); }
function closeNav() { app.classList.add("nav-closed"); }
document.getElementById("menuToggle").addEventListener("click", () => app.classList.toggle("nav-closed"));
document.getElementById("closeNav").addEventListener("click", closeNav);
document.getElementById("backdrop").addEventListener("click", closeNav);

// ---------- Save / Load / New ----------
function clearWorld() {
  state.units.forEach(u => u.el && u.el.remove());
  state.people.forEach(p => p.el && p.el.remove());
  state.shafts.forEach(s => s.carEl && s.carEl.remove());
  state.units = [];
  state.grid = {};
  state.people = [];
  state.shafts = [];
}

function saveGame(silent) {
  const data = {
    cash: state.cash, pop: state.pop, day: state.day, minutes: state.minutes,
    stars: state.stars, nextId: state.nextId,
    units: state.units.map(u => ({
      id: u.id, type: u.type, col: u.col, row: u.row,
      occupants: u.occupants, satisfaction: u.satisfaction,
    })),
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    if (!silent) { toast("Tower saved."); log("Game saved.", "good"); }
  } catch (e) {
    if (!silent) toast("Save failed (storage unavailable).");
  }
}

function loadGame(silent) {
  let raw = null;
  try { raw = localStorage.getItem(SAVE_KEY); } catch (e) {}
  if (!raw) { if (!silent) toast("No saved tower found."); return false; }
  let d;
  try { d = JSON.parse(raw); } catch (e) { return false; }
  clearWorld();
  state.cash = d.cash; state.pop = d.pop; state.day = d.day;
  state.minutes = d.minutes; state.stars = d.stars; state.nextId = d.nextId || 1;
  (d.units || []).forEach(su => {
    const t = TYPES[su.type];
    if (!t) return;
    placeUnit({
      id: su.id, type: su.type, col: su.col, row: su.row, w: t.w, h: t.h,
      occupants: su.occupants || 0,
      satisfaction: su.satisfaction == null ? 100 : su.satisfaction,
    });
  });
  rebuildShafts();
  refreshStats(); updateClock(); updateSky(true);
  if (!silent) { toast("Tower loaded."); }
  return true;
}

function newGame() {
  if (!confirm("Start a new tower? This clears your current one.")) return;
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  location.reload();
}

document.getElementById("btnSave").addEventListener("click", () => saveGame(false));
document.getElementById("btnLoad").addEventListener("click", () => loadGame(false));
document.getElementById("btnNew").addEventListener("click", newGame);

// ---------- Audio (synthesized — no external files) ----------
// actx: null = not yet started, false = unavailable, else an AudioContext.
let actx = null, aMaster = null, aMusic = null, aSfx = null, musicStep = 0;
let soundOn = true;
try { const s = localStorage.getItem("microtower.sound"); if (s !== null) soundOn = s === "1"; } catch (e) {}

function audioEnsure() {
  if (actx !== null) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { actx = false; return; }
    actx = new AC();
    aMaster = actx.createGain(); aMaster.gain.value = 0.85; aMaster.connect(actx.destination);
    aMusic = actx.createGain(); aMusic.gain.value = soundOn ? 0.5 : 0; aMusic.connect(aMaster);
    aSfx = actx.createGain(); aSfx.gain.value = 0.6; aSfx.connect(aMaster);
  } catch (e) { actx = false; }
}
function audioResume() { if (actx && actx.state === "suspended") actx.resume(); }
function audioKick() { audioEnsure(); audioResume(); }
document.addEventListener("pointerdown", audioKick);
document.addEventListener("keydown", audioKick);

// Cached white-noise buffer for percussive (hammer) sounds.
let _noiseBuf = null;
function noiseBuffer() {
  if (!_noiseBuf && actx) {
    const len = Math.floor(actx.sampleRate * 0.4);
    _noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
    const d = _noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  }
  return _noiseBuf;
}

// Short synthesized sound effects keyed by event name.
function sfx(name) {
  if (!actx || !soundOn) return;
  const now = actx.currentTime;
  const beep = (freq, dur, type, gain, when, glide) => {
    const t = now + (when || 0);
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, t);
    if (glide) o.frequency.exponentialRampToValueAtTime(glide, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain || 0.3, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(aSfx);
    o.start(t); o.stop(t + dur + 0.02);
  };
  switch (name) {
    case "build": { // hammering: a few metallic tinks + low thunks, like construction
      for (let i = 0; i < 3; i++) {
        const w = i * 0.13, tt = now + w;
        const src = actx.createBufferSource(); src.buffer = noiseBuffer();
        const bp = actx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 2200; bp.Q.value = 5;
        const ng = actx.createGain();
        ng.gain.setValueAtTime(0.28, tt);
        ng.gain.exponentialRampToValueAtTime(0.0001, tt + 0.07);
        src.connect(bp); bp.connect(ng); ng.connect(aSfx);
        src.start(tt); src.stop(tt + 0.08);
        beep(150, 0.09, "square", 0.16, w, 90);
      }
      break;
    }
    case "sell":    beep(520, 0.14, "triangle", 0.26, 0, 300); break;
    case "error":   beep(150, 0.16, "square",   0.16); break;
    case "cash":    beep(880, 0.07, "triangle", 0.24); beep(1320, 0.12, "triangle", 0.20, 0.07); break;
    case "bonus":   beep(587, 0.10, "sine",     0.26); beep(880, 0.14, "sine", 0.22, 0.09); break;
    case "promote": [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.18, "triangle", 0.24, i * 0.1)); break;
    case "fire":    beep(110, 0.5, "sawtooth",  0.20, 0, 70); break;
  }
}

// Soft, sparse generative pad — wanders a little, dims at night.
const MUSIC_ROOTS = [220.00, 174.61, 261.63, 196.00]; // A3, F3, C4, G3
const PENTA = [1, 9/8, 5/4, 3/2, 5/3, 2];
function pad(freq, dur, gain, type) {
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain, t + dur * 0.4);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(aMusic);
  o.start(t); o.stop(t + dur + 0.05);
}
function musicTick() {
  if (!actx || !soundOn || actx.state !== "running") return;
  const root = MUSIC_ROOTS[musicStep++ % MUSIC_ROOTS.length];
  const oct = state.isNight ? 0.5 : 1;
  pad(root * oct, 5.5, 0.07, "sine");
  pad(root * 1.5 * oct, 5.5, 0.05, "sine");
  if (!state.isNight || Math.random() < 0.5) pad(root * 2 * oct, 5.0, 0.035, "triangle");
  if (Math.random() < (state.isNight ? 0.3 : 0.6)) {
    const m = PENTA[Math.floor(Math.random() * PENTA.length)];
    pad(root * 2 * oct * m, 1.6, 0.04, "triangle");
  }
}
setInterval(musicTick, 2600);

// Sparse bird chirps in the daytime background (quiet at night).
function chirp() {
  if (!actx || !soundOn || actx.state !== "running" || state.isNight) return;
  const t0 = actx.currentTime;
  const base = 2600 + Math.random() * 1600;
  const syllables = 2 + Math.floor(Math.random() * 3);
  let w = 0;
  for (let i = 0; i < syllables; i++) {
    const t = t0 + w;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "sine";
    const f = base * (0.9 + Math.random() * 0.3);
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(f * 1.5, t + 0.035);
    o.frequency.exponentialRampToValueAtTime(f * 0.8, t + 0.08);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.07, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
    o.connect(g); g.connect(aMusic);
    o.start(t); o.stop(t + 0.1);
    w += 0.07 + Math.random() * 0.06;
  }
}
function scheduleBird() {
  setTimeout(() => { chirp(); scheduleBird(); }, 1400 + Math.random() * 4200);
}
scheduleBird();

function updateSoundBtn() {
  const b = document.getElementById("soundToggle");
  if (b) b.textContent = soundOn ? "🔊" : "🔇";
}
function setSound(on) {
  soundOn = on;
  try { localStorage.setItem("microtower.sound", on ? "1" : "0"); } catch (e) {}
  if (on) audioKick();
  if (actx && aMusic) {
    const t = actx.currentTime;
    aMusic.gain.cancelScheduledValues(t);
    aMusic.gain.setTargetAtTime(on ? 0.5 : 0.0, t, 0.3);
  }
  updateSoundBtn();
}
document.getElementById("soundToggle").addEventListener("click", (e) => {
  e.stopPropagation();
  setSound(!soundOn);
});

// ---------- Init ----------
function init() {
  buildBackground();
  buildToolbar();
  buildStars();

  const loaded = loadGame(true);
  if (loaded) {
    log("Loaded your saved tower.", "good");
  } else {
    // pre-build a free lobby across the ground floor center
    const lobbyStart = Math.floor(COLS/2) - 3;
    for (let c = lobbyStart; c < lobbyStart + 6; c++) {
      const unit = { id: state.nextId++, type: "lobby", col: c, row: 0, w: 1, h: 1, occupants: 0, satisfaction: 100 };
      placeUnit(unit);
    }
    log("Welcome to MicroTower. Build stairs/elevators, then offices & apartments above the lobby.", "good");
  }
  refreshStats();
  updateClock();
  updateSky(true);
  // scroll to ground
  scroller.scrollTop = world.clientHeight - scroller.clientHeight;
  scroller.scrollLeft = (worldWidth - scroller.clientWidth) / 2;
  selectTool("pointer");
  updateSoundBtn();
  if (isMobile()) app.classList.add("nav-closed");
  requestAnimationFrame((t) => { lastTs = t; requestAnimationFrame(tick); });
}

init();
})();
</script>
