<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroTower — a tiny Sim Tower riff</title>
<style>
  :root {
    --sky-top: #6db3e8;
    --sky-bot: #cfe9fb;
    --panel: #1f2933;
    --panel-2: #2b3947;
    --accent: #ffcf4d;
    --good: #4ade80;
    --bad: #f87171;
    --text: #e7eef5;
    --muted: #9fb1c1;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: #0e1419; color: var(--text);
    overflow: hidden;
  }
  #app { position: relative; height: 100vh; width: 100vw; overflow: hidden; }

  /* Sidebar — slides in/out as a drawer */
  #sidebar {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 250px; z-index: 30;
    background: var(--panel);
    border-right: 2px solid #000;
    display: flex; flex-direction: column;
    padding: 12px; gap: 10px;
    overflow-y: auto;
    transform: translateX(0);
    transition: transform .25s ease;
  }
  #app.nav-closed #sidebar { transform: translateX(-100%); }
  #sidebar h1 {
    font-size: 20px; margin: 0;
    letter-spacing: 1px;
    color: var(--accent);
    text-shadow: 1px 1px 0 #000;
  }
  #sidebar h1 small { display:block; font-size: 11px; color: var(--muted); letter-spacing:0; }

  .stats { display: grid; grid-template-columns: 1fr auto; gap: 4px 8px; font-size: 13px; }
  .stats .k { color: var(--muted); }
  .stats .v { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }

  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 6px 0 2px; }

  .tools { display: flex; flex-direction: column; gap: 6px; }
  .tool {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    padding: 7px 9px; cursor: pointer; user-select: none;
    transition: transform .05s, background .1s;
  }
  .tool:hover { background: #36495b; }
  .tool:active { transform: translateY(1px); }
  .tool.selected { outline: 2px solid var(--accent); background: #36495b; }
  .tool .swatch { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #000; flex: 0 0 18px; }
  .tool .label { flex: 1; font-size: 13px; font-weight: 600; }
  .tool .cost { font-size: 11px; color: var(--muted); }

  .controls { display:flex; gap:6px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 60px;
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    color: var(--text); padding: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer;
  }
  .btn:hover { background: #36495b; }
  .btn.active { background: var(--accent); color: #1a1a1a; }

  #log {
    margin-top: auto; font-size: 11px; color: var(--muted);
    background: #161d24; border: 1px solid #000; border-radius: 6px;
    padding: 6px; height: 110px; overflow-y: auto; line-height: 1.5;
  }
  #log .entry { margin-bottom: 2px; }
  #log .entry.good { color: var(--good); }
  #log .entry.bad { color: var(--bad); }

  /* Tower view */
  #stage {
    position: absolute; top: 0; right: 0; bottom: 0; left: 250px;
    overflow: hidden;
    background: linear-gradient(var(--sky-top), var(--sky-bot));
    transition: left .25s ease;
  }
  #app.nav-closed #stage { left: 0; }
  #scroller {
    position: absolute; top: 42px; left: 0; right: 0; bottom: 0;
    overflow: auto; -webkit-overflow-scrolling: touch;
  }
  #world { position: relative; }

  /* Top HUD — always visible, holds the drawer toggle + key stats */
  #hud {
    position: absolute; top: 0; left: 0; right: 0; height: 42px; z-index: 15;
    display: flex; align-items: center; gap: 10px; padding: 0 10px;
    background: rgba(20,28,36,.92); border-bottom: 2px solid #000;
    color: var(--text); font-size: 13px;
    -webkit-user-select: none; user-select: none;
  }
  #hud .hud-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  #hud .hud-item b { color: var(--accent); }
  #hud .spacer { flex: 1; }
  #menuToggle {
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    color: var(--text); font-size: 16px; line-height: 1; cursor: pointer;
    width: 34px; height: 30px; flex: 0 0 auto;
  }
  #menuToggle:active { transform: translateY(1px); }

  /* Mobile: drawer overlays the tower instead of shrinking it */
  @media (max-width: 700px) {
    #stage { left: 0 !important; }
    #sidebar { width: 84%; max-width: 300px; box-shadow: 6px 0 20px rgba(0,0,0,.55); }
    #hud .hud-item.time { display: none; }
  }
  @media (max-width: 420px) {
    #hud .hud-item.stars { display: none; }
  }

  /* Drawer header + close button (mobile) */
  .side-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  #closeNav {
    display: none; flex: 0 0 auto;
    background: var(--panel-2); border: 2px solid #000; border-radius: 6px;
    color: var(--text); width: 30px; height: 30px; font-size: 15px; line-height: 1; cursor: pointer;
  }
  #closeNav:active { transform: translateY(1px); }
  @media (max-width: 700px) { #closeNav { display: block; } }

  /* Tap-anywhere backdrop to dismiss the drawer on mobile */
  #backdrop {
    position: absolute; inset: 0; z-index: 25;
    background: rgba(0,0,0,.45); opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
  }
  @media (max-width: 700px) {
    #app:not(.nav-closed) #backdrop { opacity: 1; pointer-events: auto; }
  }

  /* Night-time lit windows */
  .unit.lit::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 38%, rgba(255,214,120,.45), transparent 72%);
  }

  /* Tap-to-build confirm bar (touch devices) */
  #placeBar {
    position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 18;
    display: none; align-items: center; gap: 8px;
    background: rgba(20,28,36,.96); border: 2px solid #000; border-radius: 12px;
    padding: 8px 10px; font-size: 13px; box-shadow: 0 6px 18px rgba(0,0,0,.45);
    max-width: 92%;
  }
  #placeBar.show { display: flex; }
  #placeBar #placeInfo { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #placeBar .btn { flex: 0 0 auto; min-width: auto; padding: 8px 12px; }
  #placeBuild { background: var(--good); color: #10241a; }
  #placeBuild:disabled { opacity: .45; }

  .floor-row { position: absolute; left: 0; display: flex; }
  .cell {
    position: absolute; box-sizing: border-box;
    border-right: 1px solid rgba(0,0,0,.08);
    border-bottom: 1px solid rgba(0,0,0,.08);
  }
  .ground { background: #5a8a3c; }
  .empty-buildable { background: rgba(255,255,255,.03); }
  .empty-buildable:hover { background: rgba(255,207,77,.25); cursor: pointer; }

  .unit {
    position: absolute; box-sizing: border-box;
    border: 1px solid rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: rgba(0,0,0,.55);
    overflow: hidden; cursor: pointer;
  }
  .unit .occ { position:absolute; bottom:2px; left:0; right:0; height:4px; }
  .unit small { font-size: 9px; opacity:.8; }

  .person {
    position: absolute; width: 6px; height: 10px; border-radius: 2px;
    bottom: 2px; transition: left .25s linear;
    box-shadow: 0 1px 0 rgba(0,0,0,.3);
  }

  #ghost {
    position: absolute; pointer-events: none; border: 2px dashed #fff;
    background: rgba(255,207,77,.3); display: none; z-index: 5;
  }
  #ghost.invalid { background: rgba(248,113,113,.35); border-color: #f87171; }

  #toast {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.8); color: #fff; padding: 8px 16px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 20;
  }
  #toast.show { opacity: 1; }

  .hint { font-size: 11px; color: var(--muted); line-height: 1.4; }
  kbd { background:#000; border-radius:3px; padding:0 4px; font-size:10px; }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="side-head">
      <h1>MicroTower <small>a tiny Sim Tower riff</small></h1>
      <button id="closeNav" title="Hide menu">✕</button>
    </div>

    <div class="stats">
      <span class="k">Cash</span><span class="v" id="s-cash">$0</span>
      <span class="k">Population</span><span class="v" id="s-pop">0</span>
      <span class="k">Floors</span><span class="v" id="s-floors">0</span>
      <span class="k">Day / Time</span><span class="v" id="s-time">1 · 6:00</span>
      <span class="k">Star Rating</span><span class="v" id="s-stars">☆☆☆☆☆</span>
      <span class="k">Next ★</span><span class="v" id="s-next">—</span>
    </div>

    <div class="section-title">Build</div>
    <div class="tools" id="tools"></div>

    <div class="section-title">Speed</div>
    <div class="controls">
      <button class="btn" data-speed="0">❚❚</button>
      <button class="btn active" data-speed="1">▶</button>
      <button class="btn" data-speed="3">▶▶</button>
      <button class="btn" data-speed="8">▶▶▶</button>
    </div>

    <div class="section-title">Game</div>
    <div class="controls">
      <button class="btn" id="btnSave">Save</button>
      <button class="btn" id="btnLoad">Load</button>
      <button class="btn" id="btnNew">New</button>
    </div>

    <div class="hint">Pick a tool, then tap an empty plot to build. <kbd>Esc</kbd> or Pointer to inspect/sell. On mobile, ✕ or tapping outside closes this menu. Progress auto-saves.</div>

    <div id="log"></div>
  </aside>

  <div id="backdrop"></div>

  <div id="stage">
    <div id="hud">
      <button id="menuToggle" title="Show/hide build menu">☰</button>
      <span class="hud-item">💰 <b id="h-cash">$0</b></span>
      <span class="hud-item">👤 <b id="h-pop">0</b></span>
      <span class="hud-item stars" id="h-stars">☆☆☆☆☆</span>
      <span class="spacer"></span>
      <span class="hud-item time" id="h-time">1 · 6:00</span>
    </div>
    <div id="scroller">
      <div id="world">
        <div id="ghost"></div>
      </div>
    </div>
    <div id="placeBar">
      <span id="placeInfo"></span>
      <button id="placeBuild" class="btn">Build ✓</button>
      <button id="placeCancel" class="btn">✗</button>
    </div>
    <div id="toast"></div>
  </div>
</div>

<script>
(() => {
"use strict";

// ---------- Configuration ----------
const CELL_W = 32;          // px per grid column
const CELL_H = 36;          // px per floor
const COLS = 40;            // tower width in cells
const GROUND_ROW = 0;       // logical floor index 0 == ground/lobby level
const MAX_FLOORS = 30;      // floors above ground you may build
const BASEMENT_FLOORS = 4;  // below ground (for parking-ish / future)
const START_CASH = 120000;

// Unit definitions. width in cells, height in floors.
const TYPES = {
  pointer:   { name: "Pointer",     cost: 0,     w: 0, h: 0, color: "transparent", tool: true },
  lobby:     { name: "Lobby",       cost: 0,     w: 1, h: 1, color: "#d9c79a", income: 0,    cap: 0,  kind: "transit" },
  office:    { name: "Office",      cost: 40000, w: 3, h: 1, color: "#9ec9e8", income: 0,    cap: 6,  kind: "work",  rent: 9000 },
  apartment: { name: "Apartment",   cost: 30000, w: 2, h: 1, color: "#f6c177", income: 0,    cap: 3,  kind: "home",  rent: 5000 },
  condo:     { name: "Condo",       cost: 60000, w: 3, h: 1, color: "#f2a65a", income: 0,    cap: 4,  kind: "home",  rent: 11000 },
  hotel:     { name: "Hotel Room",  cost: 28000, w: 3, h: 1, color: "#7fd1c4", income: 0,    cap: 5,  kind: "hotel", rent: 2200 },
  shop:      { name: "Retail Shop", cost: 25000, w: 2, h: 1, color: "#c3a6e0", income: 0,    cap: 0,  kind: "shop", draw: 1 },
  restaurant:{ name: "Restaurant",  cost: 35000, w: 3, h: 1, color: "#f08c8c", income: 0,    cap: 0,  kind: "shop", draw: 1.3 },
  cinema:    { name: "Cinema",      cost: 70000, w: 4, h: 1, color: "#b08be0", income: 0,    cap: 0,  kind: "shop", draw: 2.5 },
  stair:     { name: "Stairs",      cost: 5000,  w: 1, h: 1, color: "#8d99ae", kind: "transit" },
  elevator:  { name: "Elevator",    cost: 18000, w: 1, h: 1, color: "#5c6b7a", kind: "transit" },
  floor:     { name: "Floor Slab",  cost: 8000,  w: 1, h: 1, color: "#b8bfc7", kind: "structure" },
};

const BUILD_ORDER = ["pointer","floor","office","apartment","condo","hotel","shop","restaurant","cinema","stair","elevator"];
const STAR_THRESHOLDS = [10, 40, 100, 200, 350];
const SAVE_KEY = "microtower.save.v1";

// ---------- State ----------
const state = {
  cash: START_CASH,
  pop: 0,
  day: 1,
  minutes: 6 * 60,   // start at 6:00am
  speed: 1,
  tool: "pointer",
  units: [],         // {id,type,col,row,w,h,el,occupants,satisfaction}
  grid: {},          // "col,row" -> unit id  (occupancy map)
  nextId: 1,
  people: [],
  stars: 0,
  isNight: false,
  pending: null,
};

// ---------- DOM ----------
const world = document.getElementById("world");
const stage = document.getElementById("stage");
const scroller = document.getElementById("scroller");
const ghost = document.getElementById("ghost");
const toastEl = document.getElementById("toast");
const logEl = document.getElementById("log");

const worldWidth = COLS * CELL_W;
const totalRows = MAX_FLOORS + 1; // ground + above
const worldHeight = totalRows * CELL_H + 40; // +ground strip
world.style.width = worldWidth + "px";
world.style.height = worldHeight + "px";

// Convert logical row (0=ground, positive=up) to a pixel top.
// Higher floors are visually higher => smaller top value.
function rowTop(row) {
  return (MAX_FLOORS - row) * CELL_H;
}
function colLeft(col) { return col * CELL_W; }

// ---------- Build the static background grid ----------
function buildBackground() {
  // ground strip
  const ground = document.createElement("div");
  ground.className = "cell ground";
  ground.style.left = "0px";
  ground.style.top = rowTop(0) + CELL_H + "px";
  ground.style.width = worldWidth + "px";
  ground.style.height = "40px";
  world.appendChild(ground);

  // buildable empty cells, one element per (col,row)
  for (let row = 0; row <= MAX_FLOORS; row++) {
    for (let col = 0; col < COLS; col++) {
      const c = document.createElement("div");
      c.className = "cell empty-buildable";
      c.style.left = colLeft(col) + "px";
      c.style.top = rowTop(row) + "px";
      c.style.width = CELL_W + "px";
      c.style.height = CELL_H + "px";
      c.dataset.col = col;
      c.dataset.row = row;
      world.appendChild(c);
    }
  }
}

// ---------- Tools UI ----------
function buildToolbar() {
  const tools = document.getElementById("tools");
  BUILD_ORDER.forEach(key => {
    const t = TYPES[key];
    const div = document.createElement("div");
    div.className = "tool" + (key === state.tool ? " selected" : "");
    div.dataset.tool = key;
    div.innerHTML = `
      <span class="swatch" style="background:${t.color === 'transparent' ? '#444' : t.color}"></span>
      <span class="label">${t.name}</span>
      <span class="cost">${t.cost ? "$" + t.cost.toLocaleString() : (key==='pointer'?'inspect':'free')}</span>`;
    div.addEventListener("click", () => selectTool(key));
    tools.appendChild(div);
  });
}

function selectTool(key) {
  state.tool = key;
  document.querySelectorAll(".tool").forEach(el =>
    el.classList.toggle("selected", el.dataset.tool === key));
  ghost.style.display = "none";
  if (typeof clearPending === "function") clearPending();
  // On phones, get the drawer out of the way so the tower is tappable.
  if (key !== "pointer" && typeof isMobile === "function" && isMobile()) {
    document.getElementById("app").classList.add("nav-closed");
  }
}

// ---------- Helpers ----------
function key(col, row) { return col + "," + row; }

function cellsFree(col, row, w, h) {
  if (col < 0 || col + w > COLS) return false;
  if (row < 0 || row + h - 1 > MAX_FLOORS) return false;
  for (let dr = 0; dr < h; dr++)
    for (let dc = 0; dc < w; dc++)
      if (state.grid[key(col + dc, row + dr)]) return false;
  return true;
}

// A habitable unit needs a stair or elevator on the same floor within 8 cells.
function hasTransitAccess(col, row, w) {
  if (row === 0) return true;
  for (const u of state.units) {
    if ((u.type === "stair" || u.type === "elevator") &&
        u.row <= row && u.row + u.h - 1 >= row) {
      const gap = Math.max(u.col - (col + w), col - (u.col + u.w), 0);
      if (gap <= 8) return true;
    }
  }
  return false;
}

// ---------- Placement ----------
function tryBuild(col, row, key_) {
  const t = TYPES[key_];
  if (!t || t.tool) return;
  if (!cellsFree(col, row, t.w, t.h)) { toast("Space is occupied or out of bounds."); return; }
  if (state.cash < t.cost) { toast("Not enough cash."); flash(false); return; }
  if ((t.kind === "work" || t.kind === "home" || t.kind === "shop" || t.kind === "hotel") && !hasTransitAccess(col, row, t.w)) {
    toast("Needs stairs or an elevator within 8 cells on this floor.");
    return;
  }

  const unit = {
    id: state.nextId++,
    type: key_, col, row, w: t.w, h: t.h,
    occupants: 0, satisfaction: 100,
    revenueTimer: Math.random() * 60,
  };
  placeUnit(unit);
  state.cash -= t.cost;
  log(`Built ${t.name} on floor ${row} for $${t.cost.toLocaleString()}`, "good");
  refreshStats();
  saveGame(true);
}

function placeUnit(unit) {
  const t = TYPES[unit.type];
  for (let dr = 0; dr < unit.h; dr++)
    for (let dc = 0; dc < unit.w; dc++)
      state.grid[key(unit.col + dc, unit.row + dr)] = unit.id;

  const el = document.createElement("div");
  el.className = "unit";
  el.style.left = colLeft(unit.col) + "px";
  el.style.top = rowTop(unit.row + unit.h - 1) + "px";
  el.style.width = (unit.w * CELL_W) + "px";
  el.style.height = (unit.h * CELL_H) + "px";
  el.style.background = t.color;
  el.dataset.id = unit.id;
  el.innerHTML = `<span>${shortLabel(unit.type)}</span><div class="occ"></div>`;
  el.addEventListener("click", (e) => { e.stopPropagation(); onUnitClick(unit); });
  world.appendChild(el);
  unit.el = el;
  state.units.push(unit);
  updateUnitVisual(unit);
}

function shortLabel(type) {
  return ({office:"OFF", apartment:"APT", condo:"CONDO", hotel:"🛏", shop:"SHOP", restaurant:"REST",
           cinema:"🎬", stair:"⇅", elevator:"▮", floor:"", lobby:"LOBBY"})[type] || type;
}

function onUnitClick(unit) {
  if (state.tool === "pointer") {
    const t = TYPES[unit.type];
    const refund = Math.floor(t.cost * 0.5);
    if (unit.type === "lobby") { toast("The lobby can't be sold."); return; }
    if (confirm(`${t.name} on floor ${unit.row}\nOccupants: ${unit.occupants}/${t.cap||0}\nSatisfaction: ${Math.round(unit.satisfaction)}%\n\nSell for $${refund.toLocaleString()}?`)) {
      sellUnit(unit, refund);
    }
  }
}

function sellUnit(unit, refund) {
  for (let dr = 0; dr < unit.h; dr++)
    for (let dc = 0; dc < unit.w; dc++)
      delete state.grid[key(unit.col + dc, unit.row + dr)];
  unit.el.remove();
  state.units = state.units.filter(u => u.id !== unit.id);
  state.cash += refund;
  log(`Sold ${TYPES[unit.type].name} for $${refund.toLocaleString()}`, "bad");
  refreshStats();
  saveGame(true);
}

function updateUnitVisual(unit) {
  const t = TYPES[unit.type];
  const occBar = unit.el.querySelector(".occ");
  if (t.cap > 0) {
    const ratio = unit.occupants / t.cap;
    occBar.style.background = ratio > 0.66 ? "var(--good)" : ratio > 0 ? "var(--accent)" : "var(--bad)";
    occBar.style.width = (ratio * 100) + "%";
  } else {
    occBar.style.width = "0";
  }
  unit.el.classList.toggle("lit", !!state.isNight && (unit.occupants > 0 || unit.type === "lobby"));
}

// ---------- Day / night sky ----------
const SKY = {
  night: ["#0b1a2b", "#16324a"],
  day:   ["#6db3e8", "#cfe9fb"],
  dusk:  ["#e8895a", "#f3cd9a"],
};
function lerpColor(a, b, f) {
  const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
  const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
  const c = pa.map((v,i) => Math.round(v + (pb[i]-v)*f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function bump(x, center, width) { return Math.max(0, 1 - Math.abs(x-center)/width); }

function updateSky(force) {
  const h = state.minutes / 60;
  const bright = Math.max(0, Math.sin((h - 6) / 12 * Math.PI)); // 0 at 6/18, 1 at noon
  const duskAmt = Math.max(bump(h, 6.5, 2.5), bump(h, 18, 2.5)) * 0.7;
  let top = lerpColor(SKY.night[0], SKY.day[0], bright);
  let bot = lerpColor(SKY.night[1], SKY.day[1], bright);
  top = lerpColor(top, SKY.dusk[0], duskAmt);
  bot = lerpColor(bot, SKY.dusk[1], duskAmt);
  stage.style.background = `linear-gradient(${top}, ${bot})`;

  const isNight = bright < 0.12;
  if (force || isNight !== state.isNight) {
    state.isNight = isNight;
    state.units.forEach(u =>
      u.el.classList.toggle("lit", isNight && (u.occupants > 0 || u.type === "lobby")));
  }
}

// ---------- Mouse: ghost preview & building ----------
function pointFromEvent(e) {
  const rect = world.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.floor(x / CELL_W);
  const row = MAX_FLOORS - Math.floor(y / CELL_H);
  return { col, row };
}

scroller.addEventListener("mousemove", (e) => {
  if (IS_TOUCH) return; // touch uses the tap-to-place flow instead of hover
  const t = TYPES[state.tool];
  if (!t || t.tool || state.tool === "pointer") { ghost.style.display = "none"; return; }
  const { col, row } = pointFromEvent(e);
  if (row < 0 || row > MAX_FLOORS) { ghost.style.display = "none"; return; }
  showGhostAt(col, row, t);
});

// Touch devices have no hover preview, so they get a tap-to-place-then-confirm flow.
const IS_TOUCH = (typeof window !== "undefined") && (
  ("ontouchstart" in window) ||
  (typeof navigator !== "undefined" && navigator.maxTouchPoints > 0) ||
  (window.matchMedia && window.matchMedia("(pointer: coarse)").matches)
);

const placeBar = document.getElementById("placeBar");
const placeInfo = document.getElementById("placeInfo");
const placeBuildBtn = document.getElementById("placeBuild");

function showGhostAt(col, row, t) {
  ghost.style.display = "block";
  ghost.style.width = (t.w * CELL_W) + "px";
  ghost.style.height = (t.h * CELL_H) + "px";
  ghost.style.left = colLeft(col) + "px";
  ghost.style.top = rowTop(row + t.h - 1) + "px";
  const ok = cellsFree(col, row, t.w, t.h) && state.cash >= t.cost;
  ghost.classList.toggle("invalid", !ok);
  return ok;
}

function setPending(col, row) {
  const t = TYPES[state.tool];
  if (state.pending && state.pending.col === col && state.pending.row === row) {
    confirmPending();
    return;
  }
  state.pending = { col, row, tool: state.tool };
  const ok = showGhostAt(col, row, t);
  placeInfo.textContent = `${t.name} · floor ${row} · $${t.cost.toLocaleString()}`;
  placeBuildBtn.disabled = !ok;
  placeBar.classList.add("show");
}

function confirmPending() {
  if (!state.pending) return;
  const p = state.pending;
  tryBuild(p.col, p.row, p.tool);
  clearPending();
}

function clearPending() {
  state.pending = null;
  ghost.style.display = "none";
  placeBar.classList.remove("show");
}

placeBuildBtn.addEventListener("click", confirmPending);
document.getElementById("placeCancel").addEventListener("click", clearPending);

world.addEventListener("click", (e) => {
  if (state.tool === "pointer" || TYPES[state.tool].tool) return;
  const { col, row } = pointFromEvent(e);
  if (row < 0 || row > MAX_FLOORS) return;
  if (IS_TOUCH) setPending(col, row);
  else tryBuild(col, row, state.tool);
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") selectTool("pointer");
});

// ---------- Economy & simulation ----------
function rentableUnits() {
  return state.units.filter(u => {
    const k = TYPES[u.type].kind;
    return k === "work" || k === "home";
  });
}
function shopUnits() {
  return state.units.filter(u => TYPES[u.type].kind === "shop");
}
function hotelUnits() {
  return state.units.filter(u => TYPES[u.type].kind === "hotel");
}

// Guests check into hotels in the evening and check out in the morning.
function simHotels() {
  const evening = state.minutes >= 17 * 60 || state.minutes < 60; // 5pm–1am
  const morning = state.minutes >= 6 * 60 && state.minutes < 11 * 60; // 6am–11am
  hotelUnits().forEach(u => {
    const t = TYPES[u.type];
    if (evening && u.occupants < t.cap) {
      const appeal = 0.05 + state.stars * 0.012;
      if (Math.random() < appeal) { u.occupants++; state.pop++; updateUnitVisual(u); }
    } else if (morning && u.occupants > 0) {
      if (Math.random() < 0.25) { u.occupants--; state.pop--; updateUnitVisual(u); }
    }
  });
}

function avgSatisfaction() {
  const us = state.units.filter(u => TYPES[u.type].cap > 0);
  if (!us.length) return 100;
  return us.reduce((a, u) => a + u.satisfaction, 0) / us.length;
}

// Tenants move in over time if there is transit access and demand
function simTenants() {
  rentableUnits().forEach(u => {
    const t = TYPES[u.type];
    if (u.occupants < t.cap) {
      // chance to gain a tenant scales with overall tower appeal
      const appeal = 0.02 + state.stars * 0.01;
      if (Math.random() < appeal) {
        u.occupants++;
        state.pop++;
        updateUnitVisual(u);
        if (u.occupants === t.cap) log(`${t.name} on floor ${u.row} fully leased!`, "good");
      }
    }
    // satisfaction drifts based on transit proximity
    const access = hasTransitAccess(u.col, u.row, u.w);
    const target = access ? 100 : 40;
    u.satisfaction += (target - u.satisfaction) * 0.05;
    if (u.satisfaction < 30 && u.occupants > 0 && Math.random() < 0.1) {
      u.occupants--; state.pop--; updateUnitVisual(u);
      log(`A tenant left ${t.name} on floor ${u.row} (poor access).`, "bad");
    }
  });
}

// Daily rent payout
function collectRent() {
  let total = 0;
  rentableUnits().forEach(u => {
    const t = TYPES[u.type];
    total += Math.round((t.rent || 0) * (u.occupants / Math.max(1, t.cap)));
  });
  // hotels earn a nightly rate per checked-in guest
  hotelUnits().forEach(u => {
    total += Math.round((TYPES[u.type].rent || 0) * u.occupants);
  });
  // shops earn based on tower foot traffic, scaled by their draw
  shopUnits().forEach(u => {
    const draw = TYPES[u.type].draw || 1;
    const nearbyPop = state.pop; // simplified: whole tower foot traffic
    const earn = Math.min(8000 * draw, Math.round((nearbyPop * 120 + Math.random() * 1000) * draw));
    total += earn;
    u.occupants = Math.min(99, Math.round(earn / 100));
  });
  if (total !== 0) {
    state.cash += total;
    log(`Daily income: +$${total.toLocaleString()}`, "good");
  }
  refreshStats();
}

// Random once-a-day events that keep the tower lively.
function maybeEvent() {
  if (state.units.length < 5) return;      // grace period while getting started
  if (Math.random() > 0.4) return;          // ~40% chance per day
  const roll = Math.random();
  if (roll < 0.30) {
    const bonus = 3000 + Math.round(state.pop * 80);
    state.cash += bonus;
    toast("📈 Economic boom!");
    log(`📈 Economic boom — investors pour in: +$${bonus.toLocaleString()}`, "good");
  } else if (roll < 0.55) {
    if (avgSatisfaction() >= 70) {
      const b = 5000;
      state.cash += b;
      toast("🎩 VIP inspection passed!");
      log(`🎩 VIP inspection passed — reputation bonus: +$${b.toLocaleString()}`, "good");
    } else {
      log("🎩 A VIP toured the tower and left unimpressed by tenant satisfaction.", "bad");
    }
  } else if (roll < 0.80) {
    const fee = 1000 + state.units.length * 150;
    state.cash -= fee;
    log(`🔧 Routine maintenance and upkeep: -$${fee.toLocaleString()}`, "bad");
  } else {
    const targets = state.units.filter(u =>
      !["lobby", "floor", "stair", "elevator"].includes(u.type));
    if (targets.length) {
      const u = targets[Math.floor(Math.random() * targets.length)];
      if (u.occupants > 0) { state.pop -= u.occupants; u.occupants = 0; updateUnitVisual(u); }
      u.satisfaction = Math.max(0, u.satisfaction - 40);
      const repair = 4000;
      state.cash -= repair;
      toast("🔥 Fire!");
      log(`🔥 Fire in ${TYPES[u.type].name} on floor ${u.row}! Evacuated; repairs -$${repair.toLocaleString()}.`, "bad");
    }
  }
  refreshStats();
}

function recomputeStars() {
  // star rating by population thresholds (à la SimTower)
  let s = 0;
  for (let i = 0; i < STAR_THRESHOLDS.length; i++)
    if (state.pop >= STAR_THRESHOLDS[i]) s = i + 1;
  if (s !== state.stars) {
    if (s > state.stars) log(`★ Promoted to ${s}-star tower!`, "good");
    state.stars = s;
  }
}

// ---------- People dots (visual flavor) ----------
function spawnPerson() {
  if (state.people.length > 60) return;
  const homes = rentableUnits().filter(u => u.occupants > 0);
  if (homes.length === 0) return;
  const u = homes[Math.floor(Math.random() * homes.length)];
  const el = document.createElement("div");
  el.className = "person";
  el.style.background = `hsl(${Math.floor(Math.random()*360)},60%,55%)`;
  el.style.left = colLeft(u.col + Math.random() * u.w) + "px";
  el.style.top = (rowTop(u.row) + CELL_H - 12) + "px";
  world.appendChild(el);
  const person = { el, col: u.col, row: u.row, life: 200 + Math.random()*200 };
  state.people.push(person);
}

function movepeople() {
  for (let i = state.people.length - 1; i >= 0; i--) {
    const p = state.people[i];
    p.life--;
    p.col += (Math.random() - 0.5) * 1.5;
    p.col = Math.max(0, Math.min(COLS - 1, p.col));
    p.el.style.left = colLeft(p.col) + "px";
    if (p.life <= 0) { p.el.remove(); state.people.splice(i, 1); }
  }
}

// ---------- Time loop ----------
let lastTs = 0;
let minuteAccumulator = 0;

function tick(ts) {
  const dt = Math.min(100, ts - lastTs);
  lastTs = ts;
  if (state.speed > 0) {
    // advance sim minutes
    minuteAccumulator += dt * state.speed * 0.06; // tune: ~ minutes per ms
    while (minuteAccumulator >= 1) {
      advanceMinute();
      minuteAccumulator -= 1;
    }
  }
  requestAnimationFrame(tick);
}

function advanceMinute() {
  state.minutes++;
  if (state.minutes % 5 === 0) { simTenants(); simHotels(); movepeople(); }
  if (state.minutes % 20 === 0) spawnPerson();
  if (state.minutes >= 24 * 60) {
    state.minutes = 0;
    state.day++;
    collectRent();
    recomputeStars();
    maybeEvent();
    saveGame(true);
  }
  updateClock();
}

function updateClock() {
  const h = Math.floor(state.minutes / 60);
  const m = state.minutes % 60;
  const txt = `${state.day} · ${h}:${m.toString().padStart(2, "0")}`;
  document.getElementById("s-time").textContent = txt;
  document.getElementById("h-time").textContent = txt;
  updateSky(false);
}

// animation for people on a steadier cadence
setInterval(() => { if (state.speed > 0) movepeople(); }, 250);

// ---------- Stats / UI ----------
function refreshStats() {
  const cash = "$" + state.cash.toLocaleString();
  const stars = "★".repeat(state.stars) + "☆".repeat(5 - state.stars);
  const floorsUsed = new Set(state.units.map(u => u.row)).size;
  document.getElementById("s-cash").textContent = cash;
  document.getElementById("s-pop").textContent = state.pop;
  document.getElementById("s-floors").textContent = floorsUsed;
  document.getElementById("s-stars").textContent = stars;
  document.getElementById("h-cash").textContent = cash;
  document.getElementById("h-pop").textContent = state.pop;
  document.getElementById("h-stars").textContent = stars;
  const nextEl = document.getElementById("s-next");
  nextEl.textContent = state.stars >= STAR_THRESHOLDS.length
    ? "MAX ★★★★★"
    : `${state.pop} / ${STAR_THRESHOLDS[state.stars]} pop`;
}

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toastEl.classList.remove("show"), 1800);
}
function flash(good) { /* hook for future fx */ }

function log(msg, cls) {
  const e = document.createElement("div");
  e.className = "entry" + (cls ? " " + cls : "");
  const h = Math.floor(state.minutes / 60), m = state.minutes % 60;
  e.textContent = `[${h}:${m.toString().padStart(2,"0")}] ${msg}`;
  logEl.prepend(e);
  while (logEl.children.length > 40) logEl.lastChild.remove();
}

// ---------- Speed buttons ----------
document.querySelectorAll("[data-speed]").forEach(btn => {
  btn.addEventListener("click", () => {
    state.speed = Number(btn.dataset.speed);
    document.querySelectorAll("[data-speed]").forEach(b =>
      b.classList.toggle("active", b === btn));
  });
});

// ---------- Drawer toggle ----------
const app = document.getElementById("app");
function isMobile() { return window.matchMedia("(max-width: 700px)").matches; }
function openNav()  { app.classList.remove("nav-closed"); }
function closeNav() { app.classList.add("nav-closed"); }
document.getElementById("menuToggle").addEventListener("click", () => app.classList.toggle("nav-closed"));
document.getElementById("closeNav").addEventListener("click", closeNav);
document.getElementById("backdrop").addEventListener("click", closeNav);

// ---------- Save / Load / New ----------
function clearWorld() {
  state.units.forEach(u => u.el && u.el.remove());
  state.people.forEach(p => p.el && p.el.remove());
  state.units = [];
  state.grid = {};
  state.people = [];
}

function saveGame(silent) {
  const data = {
    cash: state.cash, pop: state.pop, day: state.day, minutes: state.minutes,
    stars: state.stars, nextId: state.nextId,
    units: state.units.map(u => ({
      id: u.id, type: u.type, col: u.col, row: u.row,
      occupants: u.occupants, satisfaction: u.satisfaction,
    })),
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    if (!silent) { toast("Tower saved."); log("Game saved.", "good"); }
  } catch (e) {
    if (!silent) toast("Save failed (storage unavailable).");
  }
}

function loadGame(silent) {
  let raw = null;
  try { raw = localStorage.getItem(SAVE_KEY); } catch (e) {}
  if (!raw) { if (!silent) toast("No saved tower found."); return false; }
  let d;
  try { d = JSON.parse(raw); } catch (e) { return false; }
  clearWorld();
  state.cash = d.cash; state.pop = d.pop; state.day = d.day;
  state.minutes = d.minutes; state.stars = d.stars; state.nextId = d.nextId || 1;
  (d.units || []).forEach(su => {
    const t = TYPES[su.type];
    if (!t) return;
    placeUnit({
      id: su.id, type: su.type, col: su.col, row: su.row, w: t.w, h: t.h,
      occupants: su.occupants || 0,
      satisfaction: su.satisfaction == null ? 100 : su.satisfaction,
    });
  });
  refreshStats(); updateClock(); updateSky(true);
  if (!silent) { toast("Tower loaded."); }
  return true;
}

function newGame() {
  if (!confirm("Start a new tower? This clears your current one.")) return;
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  location.reload();
}

document.getElementById("btnSave").addEventListener("click", () => saveGame(false));
document.getElementById("btnLoad").addEventListener("click", () => loadGame(false));
document.getElementById("btnNew").addEventListener("click", newGame);

// ---------- Init ----------
function init() {
  buildBackground();
  buildToolbar();

  const loaded = loadGame(true);
  if (loaded) {
    log("Loaded your saved tower.", "good");
  } else {
    // pre-build a free lobby across the ground floor center
    const lobbyStart = Math.floor(COLS/2) - 3;
    for (let c = lobbyStart; c < lobbyStart + 6; c++) {
      const unit = { id: state.nextId++, type: "lobby", col: c, row: 0, w: 1, h: 1, occupants: 0, satisfaction: 100 };
      placeUnit(unit);
    }
    log("Welcome to MicroTower. Build stairs/elevators, then offices & apartments above the lobby.", "good");
  }
  refreshStats();
  updateClock();
  updateSky(true);
  // scroll to ground
  scroller.scrollTop = world.clientHeight - scroller.clientHeight;
  scroller.scrollLeft = (worldWidth - scroller.clientWidth) / 2;
  selectTool("pointer");
  if (isMobile()) app.classList.add("nav-closed");
  requestAnimationFrame((t) => { lastTs = t; requestAnimationFrame(tick); });
}

init();
})();
</script>
