<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scroll layer test 2</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; overflow:hidden; overscroll-behavior:none;
               font-family: system-ui, sans-serif; }
  #app   { position: fixed; inset:0; overflow:hidden; }
  #stage { position:absolute; inset:0; overflow:hidden;
           background: linear-gradient(#9ecbff, #dff0ff); }

  /* z0 group, exactly like the game: cityBg + skyTint + sky (sun/stars) */
  #cityBg { position:absolute; inset:0; z-index:0; pointer-events:none;
            background: linear-gradient(to top, #5a6b8c 0 40%, transparent 60%);
            background-size:100% 60%; background-position:center bottom; background-repeat:no-repeat; }
  #skyTint { position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.1;
             background:linear-gradient(#000,#223); }
  #sky { position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden;
         transform: translateZ(0); will-change: transform; }
  #stars { position:absolute; inset:0; }
  #sun  { position:absolute; left:50%; top:70px; width:60px; height:60px; margin-left:-30px;
          border-radius:50%; background:radial-gradient(circle at 38% 38%,#fff6c8,#ffd24a 60%,#ffb020);
          box-shadow:0 0 30px 8px rgba(255,200,60,.5); }
  .star { position:absolute; width:4px; height:4px; border-radius:50%; background:#fff;
          box-shadow:0 0 4px 1px #fff; }
  #label { position:absolute; left:0; right:0; top:140px; text-align:center; z-index:0;
           font-weight:700; color:#1a3; text-shadow:0 1px 2px #fff; }

  #scroller { position:absolute; top:42px; left:0; right:0; bottom:0; z-index:1;
              overflow:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  #world { position:relative; width:100%; height:3000px;
           background: repeating-linear-gradient(
             to bottom, rgba(60,80,120,.0) 0 78px, rgba(40,60,100,.85) 78px 80px); }
  .floor { position:absolute; left:8px; color:#fff; font:600 13px system-ui; }
  #hud { position:absolute; top:0; left:0; right:0; height:42px; z-index:15;
         background:#142; color:#fff; display:flex; align-items:center; padding:0 10px; }
</style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="cityBg"></div>
      <div id="skyTint"></div>
      <div id="sky">
        <div id="stars"></div>
        <div id="sun"></div>
        <div id="label">⬆ SUN + ✦ stars should stay HERE while you scroll ⬆</div>
      </div>
      <div id="hud">HUD bar</div>
      <div id="scroller"><div id="world"></div></div>
    </div>
  </div>
<script>
  var sky=document.getElementById('sky'), stars=document.getElementById('stars');
  for (var i=0;i<40;i++){ var s=document.createElement('div'); s.className='star';
    s.style.left=(Math.random()*100)+'%'; s.style.top=(Math.random()*40+5)+'%'; stars.appendChild(s); }
  var w=document.getElementById('world');
  for (var f=0; f<38; f++){ var d=document.createElement('div'); d.className='floor';
    d.style.top=(f*80+4)+'px'; d.textContent='Floor '+(38-f)+' — scroll me'; w.appendChild(d); }
  var sc=document.getElementById('scroller'), cityBg=document.getElementById('cityBg');

  // ==== This mirrors the game's positionCity(): mutate cityBg transform AND the
  //      stars mask on EVERY scroll event. This is the prime suspect. ====
  function positionCity(){
    var sh = document.getElementById('stage').clientHeight || 700;
    var dy = Math.max(-sh*0.85, Math.min(sh*0.25, (1000 - sc.scrollTop) ));
    cityBg.style.transform = 'translateY(' + dy.toFixed(1) + 'px)';
    var horizon = dy + sh*0.40;
    var p2 = Math.max(0, Math.min(100, horizon/sh*100)), p1 = Math.max(0, p2-7);
    var g = 'linear-gradient(to bottom, #000 '+p1.toFixed(1)+'%, transparent '+p2.toFixed(1)+'%)';
    stars.style.webkitMaskImage = g; stars.style.maskImage = g;
  }
  sc.addEventListener('scroll', positionCity, {passive:true});
  sc.scrollTop = 1400; positionCity();
</script>
</body>
</html>
