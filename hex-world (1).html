    // size — BUT only when they're genuinely isolated, so island CHAINS and
    // offshore archipelagos (many small blobs clustered, or near a continent)
    // survive. "Isolated" = little other land within a small radius.
    {
      const isLand = (c) => !HYDRO.isLiquid(c.terrain);
      const seen = new Set();
      const blobs = [];
      for (const start of cells) {
        if (!isLand(start) || seen.has(start.id)) continue;
        const q = [start]; seen.add(start.id);
        const blob = [];
        while (q.length) {
          const c = q.pop(); blob.push(c);
          for (const d of HexMath.DIRS) {
            const nb = nbr(c, d);
            if (nb && isLand(nb) && !seen.has(nb.id)) { seen.add(nb.id); q.push(nb); }
          }
        }
        blobs.push(blob);
      }
      const maxSpeck = Math.round(P.minIsland);              // blobs this size or smaller may sink (0 = off)
      if (maxSpeck >= 1) {
      // Precompute blob sizes by cell for quick "is there a big landmass nearby" tests.
      const blobOf = new Map();
      for (const blob of blobs) for (const c of blob) blobOf.set(c.id, blob);
      const tightR = HexMath.SIZE * 2.0;   // a true chain sits this close
      const shelfR = HexMath.SIZE * 2.6;   // offshore-of-continent distance
      for (const blob of blobs) {
        if (blob.length > maxSpeck) continue;                 // real island/continent: keep
        const ids = new Set(blob.map((c) => c.id));
        // Survive only if EITHER: a substantial landmass (>=8 tiles) sits within
        // shelf range (offshore archipelago), OR several other small blobs cluster
        // tightly nearby (a genuine island chain). Lone specks in open water sink.
        let nearBigLand = false, nearbyClusterMass = 0;
        for (const c of blob) {
          for (const o of cells) {
            if (ids.has(o.id) || !isLand(o)) continue;
            let dx = Math.abs(o.cx - c.cx); dx = Math.min(dx, wX - dx);
            const dist = Math.hypot(dx, o.cy - c.cy);
            if (dist < shelfR && (blobOf.get(o.id)?.length || 0) >= 8) { nearBigLand = true; break; }
            if (dist < tightR) nearbyClusterMass++;
          }
          if (nearBigLand) break;
        }
        if (nearBigLand || nearbyClusterMass >= 3) continue;  // offshore or tight chain: keep
        // lone speck in open water → sink to sea
        for (const c of blob) {
          c.elev = Math.min(c.elev, seaLevel - 0.03);
          c.terrain = HYDRO.seaMaterial;
          c.isLake = false;
        }
      }
      }
    }

    // shallow coastal rim: deep-liquid tile adjacent to ANY land => shallow
    for (const c of cells) {
      if (c.terrain !== HYDRO.seaMaterial) continue;
      for (const d of HexMath.DIRS) {
        const nb = nbr(c, d);
        if (nb && !HYDRO.isLiquid(nb.terrain)) { c.terrain = HYDRO.shallowMaterial; break; }
      }
    }
  }

  // ===== build edges (start empty; rivers/cliffs fill them) =====
  const edges = new Map();
  const edgeKeyOf = (a, b) => canonicalEdgeKey(a, b);
  const ensureEdge = (a, b) => {
    const key = edgeKeyOf(a, b);
    let e = edges.get(key);
    if (!e) { e = { a, b, feature: null, blocked: false, dirCost: null }; edges.set(key, e); }
    return e;
  };
  const setFeature = (a, b, feature) => {
    const e = ensureEdge(a, b);
    const def = EDGE_FEATURE[feature];
    e.feature = feature;
    e.blocked = !!def.blocked;
    e.dirCost = { [a]: def.cross, [b]: def.cross };
  };

  // ===== VEGETATION / COVER SYNC (runs after ALL terrain mutations) ==========
  // The classifier stamped c.base/c.cover, but jungle-coherence, lake assignment,
  // puddle-reclaim and island despeckle can all rewrite c.terrain afterward. Now
  // that terrain is final, re-derive every axis so base, cover, vegetation and
  // ground always agree:
  //   - cover      = the climate cover on the tile (null on hills/water/mtn/etc.)
  //   - vegetation = the TREE subset of cover (what a chop removes)
  //   - ground     = the base landform revealed when the cover is cleared
  {
    for (const c of cells) syncCoverFields(c);
  }

  // ===== PASS 5: coherent rivers =====
  // Pipeline: (a) depression-fill so every land tile drains to the sea,
  // (b) flow direction (steepest descent) + flow accumulation,
  // (c) trace connected rivers from sources DOWNHILL edge-by-edge to the sea,
  //     enforcing a minimum length so we never emit orphan single edges.
  const land = cells.filter((c) => !HYDRO.isLiquid(c.terrain));
  const isWater = (cell) => HYDRO.isLiquid(cell.terrain);

  // --- (a) DEPRESSION FILLING (priority-flood, Planchon–Darboux style) -------
  // Raise the surface of every pit until it has a downhill escape to the sea.
  // We compute a "filled elevation" without touching the terrain/biome elevation.
  // CRUCIAL: the order tiles leave the priority queue is itself a valid drainage
  // order — each tile is first reached from an already-processed, no-higher
  // neighbor. Recording that predecessor as the tile's drainage direction gives
  // every land tile a downhill pointer that PROVABLY reaches water, with zero
  // dead-ends (which steepest-descent suffers on flat filled basins).
  const filled = new Map();
  const drainTo = new Map(); // land cell id -> neighbor it drains into (toward water)
  {
    const EPS = 1e-4;
    const pq = new MinHeap();
    const seen = new Set();
    for (const c of cells) {
      if (isWater(c)) { filled.set(c.id, c.elev); pq.push(c.id, c.elev); seen.add(c.id); }
    }
    while (pq.size() > 0) {
      const cid = pq.pop();
      const cElev = filled.get(cid);
      const c = index.get(cid);
      for (const d of HexMath.DIRS) {
        const nb = nbr(c, d);
        if (!nb || seen.has(nb.id)) continue;
        seen.add(nb.id);
        const fe = Math.max(nb.elev, cElev + EPS); // never below the path we came from
        filled.set(nb.id, fe);
        if (!isWater(nb)) drainTo.set(nb.id, cid); // nb drains toward the lower 'c'
        pq.push(nb.id, fe);
      }
    }
    for (const c of cells) if (!filled.has(c.id)) filled.set(c.id, c.elev);
  }
  const fElev = (cell) => filled.get(cell.id);

  // --- (b) FLOW DIRECTION + ACCUMULATION --------------------------------------
  // downhill = the flood-predecessor drainage map (guaranteed to reach water).
  const downhill = drainTo;
  // accumulate upstream contribution by processing high -> low (filled elev)
  const flow = new Map();
  for (const c of land) flow.set(c.id, 1 + c.moist * 0.5); // base + rainfall weight
  const byFilledDesc = [...land].sort((a, b) => fElev(b) - fElev(a));
  for (const c of byFilledDesc) {
    const downId = downhill.get(c.id);
    if (downId && !isWater(index.get(downId))) {
      flow.set(downId, (flow.get(downId) || 0) + (flow.get(c.id) || 0));
    }
  }

  // --- lake outlets: for each lake, find the lowest land rim tile (its outlet)
  // so a river entering the lake can resume flowing downhill from there. ----
  const lakeOutlet = new Map(); // any lake-cell id -> outlet land cell id (or null)
  {
    const seenLake = new Set();
    for (const c of cells) {
      if (!HYDRO.isLake(c.terrain) || seenLake.has(c.id)) continue;
      // BFS the lake body
      const queue = [c]; seenLake.add(c.id);
      const body = [];
      while (queue.length) {
        const x = queue.pop(); body.push(x);
        for (const d of HexMath.DIRS) {
          const nb = nbr(x, d);
          if (nb && HYDRO.isLake(nb.terrain) && !seenLake.has(nb.id)) { seenLake.add(nb.id); queue.push(nb); }
        }
      }
      // lowest filled-elevation land tile bordering the lake = outlet
      let outlet = null, outE = Infinity;
      for (const lc of body) {
        for (const d of HexMath.DIRS) {
          const nb = nbr(lc, d);
          if (nb && !isWater(nb) && fElev(nb) < outE) { outE = fElev(nb); outlet = nb; }
        }
      }
      for (const lc of body) lakeOutlet.set(lc.id, outlet ? outlet.id : null);
    }
  }

  // --- label CONTINENTS (connected land masses) so we can guarantee coverage ---
  // Each land cell gets c.continent (an id); we track each continent's size. A
  // "major" continent is one above a size threshold — every major continent must
  // end up with at least one river (enforced after the main pass below).
  const continentSize = new Map(); // continentId -> tile count
  {
    let cid = 0;
    const seen = new Set();
    for (const start of land) {
      if (seen.has(start.id)) continue;
      const q = [start]; seen.add(start.id);
      const members = [];
      while (q.length) {
        const c = q.pop(); members.push(c); c.continent = cid;
        for (const d of HexMath.DIRS) {
          const nb = nbr(c, d);
          if (nb && !isWater(nb) && !seen.has(nb.id)) { seen.add(nb.id); q.push(nb); }
        }
      }
      continentSize.set(cid, members.length);
      cid++;
    }
  }
  // a continent counts as "major" if it's at least this many tiles
  const MAJOR_CONTINENT = Math.max(12, Math.round(cells.length * 0.012));

  // --- (c) TRACE CONNECTED RIVERS from sources to the sea ---------------------
  // "A few major rivers": pick the highest-accumulation sources, then walk
  // downhill laying continuous edges until reaching the ocean or an existing
  // river. Rivers may END at a lake, and may FLOW OUT of a lake via its outlet.
  const flowVals = [...flow.values()].sort((a, b) => a - b);
  // source threshold: only tiles with enough upstream flow can start a river
  const pct = 0.62 + P.riverThreshold * 0.22;
  const sourceCut = flowVals[Math.min(flowVals.length - 1, Math.floor(flowVals.length * pct))] || Infinity;
  const MIN_RIVER_EDGES = 2;     // never emit a river shorter than this
  const MAX_RIVERS = Math.max(3, Math.round(11 - P.riverThreshold * 6)); // a few
  const isOcean = (cell) => HYDRO.isSea(cell.terrain);
  const isLake = (cell) => HYDRO.isLake(cell.terrain);

  // Sources are HEADWATERS: tiles that clear the flow cut, ranked by ELEVATION
  // (highest first). Starting high gives the downhill walk the full slope to
  // traverse, producing long rivers instead of short stubs near the coast.
  const sources = land
    .filter((c) => (flow.get(c.id) || 0) >= sourceCut)
    .sort((a, b) => b.elev - a.elev);

  const riverCells = new Set();  // tiles already part of some river channel
  const riverCorners = new Set(); // corner ids touched by a river edge (cliffs avoid)
  let riversMade = 0;
  const riverEdgeFlow = new Map(); // edgeKey -> accumulated flow (for width)
  const riverChains = [];          // ordered tile-id sequences, for drawing polylines

  // lay a connected run of edges as a river if it meets the minimum length.
  // `minEdges` lets the coverage-guarantee pass accept shorter runs so small
  // major continents still get a river rather than none.
  const laySegment = (seg, minEdges = MIN_RIVER_EDGES) => {
    if (seg.length < minEdges) return false;
    const chain = [seg[0][0]]; // ordered tile ids: first 'a', then each 'b'
    for (const [a, b] of seg) {
      setFeature(a, b, "river");
      const ekey = edgeKeyOf(a, b);
      const fv = Math.max(flow.get(a) || 0, flow.get(b) || 0);
      riverEdgeFlow.set(ekey, fv);
      if (!isWater(index.get(a))) riverCells.add(a);
      if (!isWater(index.get(b))) riverCells.add(b);
      // record the two corners of this river edge so cliffs can steer clear of
      // riverbanks (a cliff sharing a river's corner tangles with it visually)
      const ca = index.get(a);
      if (ca) {
        for (let di = 0; di < 6; di++) {
          const n = nbr(ca, HexMath.DIRS[di]);
          if (n && n.id === b) {
            const [e1, e2] = HexMath.edgeCornerIdx(di);
            const corners = HexMath.cornersOf(ca.cx, ca.cy);
            riverCorners.add(corners[e1].id); riverCorners.add(corners[e2].id);
            break;
          }
        }
      }
      chain.push(b);
    }
    riverChains.push(chain);
    return true;
  };

  for (const c of cells) c.delta = false; // future-gameplay flag (drawing is edge-based)
  const deltaCandidates = []; // {landId, seaId, flow} at river mouths
  const servedContinents = new Set(); // continent ids that already have a river
  const confluences = [];             // {tribTile, riverTile} pairs at junctions

  // Trace a single river from a source downhill to water; lay it if valid.
  // Returns true if a river was actually drawn. Records the source continent.
  const traceRiver = (src, minEdges = MIN_RIVER_EDGES) => {
    if (riverCells.has(src.id)) return false; // don't start on an existing river
    // Walk downhill. A river is a sequence of CONNECTED edge-runs ("segments").
    // Crossing a lake breaks connectivity: the inflow segment ends at the lake
    // shore, and a fresh segment may emerge from the lake's outlet. Each segment
    // must independently satisfy MIN_RIVER_EDGES, so we never emit orphan stubs.
    const segments = [];        // array of edge-runs
    let seg = [];               // current connected run
    const visited = new Set();
    let cur = src;
    let madeWater = false;
    let endedOnWater = false;    // did the CURRENT (final) seg reach water/river?
    while (cur) {
      visited.add(cur.id);
      const downId = downhill.get(cur.id);
      if (!downId) break;
      const down = index.get(downId);
      // down came from `downhill` (built via wrap-aware nbr), so it's always a
      // genuine neighbor — confirm via nbr so seam-crossing rivers aren't rejected
      let adjacent = false;
      for (const d of HexMath.DIRS) { const n = nbr(cur, d); if (n && n.id === downId) { adjacent = true; break; } }
      if (!adjacent) break;

      if (isOcean(down)) {
        seg.push([cur.id, downId]); madeWater = true; endedOnWater = true;
        // river mouth: cur (last land) → down (sea). Candidate for a delta, but
        // only if the river is substantial — total edge-length across all of its
        // connected segments (including this final run). Short trickles (< 3
        // edges) reach the sea without building a delta.
        let riverLen = seg.length;
        for (const s of segments) riverLen += s.length;
        deltaCandidates.push({ landId: cur.id, seaId: downId, flow: flow.get(cur.id) || 0, riverLen });
        break;
      }
      if (riverCells.has(downId)) {
        seg.push([cur.id, downId]); madeWater = true; endedOnWater = true;
        // tributary joins an existing river: the confluence is the shared edge
        // between cur (tributary's last land tile) and down (receiving river).
        // Record the pair so the renderer can pin the receiving river to pass
        // through the junction (a tributary's true "mouth" IS this confluence).
        confluences.push({ tribTile: cur.id, riverTile: downId });
        break;
      }

      if (isLake(down)) {
        // inflow segment ends at the lake shore (draw the edge to the lake)
        seg.push([cur.id, downId]);
        segments.push(seg); seg = [];
        madeWater = true; endedOnWater = true;
        const outId = lakeOutlet.get(downId);
        if (outId && !visited.has(outId)) { cur = index.get(outId); endedOnWater = false; continue; }
        break; // no outlet: river terminates at this lake
      }

      seg.push([cur.id, downId]);
      endedOnWater = false;       // advanced onto land; not yet at water
      if (visited.has(downId)) break;
      cur = down;
    }
    // If the final open run did NOT end on water/river, discard it — it's a
    // dead-end stub (depression, cycle, or broken adjacency on dry land). This
    // prevents orphan fragments that flow from land to land and connect to
    // nothing. Segments closed earlier (e.g. a lake inflow) are kept.
    if (seg.length && endedOnWater) segments.push(seg);

    // Only accept rivers that actually reached water (ocean, lake, or a river
    // that itself reaches water). Drainage is guaranteed to reach water now, so
    // this mainly rejects the rare too-short head segment. Never draw a river
    // that stops on dry land.
    let laid = false;
    if (madeWater) {
      for (const s of segments) if (laySegment(s, minEdges)) laid = true;
    }
    if (laid && src.continent != null) servedContinents.add(src.continent);
    return laid;
  };

  // main pass: a few major rivers from the strongest sources
  for (const src of sources) {
    if (riversMade >= MAX_RIVERS) break;
    if (traceRiver(src)) riversMade++;
  }

  // GUARANTEE: every MAJOR continent gets at least one river. For any major
  // continent the main pass missed, take its best remaining source (highest
  // flow, then highest elevation) and force a river — even past MAX_RIVERS, so
  // coverage is never sacrificed to the river cap.
  {
    // group candidate sources by continent (any land tile with some flow works,
    // not just those above the global cut — a dry continent still gets one)
    const byContinent = new Map();
    for (const c of land) {
      if (c.continent == null) continue;
      if ((continentSize.get(c.continent) || 0) < MAJOR_CONTINENT) continue;
      if (servedContinents.has(c.continent)) continue;
      const arr = byContinent.get(c.continent) || [];
      arr.push(c); byContinent.set(c.continent, arr);
    }
    for (const [cid, arr] of byContinent) {
      if (servedContinents.has(cid)) continue; // may have been served as we go
      // best source: highest flow, tie-break highest elevation
      arr.sort((a, b) => (flow.get(b.id) || 0) - (flow.get(a.id) || 0) || b.elev - a.elev);
      // try sources in order; accept a short (>=1 edge) river so small majors
      // still get one rather than staying dry.
      for (const src of arr) {
        if (traceRiver(src, 1)) { riversMade++; break; }
      }
    }
  }

  // TRIBUTARIES: the main pass makes trunk rivers; few of them happen to merge.
  // Real river systems are branching, so we add a modest number of tributaries
  // ON PURPOSE: moderate-flow headwaters whose downhill path reaches an EXISTING
  // river (not the sea) become tributaries that join the trunk. We pick them
  // smartly — only sources that actually drain into a trunk — and cap the count
  // so the map stays realistic rather than overrun with creeks.
  {
    // does walking downhill from `src` reach an existing river cell (and how far)?
    const drainsToRiver = (src) => {
      let cur = src, steps = 0;
      const seen = new Set();
      while (cur && steps < 40) {
        seen.add(cur.id);
        const downId = downhill.get(cur.id);
        if (!downId) return null;
        if (riverCells.has(downId)) return steps + 1;       // hits a trunk → tributary
        const down = index.get(downId);
        if (!down || isOcean(down) || isLake(down)) return null; // reaches sea/lake on its own
        if (seen.has(downId)) return null;
        cur = down; steps++;
      }
      return null;
    };
    // candidate tributary sources: moderate flow (below trunk cut but not trivial),
    // not already on a river, and whose downhill path lands on a trunk river.
    const tribCut = flowVals[Math.floor(flowVals.length * 0.45)] || 0; // lower than sourceCut
    const tribCandidates = land
      .filter((c) => !riverCells.has(c.id))
      .filter((c) => { const f = flow.get(c.id) || 0; return f >= tribCut && f < sourceCut; })
      .map((c) => ({ c, steps: drainsToRiver(c) }))
      .filter((o) => o.steps != null && o.steps >= MIN_RIVER_EDGES)
      .sort((a, b) => (flow.get(b.c.id) || 0) - (flow.get(a.c.id) || 0)); // strongest first

    // cap tributaries relative to trunk count so systems look branching but not busy
    const maxTribs = Math.max(2, Math.round(riversMade * 1.2));
    let made = 0;
    for (const o of tribCandidates) {
      if (made >= maxTribs) break;
      if (riverCells.has(o.c.id)) continue;        // another tributary may have claimed it
      // keep them spaced: skip if the source is already adjacent to a river
      let touchesRiver = false;
      for (const d of HexMath.DIRS) { const n = nbr(o.c, d); if (n && riverCells.has(n.id)) { touchesRiver = true; break; } }
      if (touchesRiver) continue;
      if (traceRiver(o.c)) made++;
    }
  }

  // moisture bump along rivers (riparian zones read greener)
  for (const id of riverCells) {
    const c = index.get(id);
    if (c && !isWater(c)) c.moist = Math.min(1, c.moist + 0.12);
  }
  // re-classify river-adjacent tiles so the moisture bump shows in biomes
  for (const id of riverCells) {
    const c = index.get(id);
    if (c && !isWater(c)) { c.terrain = classifyBiome(c, seaLevel); syncCoverFields(c); }
  }

  // ===== build river geometry: EDGE-RIVERS along the hex-corner lattice =====
  // True Civ VI model: a river is a connected chain of HEX EDGES that turns only
  // at corners and never crosses a tile interior. For each flow step A->B we take
  // the shared A|B edge (two corners); between consecutive shared edges we walk
  // the upstream tile's PERIMETER (shorter arc) so the chain stays corner-
  // connected. Verified to produce zero disconnected jumps on straight/bent flow.
  const riverPaths = (() => {
    const flowVals2 = [...riverEdgeFlow.values()];
    const fMax = Math.max(1, ...flowVals2);
    const widthOf = (fv) => 1 + Math.min(1, Math.sqrt(fv / fMax)); // 1.0 .. 2.0

    // neighbor-direction index from a to b (wrap-aware)
    const dirIndexTo = (a, b) => {
      for (let i = 0; i < 6; i++) { const n = nbr(a, HexMath.DIRS[i]); if (n && n.id === b.id) return i; }
      return -1;
    };

    // Does corner index k of tile `a` touch WATER (ocean/sea OR lake)? A corner is
    // shared by the two neighbors flanking it: the edges (k-1..k) and (k..k+1).
    // The neighbor whose facing edge uses corner k is found by inverting the
    // dir->edge map. We check both flanking neighbors for liquid. Including lakes
    // (not just sea) ensures a river that ends on a lake stops at the first vertex
    // touching the lake, instead of walking an extra segment along the shore.
    const waterAtCorner = (a, k) => {
      for (let dir = 0; dir < 6; dir++) {
        const e = HexMath.dirToEdgeIndex(dir);        // this neighbor's shared-edge start corner
        if (e === k || (e + 1) % 6 === k) {           // corner k lies on this neighbor's edge
          const n = nbr(a, HexMath.DIRS[dir]);
          if (n && HYDRO.isLiquid(n.terrain)) return true;
        }
      }
      return false;
    };

    const paths = [];
    for (const chain of riverChains) {
      const pts = [];
      let wSum = 0, wN = 0;
      let reachedWater = false;
      const pushPt = (c) => { if (!pts.length || pts[pts.length - 1].id !== c.id) pts.push(c); };
      // small cache so cornersOf isn't recomputed per push
      let _caCacheId = null, _caCache = null;
      const ca_of = (a) => { if (_caCacheId !== a.id) { _caCacheId = a.id; _caCache = HexMath.cornersOf(a.cx, a.cy); } return _caCache; };
      // push a corner, but if it touches water (sea or lake), mark the river ended
      const pushUntilWater = (a, k) => {
        pushPt(ca_of(a)[k]);
        if (waterAtCorner(a, k)) reachedWater = true;
      };

      for (let i = 0; i < chain.length - 1 && !reachedWater; i++) {
        const a = index.get(chain[i]), b = index.get(chain[i + 1]);
        if (!a || !b) continue;
        const di = dirIndexTo(a, b);
        if (di < 0) continue;
        const ca = ca_of(a);
        const [e1, e2] = HexMath.edgeCornerIdx(di);   // shared A|B edge corner indices

        if (pts.length === 0) {
          pushUntilWater(a, e1); if (reachedWater) break;
          pushUntilWater(a, e2);
        } else {
          const lastId = pts[pts.length - 1].id;
          const startIdx = ca.findIndex((c) => c.id === lastId);
          if (startIdx < 0) {
            pushUntilWater(a, e1); if (reachedWater) break;
            pushUntilWater(a, e2);
          } else {
            const toE1 = HexMath.cornerArc(startIdx, e1).length;
            const toE2 = HexMath.cornerArc(startIdx, e2).length;
            const [near, far] = toE1 <= toE2 ? [e1, e2] : [e2, e1];
            let stop = false;
            for (const idx of HexMath.cornerArc(startIdx, near)) {
              pushUntilWater(a, idx);
              if (reachedWater) { stop = true; break; }
            }
            if (!stop) pushUntilWater(a, far);
          }
        }
        const fv = riverEdgeFlow.get(edgeKeyOf(a.id, b.id)) || 0;
        wSum += widthOf(fv); wN++;
      }
      if (pts.length >= 2) paths.push({ points: pts.map((p) => ({ x: p.x, y: p.y })), width: wSum / Math.max(1, wN) });
    }

    // CLEAN each path: remove near-duplicate points and BACKTRACK spikes (where
    // the path reverses into itself). The corner-arc walk can swing a point back
    // on a sharp inter-tile turn, which — once smoothed — looks like the channel
    // wandering sideways instead of flowing onward. Dropping these makes rivers
    // run cleanly toward the sea.
    const dist2 = (a, b) => { const dx = a.x - b.x, dy = a.y - b.y; return dx * dx + dy * dy; };
    const cleanPath = (pp) => {
      const out = [pp[0]];
      const tooClose = (a, b) => dist2(a, b) < 4; // < 2px apart
      for (let i = 1; i < pp.length; i++) {
        const cur = pp[i];
        const last = out[out.length - 1];
        if (tooClose(cur, last)) continue;             // drop duplicate / near-dup
        if (out.length >= 2) {
          const prev = out[out.length - 2];
          // backtrack spike: cur lands back near the point we left, or reverses
          const v1x = last.x - prev.x, v1y = last.y - prev.y;
          const v2x = cur.x - last.x, v2y = cur.y - last.y;
          const backtrack = dist2(cur, prev) < dist2(last, prev) * 0.25;
          const reversal = (v1x * v2x + v1y * v2y) < -0.3 * Math.hypot(v1x, v1y) * Math.hypot(v2x, v2y);
          if (backtrack || reversal) {
            // collapse the spike: drop `last`, then keep cur only if not a dup of prev
            out.pop();
            if (!tooClose(cur, out[out.length - 1])) out.push(cur);
            continue;
          }
        }
        out.push(cur);
      }
      return out;
    };
    for (const p of paths) p.points = cleanPath(p.points);

    // Pin CONFLUENCES using the authoritative junction pairs from trace time. A
    // tributary's true mouth is where it meets the river it joins. We (1) find the
    // receiving river's path point nearest the shared edge, (2) SNAP the tributary
    // tail onto that point, then re-clean the tributary so the snap can't create a
    // backtrack, and (3) PIN it on the receiving river so the main channel passes
    // through the junction instead of bowing away.
    const d2 = dist2;
    for (const cf of confluences) {
      const trib = index.get(cf.tribTile), riv = index.get(cf.riverTile);
      if (!trib || !riv) continue;
      let di = -1;
      for (let i = 0; i < 6; i++) { const n = nbr(trib, HexMath.DIRS[i]); if (n && n.id === riv.id) { di = i; break; } }
      if (di < 0) continue;
      const tc = HexMath.cornersOf(trib.cx, trib.cy);
      const [e1, e2] = HexMath.edgeCornerIdx(di);
      const sharedCorners = [tc[e1], tc[e2]];
      // tributary path = the one whose tail is nearest the shared edge
      let tribPath = null, tb = Infinity;
      for (const p of paths) {
        const t = p.points[p.points.length - 1];
        const dd = Math.min(d2(t, sharedCorners[0]), d2(t, sharedCorners[1]));
        if (dd < tb) { tb = dd; tribPath = p; }
      }
      if (!tribPath || tb > (HexMath.SIZE * 1.3) ** 2) continue;
      // receiving river = a DIFFERENT path with a point on the shared edge
      let rivPath = null, rb = Infinity, rivIdx = -1;
      for (const p of paths) {
        if (p === tribPath) continue;
        for (let i = 0; i < p.points.length; i++) {
          const dd = Math.min(d2(p.points[i], sharedCorners[0]), d2(p.points[i], sharedCorners[1]));
          if (dd < rb) { rb = dd; rivPath = p; rivIdx = i; }
        }
      }
      if (!rivPath || rb > (HexMath.SIZE * 1.1) ** 2) continue;
      // (2) snap tributary tail onto the receiving river's junction point, then
      // re-clean so a backtrack isn't introduced near the new tail.
      const jp = rivPath.points[rivIdx];
      const tail = tribPath.points[tribPath.points.length - 1];
      tail.x = jp.x; tail.y = jp.y;
      tribPath.points = cleanPath(tribPath.points);
      // (3) pin that point on the receiving river (only if it's interior).
      if (rivIdx > 0 && rivIdx < rivPath.points.length - 1) {
        (rivPath.pin || (rivPath.pin = new Set())).add(rivIdx);
      }
    }
    // REMOVE ORPHANS: a valid river must connect to water (ocean/lake) or another
    // river at one of its ends. A few short fragments can end up flowing land-to-
    // land and touching nothing (e.g. a tributary that traced to a river tile which
    // is geometrically an edge away, or a depression dead-end). Those read as
    // floating artifacts, so we drop any path whose BOTH endpoints connect to
    // nothing. Large connected rivers are unaffected. We also un-flag their edges.
    {
      const half = wX / 2;
      const conn2 = (HexMath.SIZE * 0.9) ** 2; // "connected" if within ~one hex
      const nearP = (a, b) => { let dx = Math.abs(a.x - b.x); if (dx > half) dx = wX - dx; return dx * dx + (a.y - b.y) ** 2 < conn2; };
      // collect liquid-cell corner points once
      const liquidCorners = [];
      for (const c of cells) {
        if (!HYDRO.isLiquid(c.terrain)) continue;
        for (const cc of HexMath.cornersOf(c.cx, c.cy)) liquidCorners.push(cc);
      }
      const endConnected = (path, end) => {
        for (const lc of liquidCorners) if (nearP(lc, end)) return true;
        for (const q of paths) {
          if (q === path) continue;
          for (const o of q.points) if (nearP(o, end)) return true;
        }
        return false;
      };
      const kept = [];
      for (const p of paths) {
        const head = p.points[0], tail = p.points[p.points.length - 1];
        if (endConnected(p, head) || endConnected(p, tail)) { kept.push(p); continue; }
        // orphan: un-flag its edges so riverCells/edges stay consistent
        for (let i = 1; i < p.points.length; i++) { /* geometry only; edges cleared below */ }
      }
      // rebuild paths in place
      paths.length = 0; for (const p of kept) paths.push(p);
    }
    return paths;
  })();
  // A cliff edge forms where terrain drops sharply: land-to-land across a big
  // elevation step, OR land-to-sea on a rugged HEADLAND (land sitting high above
  // sea level). The steepness threshold eases with roughness, so rugged worlds
  // get more cliffs. Candidate edges are then CHAINED through shared corners into
  // continuous escarpment lines (like rivers), instead of speckly lone edges.
  // Runs BEFORE deltas so a delta can tell whether a flanking edge is a cliff
  // (deltas don't spread toward cliffs — see the delta builder below).
  let cliffPaths = [];
  {
    // roughness-responsive: smoother worlds need a bigger drop to cliff
    const cliffThresh = 0.34 - rough * 0.14;        // ~0.34 (smooth) .. 0.20 (rugged)
    const headlandHeight = seaLevel + 0.16;          // land must rise this high to cliff the coast

    // collect cliff edges as corner-segments {c1,c2 ids, x1,y1,x2,y2}
    const cliffSegs = [];
    const seenEdge = new Set();
    // river path points (incl. smoothed/snapped corners) a cliff corner must avoid
    const riverPts = [];
    for (const p of riverPaths) for (const pt of p.points) riverPts.push(pt);
    const nearRiverPt = (x, y) => {
      for (const r of riverPts) { const dx = x - r.x, dy = y - r.y; if (dx * dx + dy * dy < 9) return true; }
      return false;
    };
    for (const c of cells) {
      const cLiquid = HYDRO.isLiquid(c.terrain);
      for (let i = 0; i < 6; i++) {
        const nb = nbr(c, HexMath.DIRS[i]);
        if (!nb) continue;
        const key = edgeKeyOf(c.id, nb.id);
        if (seenEdge.has(key)) continue;
        const existing = edges.get(key);
        if (existing && existing.feature) { seenEdge.add(key); continue; } // don't overwrite rivers
        const nbLiquid = HYDRO.isLiquid(nb.terrain);

        let isCliff = false;
        if (!cLiquid && !nbLiquid) {
          // land-to-land: steep elevation step
          if (Math.abs(c.elev - nb.elev) > cliffThresh) isCliff = true;
        } else if (cLiquid !== nbLiquid) {
          // land-to-sea: rugged headland only (the LAND tile must sit high)
          const landCell = cLiquid ? nb : c;
          const seaCell = cLiquid ? c : nb;
          if (HYDRO.isSea(seaCell.terrain) && landCell.elev > headlandHeight) isCliff = true;
        }
        if (!isCliff) continue;

        // skip cliffs that share a corner with a river — they tangle visually
        // along the riverbank. Rivers win the edge. Check both river-edge corners
        // and the river path geometry (catches confluence/snapped corners).
        const [e1, e2] = HexMath.edgeCornerIdx(i);
        const ca = HexMath.cornersOf(c.cx, c.cy);
        if (riverCorners.has(ca[e1].id) || riverCorners.has(ca[e2].id) ||
            nearRiverPt(ca[e1].x, ca[e1].y) || nearRiverPt(ca[e2].x, ca[e2].y)) {
          seenEdge.add(key); continue;
        }

        seenEdge.add(key);
        setFeature(c.id, nb.id, "cliff");
        // record the shared-edge corners for chaining (use c as the reference tile)
        cliffSegs.push({ c1: ca[e1].id, c2: ca[e2].id, x1: ca[e1].x, y1: ca[e1].y, x2: ca[e2].x, y2: ca[e2].y });
      }
    }

    // chain segments sharing a corner into continuous escarpment polylines
    cliffPaths = chainEdgeSegments(cliffSegs);
  }

  // ===== DELTAS: widen the river's final stretch into a fan at the mouth =====
  // A delta is anchored to the river-mouth EDGE (land→sea). We draw it as the
  // river broadening symmetrically along its final stretch: a tapered fan (narrow
  // upstream, wide at the shore) splaying into the two cells flanking that last
  // segment, with the river line down the middle. Bigger rivers (more flow) are
  // far likelier to form one. We also set cell.delta on the mouth tile (a future
  // gameplay hook) but the VISUAL is edge-based, not a tile glyph.
  const deltaFans = [];
  {
    const allFlow = Math.max(1, ...[...flow.values()]);
    // index river paths by their mouth point (last point) for matching
    for (const cand of deltaCandidates) {
      const land = index.get(cand.landId), sea = index.get(cand.seaId);
      if (!land || !sea) continue;
      if ((cand.riverLen || 0) < 3) continue;      // only substantial rivers form deltas
      const fv = cand.flow / allFlow;
      if (rng() > 0.15 + fv * 0.8) continue;       // flow-biased rarity
      // the mouth edge midpoint (between land and sea centers, seam-aware)
      let ddx = sea.cx - land.cx, ddy = sea.cy - land.cy;
      if (Math.abs(ddx) > wX / 2) ddx -= Math.sign(ddx) * wX;
      const mex = land.cx + ddx * 0.5, mey = land.cy + ddy * 0.5;
      // find the river polyline that ENDS at this mouth (last point nearest the
      // mouth-edge midpoint) so we anchor to the real final river segment.
      let best = null, bestD = Infinity;
      for (const path of riverPaths) {
        const pts = path.points; if (!pts || pts.length < 2) continue;
        const tail = pts[pts.length - 1];
        let dx = tail.x - mex; if (Math.abs(dx) > wX / 2) dx -= Math.sign(dx) * wX;
        const d = Math.hypot(dx, tail.y - mey);
        if (d < bestD) { bestD = d; best = path; }
      }
      // require the river to actually terminate near this mouth edge
      if (!best || bestD > HexMath.SIZE * 1.2) continue;
      land.delta = true;
      const pts = best.points;
      const M = pts[pts.length - 1];               // mouth point (river end at coast)
      // Upstream anchor: walk a short distance back along the actual river
      // polyline from the mouth and interpolate a point that lies ON the river
      // line (rivers run along hex edges, so the raw vertices are corners — using
      // a vertex snaps the fan apex to a corner instead of sitting on the river).
      // The distance scales 15px→20px with river length (longer rivers carry more
      // flow and seat their delta slightly farther back), clamped at both ends.
      let riverLen = 0;
      for (let k = 1; k < pts.length; k++) {
        let dx = pts[k].x - pts[k - 1].x;
        if (Math.abs(dx) > wX / 2) continue;          // skip seam span
        riverLen += Math.hypot(dx, pts[k].y - pts[k - 1].y);
      }
      const tLen = Math.max(0, Math.min(1, (riverLen - 100) / 300)); // 100px→0 .. 400px→1
      const ANCHOR_BACK = 15 + tLen * 5;             // 15px (short) .. 20px (long)
      let U;
      {
        let remaining = ANCHOR_BACK, cur = M, i = pts.length - 1;
        U = { x: M.x, y: M.y };
        while (i > 0) {
          const prev = pts[i - 1];
          // unwrap prev into cur's frame so seam-crossing segments measure right
          let pvx = prev.x; const ddx = pvx - cur.x;
          if (ddx > wX / 2) pvx -= wX; else if (ddx < -wX / 2) pvx += wX;
          const segx = pvx - cur.x, segy = prev.y - cur.y;
          const seg = Math.hypot(segx, segy) || 1;
          if (seg >= remaining) {                  // anchor lands inside this segment
            const f = remaining / seg;
            U = { x: cur.x + segx * f, y: cur.y + segy * f };
            break;
          }
          remaining -= seg;
          cur = { x: pvx, y: prev.y }; i--;
          U = { x: cur.x, y: cur.y };               // fallback: river shorter than ANCHOR_BACK
        }
      }
      let sx = M.x - U.x, sy = M.y - U.y;
      if (Math.abs(sx) > wX / 2) sx -= Math.sign(sx) * wX;
      const slen = Math.hypot(sx, sy) || 1;
      const fx = sx / slen, fy = sy / slen;        // along the final segment
      const px = -fy, py = fx;                       // perpendicular — fan splays BOTH ways

      // The river mouth M is a lattice corner shared by the two flanking LAND
      // cells and the SEA cell. The delta should reach the true coastline: the
      // two corners where those land cells end at the ocean — which are exactly
      // the SEA cell's two corners adjacent to M. Find the sea cell touching M
      // and use its M-adjacent corners as the spread targets, so the base spans
      // the full water-facing front of both flanking cells (no gaps), splaying
      // symmetrically with the river down the middle.
      let cornerA = null, cornerB = null;
      for (let d = 0; d < 6 && !cornerA; d++) {
        const nb = nbr(land, HexMath.DIRS[d]);
        if (!nb || !HYDRO.isSea(nb.terrain)) continue;
        const sc = HexMath.cornersOf(nb.cx, nb.cy);
        // find M among the sea cell's corners, take its two ring-neighbors
        let mi = -1, mb = Infinity;
        for (let i = 0; i < 6; i++) {
          let dx = sc[i].x - M.x; if (Math.abs(dx) > wX / 2) dx -= Math.sign(dx) * wX;
          const dd = Math.hypot(dx, sc[i].y - M.y);
          if (dd < mb) { mb = dd; mi = i; }
        }
        if (mi >= 0 && mb < HexMath.SIZE * 0.4) {
          cornerA = sc[(mi + 5) % 6];
          cornerB = sc[(mi + 1) % 6];
        }
      }
      if (!cornerA) {                                  // fallback: apothem offset
        const halfW = HexMath.SIZE * 0.5;
        cornerA = { x: M.x + px * halfW, y: M.y + py * halfW };
        cornerB = { x: M.x - px * halfW, y: M.y - py * halfW };
      }
      // UNWRAP corners into M's frame FIRST: cornersOf() returns each corner's
      // absolute x, so when the mouth M is near one seam edge and the sea cell
      // sits across the wrap, a corner can land a full world-width away — making
      // the fan draw "the long way" around the map. Shift each corner to the copy
      // nearest M before any winding/cliff/poly logic uses its coordinates.
      const unwrap = (c) => {
        const dx = c.x - M.x;
        if (dx > wX / 2) return { x: c.x - wX, y: c.y };
        if (dx < -wX / 2) return { x: c.x + wX, y: c.y };
        return c;
      };
      cornerA = unwrap(cornerA);
      cornerB = unwrap(cornerB);
      // order so cornerA is on the +perp side (consistent polygon winding)
      if ((cornerA.x - M.x) * px + (cornerA.y - M.y) * py < 0) { const t = cornerA; cornerA = cornerB; cornerB = t; }

      // CLIFF TRUNCATION: a delta can't spread toward a cliff (deltas form on low
      // flat ground, not against a steep wall). For each spread corner, find the
      // flanking LAND cell on that side; if that cell meets the sea along a CLIFF
      // edge, collapse that corner back to the mouth M so the fan becomes a
      // half-triangle spilling only toward the open (non-cliff) side.
      const cornerBlockedByCliff = (corner) => {
        // the flanking land cell on this side = a land neighbour of `land` whose
        // shared edge with the sea runs to `corner`, and which has a cliff edge to sea
        for (let d = 0; d < 6; d++) {
          const nb = nbr(land, HexMath.DIRS[d]);
          if (!nb || HYDRO.isLiquid(nb.terrain)) continue; // want a land flanking cell
          const nc = HexMath.cornersOf(nb.cx, nb.cy);
          // does this land cell have `corner` as one of its corners?
          let hasCorner = false;
          for (const cc of nc) { let dx = cc.x - corner.x; if (Math.abs(dx) > wX / 2) dx -= Math.sign(dx) * wX; if (Math.hypot(dx, cc.y - corner.y) < 2) { hasCorner = true; break; } }
          if (!hasCorner) continue;
          // is any edge of this flanking cell that touches the sea a cliff?
          for (let i = 0; i < 6; i++) {
            const nn = nbr(nb, HexMath.DIRS[i]);
            if (!nn || !HYDRO.isSea(nn.terrain)) continue;
            const e = edges.get(edgeKeyOf(nb.id, nn.id));
            if (e && e.feature === "cliff") return true;
          }
        }
        return false;
      };
      const aBlocked = cornerBlockedByCliff(cornerA);
      const bBlocked = cornerBlockedByCliff(cornerB);
      // if BOTH sides are cliffed, this isn't a real delta site — skip it
      if (aBlocked && bBlocked) continue;
      // collapse a blocked corner back to the mouth (half-triangle toward open side)
      if (aBlocked) cornerA = { x: M.x, y: M.y };
      if (bBlocked) cornerB = { x: M.x, y: M.y };

      const narrow = HexMath.SIZE * 0.08;
      // concave dip at the mouth, pulled slightly upstream along the river line
      const dipx = M.x - fx * HexMath.SIZE * 0.16, dipy = M.y - fy * HexMath.SIZE * 0.16;
      deltaFans.push({
        poly: [
          { x: U.x + px * narrow, y: U.y + py * narrow },
          cornerA,
          { x: dipx, y: dipy },                       // concave dip, on the river
          cornerB,
          { x: U.x - px * narrow, y: U.y - py * narrow },
        ],
        // distributaries fan from upstream to both corners and the mouth dip
        channels: [cornerA, { x: dipx, y: dipy }, cornerB].map((tgt) => ({
          x1: U.x, y1: U.y, x2: tgt.x, y2: tgt.y,
        })),
      });
    }
  }

  // ===== PASS 7: special tiles (rare markers layered over terrain) =====
  // Each WorldDef special owns its rarity + siting (e.g. volcanoes on peaks near
  // tectonic boundaries; oases inside deserts). Markers set cell.special; terrain
  // is unchanged. A ctx object exposes engine-derived data the rules may need.
  for (const c of cells) c.special = null;
  if (WORLD.specials) {
    const flowMax = Math.max(1, ...[...flow.values()]);
    const specialCtx = { index, nbr, HYDRO, riverCells, flow, flowMax };
    for (const key in WORLD.specials) {
      const sp = WORLD.specials[key];
      if (sp.place) sp.place(cells, rng, P, specialCtx);
    }
  }

  // ===== PASS 8: LABELS — name large water bodies and major rivers =====
  // Builds a `labels` array the renderer draws as map cartography. Three kinds:
  //   - "area"  (oceans/seas/lakes): horizontal text centred on the body
  //   - "river" (major rivers): text that curves along the river's path
  // Naming is simple/generic and seeded so a given world always names the same.
  const labels = (() => {
    const out = [];
    // Name pieces (generic + proper-noun style), deterministic via rng. Big pools
    // keep collisions rare, and uniqueness is resolved by RE-ROLLING a different
    // name rather than appending a number ("Long River 2" reads like a bug).
    const dirs = ["North", "South", "East", "West", "Upper", "Lower", "Great", "Inner", "Outer", "Far", "High", "Old", "New", "Grand"];
    const seaNames = ["Sea", "Gulf", "Bay", "Waters", "Deep", "Expanse", "Sound", "Strait", "Reach", "Basin", "Shallows", "Narrows"];
    const lakeAdj = ["Great", "Still", "Silver", "Black", "Clear", "Mirror", "Long", "Hidden", "Blue", "Cold", "Deep", "Crescent", "Azure", "Lone", "Twin", "Pale"];
    const riverAdj = ["Long", "Great", "Silver", "Winding", "Swift", "Old", "North", "South", "Iron", "Clear", "Wild", "Cold", "Golden", "Crooked", "Stone", "Misty", "Amber", "Black", "White", "Red"];
    // proper-noun roots for named features (Eshan, Valdor, …) — prefix + suffix
    const namePre = ["Es", "Val", "Mor", "Cale", "Dra", "Thal", "Aze", "Bren", "Cor", "Fen", "Gal", "Hesh", "Kor", "Lyr", "Mar", "Nor", "Oss", "Per", "Quel", "Rho", "Sel", "Tor", "Ulm", "Vesh", "Wren", "Yar", "Zan", "Arde", "Brae", "Cinder"];
    const namePost = ["an", "or", "is", "wyn", "ash", "mere", "dell", "vale", "ford", "wick", "moor", "reach", "fell", "haven", "gar", "lyn", "ria", "thys", "den", "spire"];
    const pick = (arr) => arr[(rng() * arr.length) | 0];
    const properName = () => pick(namePre) + pick(namePost);
    // feature name generators: each returns a fresh candidate (proper-noun forms
    // mixed with descriptive forms) so uniq() can re-roll on collision.
    const oceanName = () => rng() < 0.5 ? "The " + properName() + " Ocean" : pick(dirs) + " Ocean";
    const seaName = () => rng() < 0.5 ? properName() + " " + pick(seaNames) : pick(dirs) + " " + pick(seaNames);
    const riverName = () => rng() < 0.5 ? "The " + properName() : pick(riverAdj) + " River";
    const used = new Set();
    // gen() is called repeatedly to produce a candidate name; we accept the first
    // unused one. Only if MANY rolls all collide do we fall back to a numeral so
    // the function always terminates.
    const uniq = (gen) => {
      for (let i = 0; i < 40; i++) { const k = gen(); if (!used.has(k)) { used.add(k); return k; } }
      let n = 2, base = gen(); while (used.has(base + " " + n)) n++;
      const k = base + " " + n; used.add(k); return k;
    };

    // wrap-aware centroid of a set of cells (average on the cylinder via angle)
    const centroid = (cellsArr) => {
      let sx = 0, sy = 0, sa = 0, ca = 0;
      for (const c of cellsArr) {
        const ang = (c.cx / wX) * Math.PI * 2;
        ca += Math.cos(ang); sa += Math.sin(ang); sy += c.cy;
      }
      const n = cellsArr.length;
      const meanAng = Math.atan2(sa / n, ca / n);
      let cx = ((meanAng / (Math.PI * 2)) * wX + wX) % wX + minX;
      return { x: cx, y: sy / n };
    };

    // --- water bodies: flood-fill connected liquid, split ocean vs lake ---
    const seen = new Set();
    for (const start of cells) {
      if (!HYDRO.isLiquid(start.terrain) || seen.has(start.id)) continue;
      const q = [start]; seen.add(start.id);
      const body = []; let isLakeBody = HYDRO.isLake(start.terrain);
      while (q.length) {
        const c = q.pop(); body.push(c);
        if (HYDRO.isLake(c.terrain)) isLakeBody = true;
        for (const d of HexMath.DIRS) {
          const nb = nbr(c, d);
          if (nb && HYDRO.isLiquid(nb.terrain) && !seen.has(nb.id)) { seen.add(nb.id); q.push(nb); }
        }
      }
      const size = body.length;
      // skip tiny ponds / slivers
      if (isLakeBody) {
        if (size < 4) continue;
        const name = uniq(() => rng() < 0.45
          ? "Lake " + properName()
          : (rng() < 0.6 ? pick(lakeAdj) + " Lake" : "Lake " + pick(["Mire", "Reed", "Fen", "Tarn", "Glass", "Vale", "Hollow", "Brook", "Marsh", "Holt"])));
        const ctr = centroid(body);
        out.push({ kind: "area", subtype: "lake", name, x: ctr.x, y: ctr.y, size });
      } else {
        // ocean/sea. A small enclosed sea gets one label; a large connected ocean
        // (often wrapping the whole map) reads better with SEVERAL regional labels
        // spread across it (like "North Sea", "East Gulf" on one real ocean).
        if (size < 40) continue;
        // how many labels: ~1 per big chunk of ocean area, capped for sanity
        const nLabels = Math.max(1, Math.min(5, Math.round(size / 650)));
        if (nLabels === 1) {
          const big = size > cells.length * 0.18;
          const name = big ? uniq(oceanName) : uniq(seaName);
          const ctr = centroid(body);
          out.push({ kind: "area", subtype: big ? "ocean" : "sea", name, x: ctr.x, y: ctr.y, size });
        } else {
          // spread labels: pick well-separated "deep water" anchors (tiles far
          // from land), greedily maximizing spacing so labels don't cluster.
          const open = body.filter((c) => {
            for (const d of HexMath.DIRS) { const nb = nbr(c, d); if (nb && !HYDRO.isLiquid(nb.terrain)) return false; }
            return true; // surrounded by water (open sea, not coast)
          });
          const pool = open.length >= nLabels ? open : body;
          const anchors = [];
          // first anchor: a random open tile; then farthest-point sampling
          anchors.push(pool[(rng() * pool.length) | 0]);
          while (anchors.length < nLabels) {
            let best = null, bestD = -1;
            for (const c of pool) {
              let nearest = Infinity;
              for (const a of anchors) {
                let dx = Math.abs(c.cx - a.cx); dx = Math.min(dx, wX - dx);
                nearest = Math.min(nearest, Math.hypot(dx, c.cy - a.cy));
              }
              if (nearest > bestD) { bestD = nearest; best = c; }
            }
            if (!best || bestD < HexMath.SIZE * 4) break; // stop if no room left
            anchors.push(best);
          }
          for (let ai = 0; ai < anchors.length; ai++) {
            const a = anchors[ai];
            // the first (largest-spacing) region is the "Ocean"; the rest are
            // named seas/gulfs/bays within it — like real cartography.
            const name = ai === 0 ? uniq(oceanName) : uniq(seaName);
            out.push({ kind: "area", subtype: ai === 0 ? "ocean" : "sea", name, x: a.cx, y: a.cy, size });
          }
        }
      }
    }

    // --- rivers: name the longest few (curved labels along the path) ---
    const byLen = [...riverPaths].filter((p) => p.points && p.points.length >= 6)
      .sort((a, b) => b.points.length - a.points.length);
    const namedRivers = Math.min(byLen.length, Math.max(1, Math.round(byLen.length * 0.5)));
    for (let i = 0; i < namedRivers; i++) {
      const p = byLen[i];
      const name = uniq(riverName);
      out.push({ kind: "river", name, points: p.points, width: p.width || 1 });
    }
    // --- authored preset: place its named regions (overrides procedural names) ---
    if (preset && preset.regions) {
      // drop procedural ocean/sea/area names so authored ones aren't duplicated
      for (let i = out.length - 1; i >= 0; i--) if (out[i].kind === "area") out.splice(i, 1);
      for (const reg of preset.regions) {
        out.push({
          kind: "area", subtype: reg.kind === "ocean" ? "ocean" : reg.kind === "sea" ? "sea" : "region",
          name: reg.name, x: minX + reg.u * wX, y: minY + reg.v * wY, size: 20,
        });
      }
    }
    return out;
  })();

  // ===== FINAL: rewrite elevation to be SEA-RELATIVE + add BATHYMETRY ========
  // Until now c.elev is an absolute 0..1 noise height with sea level at
  // `seaLevel`. We remap so SEA LEVEL = 0, land rises to +1 (highest peak), and
  // water sinks toward -1. For WATER we also blend in a shelf→abyss gradient: a
  // tile's depth grows with its distance from the nearest coast, so seas read as
  // a shallow shelf near land dropping to a deep basin offshore. Raw noise is
  // kept as a minority weight so the seafloor still has trenches and rises.
  {
    // (a) land: straightforward sea-relative normalization (noise-based height)
    for (const c of cells) {
      if (!HYDRO.isLiquid(c.terrain)) {
        const d = c.elev - seaLevel;
        c.elev = d / (1 - seaLevel || 1);          // 0 at shore .. +1 at peak
      }
    }
    // (b) water: BFS distance from the nearest land tile (wrap-aware via nbr)
    const distToLand = new Map();
    const queue = [];
    for (const c of cells) {
      if (!HYDRO.isLiquid(c.terrain)) continue;
      // a water tile touching land is distance 1; seed the BFS from coast water
      let coastal = false;
      for (const dir of HexMath.DIRS) { const nb = nbr(c, dir); if (nb && !HYDRO.isLiquid(nb.terrain)) { coastal = true; break; } }
      if (coastal) { distToLand.set(c.id, 1); queue.push(c.id); }
    }
    let head = 0, maxDist = 1;
    while (head < queue.length) {
      const id = queue[head++]; const c = index.get(id); const dd = distToLand.get(id);
      for (const dir of HexMath.DIRS) {
        const nb = nbr(c, dir);
        if (nb && HYDRO.isLiquid(nb.terrain) && !distToLand.has(nb.id)) {
          distToLand.set(nb.id, dd + 1); maxDist = Math.max(maxDist, dd + 1); queue.push(nb.id);
        }
      }
    }
    // (c) blend gradient with noise for each water tile. The gradient uses a
    // sqrt falloff so depth drops quickly off the shelf then eases toward the
    // abyssal floor. Lakes (small, enclosed) skip the gradient — they just take
    // a gentle noise depth so they don't read as deep ocean.
    const GRAD_W = 0.7, NOISE_W = 0.3;
    for (const c of cells) {
      if (!HYDRO.isLiquid(c.terrain)) continue;
      const noiseDepth = (c.elev - seaLevel) / (seaLevel || 1);   // -1..0 (raw)
      if (HYDRO.isLake(c.terrain)) { c.elev = noiseDepth * 0.5; continue; }
      const dn = (distToLand.get(c.id) || 1) / maxDist;            // 0 (coast) .. 1 (mid-ocean)
      const gradDepth = -Math.sqrt(dn);                            // smooth shelf→abyss, 0..-1
      c.elev = GRAD_W * gradDepth + NOISE_W * noiseDepth;
    }
  }

  return { cells, index, edges, params: P, cols, rows, wrap: true, nbr, neighbors, riverPaths, cliffPaths, deltaFans, labels };
}

// Chain a set of edge-segments (each {c1,c2 corner ids, x1,y1,x2,y2}) into
// connected polylines by walking shared corners. Shared with cliffs; rivers use
// their own flow-ordered builder. Returns [{points:[{x,y}]}].
function chainEdgeSegments(segs) {
  if (!segs.length) return [];
  const byCorner = new Map();         // corner id -> [seg indices]
  const pos = new Map();              // corner id -> {x,y}
  segs.forEach((s, i) => {
    (byCorner.get(s.c1) || byCorner.set(s.c1, []).get(s.c1)).push(i);
    (byCorner.get(s.c2) || byCorner.set(s.c2, []).get(s.c2)).push(i);
    pos.set(s.c1, { x: s.x1, y: s.y1 });
    pos.set(s.c2, { x: s.x2, y: s.y2 });
  });
  const used = new Array(segs.length).fill(false);
  const otherEnd = (s, cid) => (s.c1 === cid ? s.c2 : s.c1);
  const walk = (startSeg, startCorner) => {
    const pts = [pos.get(startCorner)];
    let cur = startCorner, segIdx = startSeg;
    while (segIdx != null && !used[segIdx]) {
      used[segIdx] = true;
      const nextC = otherEnd(segs[segIdx], cur);
      pts.push(pos.get(nextC));
      cur = nextC;
      const cands = (byCorner.get(cur) || []).filter((j) => !used[j]);
      segIdx = cands.length ? cands[0] : null;
    }
    return pts;
  };
  const paths = [];
  for (let i = 0; i < segs.length; i++) {
    if (used[i]) continue;
    // start from the segment's lower-degree corner so we don't begin mid-line
    const s = segs[i];
    const deg = (cid) => (byCorner.get(cid) || []).filter((j) => !used[j]).length;
    const startCorner = deg(s.c1) <= deg(s.c2) ? s.c1 : s.c2;
    const pts = walk(i, startCorner);
    if (pts.length >= 2) paths.push({ points: pts.map((p) => ({ x: p.x, y: p.y })) });
  }
  return paths;
}

// ===========================================================================
// TWO-AXIS TERRAIN MODEL
//   classifyBase(c)  -> base landform: saltwater|freshwater|wetland|flat|hills|mountains|peak
//   classifyCover(c) -> climate cover (flat & hills only): jungle|forest|taiga|grass|desert|tundra|null
//   classifyBiome()  -> composes the two into the legacy fused `terrain` string so
//                       all existing rendering/pathfinding keeps working unchanged.
// The generator also stamps c.base / c.cover / c.subtype onto each cell (see the
// classification pass) so game logic and the new render split can read the axes.
// ===========================================================================

// Axis 1 — base landform. `nearWater` (computed by caller) gates wetland so dry
// lowlands stay flat. Water is split salt vs. fresh by the caller (enclosed=fresh).
function classifyBase(c, seaLevel, opts = {}) {
  const e = c.elev, m = c.moist;
  if (e < seaLevel) return opts.fresh ? "freshwater" : "saltwater";
  if (e > 0.88) return "peak";
  if (e > 0.78) return "mountains";
  // wetland: LOW + WET + adjacent to water (else a dry basin stays flat)
  if (e < seaLevel + 0.10 && m > 0.6 && opts.nearWater) return "wetland";
  if (e > 0.70) return "hills";
  return "flat";
}

// Axis 2 — cover from temperature + moisture. Only meaningful on flat & hills.
function classifyCover(c) {
  const t = c.temp, m = c.moist;
  if (t < 0.22) return "tundra";                         // very cold
  if (t < 0.42) return m > 0.45 ? "taiga" : "tundra";    // cold
  if (t > 0.68) {                                        // hot
    if (m > 0.58) return "jungle";
    if (m > 0.38) return "grass";
    return "desert";
  }
  if (m > 0.48) return "forest";                         // temperate wet
  return "grass";                                        // temperate dry→moderate
}

// Compose base + cover into the legacy fused terrain string used by the renderer
// and movement. Stamps the structured axes onto the cell as a side effect.
function classifyBiome(c, seaLevel, opts = {}) {
  const base = classifyBase(c, seaLevel, opts);
  c.base = base;
  c.cover = null; c.subtype = null;
  switch (base) {
    case "saltwater": return c.elev < seaLevel - 0.08 ? "ocean" : "water"; // depth sub-type
    case "freshwater": return "lake";
    case "wetland":
      // marsh vs. mangrove by warmth (warm coast = mangrove)
      c.subtype = c.temp > 0.6 ? "mangrove" : "marsh";
      return "marsh";                                    // fused render type
    case "mountains": return "mountain";                 // barren
    case "peak": return "peak";                          // barren
    case "flat": case "hills": {
      const cover = classifyCover(c);
      c.cover = cover;
      // fused terrain: hills landform reads as "hills"; flat takes the cover name
      if (base === "hills") return "hills";
      return cover;                                       // flat + cover => the cover biome
    }
    default: return "grass";
  }
}
WORLD.classifySurface = classifyBiome;

// Derive c.base / c.cover / c.vegetation / c.ground from the final fused terrain.
// Used after every terrain mutation so all axes stay consistent. `cover` is the
// climate cover (flat only in fused form), `vegetation` the TREE subset (chop
// target), `ground` the base landform revealed when cover is cleared.
const _COVER_SET = { forest: 1, taiga: 1, jungle: 1, grass: 1, desert: 1, tundra: 1 };
const _TREE_SET = { forest: 1, taiga: 1, jungle: 1 };
function syncCoverFields(c) {
  if (_COVER_SET[c.terrain]) {
    c.base = "flat"; c.cover = c.terrain;
    c.vegetation = _TREE_SET[c.terrain] ? c.terrain : null;
    c.ground = "grass";
  } else if (c.terrain === "hills") {
    c.base = "hills";
    c.vegetation = _TREE_SET[c.cover] ? c.cover : null;
    c.ground = "hills";
  } else if (c.terrain === "mountain") {
    c.base = "mountains"; c.cover = null; c.vegetation = null; c.ground = "mountain";
  } else if (c.terrain === "peak") {
    c.base = "peak"; c.cover = null; c.vegetation = null; c.ground = "peak";
  } else if (c.terrain === "marsh") {
    c.base = "wetland"; c.cover = null; c.vegetation = null; c.ground = "marsh";
  } else {
    c.cover = null; c.vegetation = null; c.ground = c.terrain;
  }
}

function computeBounds(cells) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of cells) {
    minX = Math.min(minX, c.cx - HexMath.SIZE); maxX = Math.max(maxX, c.cx + HexMath.SIZE);
    minY = Math.min(minY, c.cy - HexMath.SIZE); maxY = Math.max(maxY, c.cy + HexMath.SIZE);
  }
  return { minX, minY, w: maxX - minX, h: maxY - minY };
}

/* ===========================================================================
   LAYER 2f — MOVEMENT COST  (the seam your game logic will own)
   stepCost(from, to, map, opts) -> { cost, blocked, parts }
   Composition: cost = to.entry + edge.cross, gated by passability.
   Blocked is "soft": returns blocked:true + the would-be cost, so a future
   ability can override (e.g. opts.ignoreBlocked).
   =========================================================================== */
function areNeighbors(a, b) {
  for (const d of HexMath.DIRS) if (a.q + d.q === b.q && a.r + d.r === b.r) return true;
  return false;
}

function stepCost(from, to, map, opts = {}) {
  // wrap-aware adjacency: use the map's neighbor function when available
  let adj = false;
  if (map.nbr) {
    for (const d of HexMath.DIRS) { const n = map.nbr(from, d); if (n && n.id === to.id) { adj = true; break; } }
  } else {
    adj = areNeighbors(from, to);
  }
  if (!adj) return null; // only adjacent steps in this build
  const tdef = WORLD.materials[to.terrain];
  const edge = map.edges.get(canonicalEdgeKey(from.id, to.id));
  const edgeCost = edge && edge.dirCost ? (edge.dirCost[from.id] ?? 0) : 0;
  const tileBlocked = tdef.blocked;
  const edgeBlocked = !!(edge && edge.blocked);
  const blocked = (tileBlocked || edgeBlocked) && !opts.ignoreBlocked;

  const entry = tdef.entry >= 99 ? (opts.ignoreBlocked ? 3 : Infinity) : tdef.entry;
  const cross = edgeCost >= 99 ? (opts.ignoreBlocked ? 3 : Infinity) : edgeCost;
  const cost = blocked ? Infinity : Math.max(0.5, entry + cross);

  return {
    cost, blocked,
    parts: {
      entry: tdef.entry, edgeCross: edgeCost,
      tileBlocked, edgeBlocked,
      feature: edge ? edge.feature : null,
    },
  };
}

/* ===========================================================================
   LAYER 2g — PATHFINDING  (A* over stepCost; never assumes the cost rules)
   - The heuristic is hex grid distance scaled by the cheapest possible step,
     which keeps A* admissible (never overestimates) -> optimal least-cost path.
   - Blocked steps are skipped entirely unless opts.ignoreBlocked is set, so a
     unit with a special ability just passes the same flag stepCost already honors.
   =========================================================================== */

// neighbors of a cell that actually exist on the map
function neighborsOf(cell, map) {
  const out = [];
  for (const d of HexMath.DIRS) {
    const nb = map.nbr(cell, d);
    if (nb) out.push(nb);
  }
  return out;
}

// hex (axial) distance between two cells
function hexDistance(a, b) {
  const aq = a.q, ar = a.r, as = -aq - ar;
  const bq = b.q, br = b.r, bs = -bq - br;
  return (Math.abs(aq - bq) + Math.abs(ar - br) + Math.abs(as - bs)) / 2;
}

// cylinder-aware distance: try the goal in place and shifted ±one lap east-west,
// take the shortest. Keeps A* exploring the short way around the seam.
function hexDistanceWrapped(a, b, map) {
  if (!map || !map.wrap) return hexDistance(a, b);
  const cols = map.cols;
  let best = Infinity;
  for (const k of [-1, 0, 1]) {
    // shifting a column by ±cols also shifts r by ∓cols/2 (matches the grid shear)
    const ghost = { q: b.q + k * cols, r: b.r - k * (cols / 2) };
    const d = hexDistance(a, ghost);
    if (d < best) best = d;
  }
  return best;
}

// cheapest entry cost across all terrain — used to keep the heuristic admissible
const MIN_STEP_COST = (() => {
  let m = Infinity;
  for (const k of WORLD.materialKeys) {
    const e = WORLD.materials[k].entry;
    if (e < 99) m = Math.min(m, e);
  }
  // edges can discount (roads = -0.5); fold that in so we never overestimate
  let minEdge = 0;
  for (const k in EDGE_FEATURE) minEdge = Math.min(minEdge, EDGE_FEATURE[k].cross);
  return Math.max(0.5, m + minEdge);
})();

/* A* — returns { path:[cellIds], cost, steps:[{to, cost}], reached:bool } or null */
function findPath(start, goal, map, opts = {}) {
  if (!start || !goal) return null;
  if (start.id === goal.id) return { path: [start.id], cost: 0, steps: [], reached: true };

  const open = new MinHeap();          // frontier ordered by f = g + h
  const gScore = new Map();            // best known cost to reach a node
  const came = new Map();              // node -> { from, stepCost }
  gScore.set(start.id, 0);
  open.push(start.id, hexDistanceWrapped(start, goal, map) * MIN_STEP_COST);

  let expansions = 0;
  while (open.size() > 0) {
    const currentId = open.pop();
    expansions++;
    if (currentId === goal.id) break;
    const current = map.index.get(currentId);
    const gCur = gScore.get(currentId);

    for (const nb of neighborsOf(current, map)) {
      const sc = stepCost(current, nb, map, opts);
      if (!sc || sc.cost === Infinity) continue; // blocked / impassable
      const tentative = gCur + sc.cost;
      if (tentative < (gScore.get(nb.id) ?? Infinity)) {
        gScore.set(nb.id, tentative);
        came.set(nb.id, { from: currentId, stepCost: sc.cost });
        const f = tentative + hexDistanceWrapped(nb, goal, map) * MIN_STEP_COST;
        open.push(nb.id, f);
      }
    }
  }

  if (!came.has(goal.id)) return { path: [], cost: Infinity, steps: [], reached: false, expansions };

  // reconstruct
  const path = [goal.id];
  const steps = [];
  let cur = goal.id;
  while (cur !== start.id) {
    const link = came.get(cur);
    steps.push({ to: cur, cost: link.stepCost });
    cur = link.from;
    path.push(cur);
  }
  path.reverse(); steps.reverse();
  return { path, cost: gScore.get(goal.id), steps, reached: true, expansions };
}

// Tiny binary min-heap keyed by priority (good enough for thousands of tiles)
class MinHeap {
  constructor() { this.a = []; }
  size() { return this.a.length; }
  push(id, p) {
    const a = this.a; a.push({ id, p }); let i = a.length - 1;
    while (i > 0) { const par = (i - 1) >> 1; if (a[par].p <= a[i].p) break; [a[par], a[i]] = [a[i], a[par]]; i = par; }
  }
  pop() {
    const a = this.a; const top = a[0]; const last = a.pop();
    if (a.length) { a[0] = last; let i = 0; const n = a.length;
      while (true) { let l = 2 * i + 1, r = l + 1, s = i;
        if (l < n && a[l].p < a[s].p) s = l;
        if (r < n && a[r].p < a[s].p) s = r;
        if (s === i) break; [a[s], a[i]] = [a[i], a[s]]; i = s; } }
    return top.id;
  }
}

/* ===========================================================================
   LAYER 3a — VIEW ENGINE (pan/zoom in refs; RAF repaint)
   =========================================================================== */
function useHexView(onChange) {
  const view = useRef({ x: 0, y: 0, scale: 1 });
  const drag = useRef({ active: false, sx: 0, sy: 0, ox: 0, oy: 0, moved: false });

  const onPointerDown = useCallback((e) => {
    const v = view.current;
    v.dragging = true;
    drag.current = { active: true, sx: e.clientX, sy: e.clientY, ox: v.x, oy: v.y, moved: false };
  }, []);
  const onPointerMove = useCallback((e) => {
    const d = drag.current; if (!d.active) return;
    const dx = e.clientX - d.sx, dy = e.clientY - d.sy;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) d.moved = true;
    view.current.x = d.ox + dx; view.current.y = d.oy + dy; onChange();
  }, [onChange]);
  const onPointerUp = useCallback(() => { drag.current.active = false; view.current.dragging = false; }, []);
  const zoomAt = useCallback((lx, ly, dy) => {
    const v = view.current;
    const f = dy < 0 ? 1.1 : 1 / 1.1;
    const scale = Math.min(4, Math.max(0.2, v.scale * f));
    const k = scale / v.scale;
    v.x = lx - (lx - v.x) * k; v.y = ly - (ly - v.y) * k; v.scale = scale; onChange();
  }, [onChange]);
  const reset = useCallback(() => { view.current = { x: 0, y: 0, scale: 1 }; onChange(); }, [onChange]);
  const wasDrag = useCallback(() => drag.current.moved, []);
  return { view, onPointerDown, onPointerMove, onPointerUp, zoomAt, reset, wasDrag };
}

/* ===========================================================================
   LAYER 3b — CANVAS RENDERER (culling + RAF + DPR; draws tiles then edges)
   =========================================================================== */
function CanvasHexRenderer(props) {
  const { map, bounds, viewRef, drawSignal, getStyle, edgeStyle, pathData, showStats, detailView,
          onPointerDown, onPointerMove, onPointerUp, onWheel,
          onCellClick, onCellHover, onStats } = props;
  const canvasRef = useRef(null);
  const rafRef = useRef(0);
  const dirtyRef = useRef(true);
  const sizeRef = useRef({ w: 0, h: 0, dpr: 1 });
  const pad = 40;
  const offX = -bounds.minX + pad, offY = -bounds.minY + pad;

  // horizontal period of the cylinder, in world px (one full lap east-west)
  const worldPeriod = map.wrap ? map.cols * HexMath.COL : Infinity;

  const pickCell = useCallback((cx, cy) => {
    const c = canvasRef.current; if (!c) return null;
    const rect = c.getBoundingClientRect(); const v = viewRef.current;
    let wx = (cx - rect.left - v.x) / v.scale - offX;
    const wy = (cy - rect.top - v.y) / v.scale - offY;
    // un-wrap the pointer's world-x back into the canonical [0, period) lap
    if (map.wrap && isFinite(worldPeriod)) {
      wx = ((wx % worldPeriod) + worldPeriod) % worldPeriod;
    }
    const { q, r } = HexMath.fromPixel(wx, wy);
    // also wrap the resulting column so a pick just past the seam resolves
    const qq = map.wrap ? ((q % map.cols) + map.cols) % map.cols : q;
    return map.index.get(qq + "," + r) || map.index.get(q + "," + r) || null;
  }, [map, viewRef, offX, offY, worldPeriod]);

  const resize = useCallback(() => {
    const c = canvasRef.current; if (!c) return;
    const dpr = window.devicePixelRatio || 1;
    const w = c.clientWidth, h = c.clientHeight;
    c.width = Math.round(w * dpr); c.height = Math.round(h * dpr);
    sizeRef.current = { w, h, dpr }; dirtyRef.current = true;
  }, []);

  const draw = useCallback(() => {
    const c = canvasRef.current; if (!c) return;
    const { w, h, dpr } = sizeRef.current; const v = viewRef.current;
    const ctx = c.getContext("2d");

    // Keep v.x bounded: the world is periodic, so shifting the camera by whole
    // laps is invisible but stops coordinates (and float precision) from blowing
    // up on long pans. Normalize into [-period, 0) before drawing/picking.
    const period = worldPeriod; // world-px width of one lap (Infinity if no wrap)
    if (map.wrap && isFinite(period) && !v.dragging) {
      const lap = period * v.scale; // one lap in screen px at current zoom
      if (lap > 0) {
        // wrap v.x into (-lap, 0] so it never accumulates across many laps
        v.x = ((v.x % lap) - lap) % lap;
      }
    }

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    const C = HexMath.CORNER;

    // Which horizontal copies of the world intersect the viewport?
    // A copy shifted by k*period is placed at screen-x = (X + offX + k*period)*scale + v.x
    // for world-x X in [0, period]. It overlaps the screen [0, w] when:
    //   right edge >= 0:  (period + offX + k*period)*scale + v.x >= 0
    //   left  edge <= w:  (offX + k*period)*scale + v.x <= w
    // Solve both for k and take the integer range between them. This uses the
    // SAME transform as paintScene, so the chosen copies are always the visible ones.
    let kMin = 0, kMax = 0;
    if (map.wrap && isFinite(period)) {
      // from right-edge>=0:  k >= (-v.x/scale - offX - period) / period
      const kLo = (-v.x / v.scale - offX - period) / period;
      // from left-edge<=w:   k <= (w - v.x)/scale - offX) / period
      const kHi = ((w - v.x) / v.scale - offX) / period;
      kMin = Math.floor(kLo) - 1;
      kMax = Math.ceil(kHi) + 1;
      // safety: bound the number of copies (shouldn't trigger in normal use)
      if (kMax - kMin > 8) kMax = kMin + 8;
    }

    let drawnTotal = 0;

    // paint the whole scene shifted horizontally by shiftX (world px)
    const paintScene = (shiftX) => {
      ctx.save();
      ctx.translate(v.x, v.y); ctx.scale(v.scale, v.scale); ctx.translate(offX + shiftX, offY);

      const m = HexMath.SIZE * 2;
      const vx0 = (-v.x) / v.scale - offX - shiftX - m, vy0 = (-v.y) / v.scale - offY - m;
      const vx1 = (w - v.x) / v.scale - offX - shiftX + m, vy1 = (h - v.y) / v.scale - offY + m;
      const visible = [];

      // pass 1: tile fills + borders
      for (let i = 0; i < map.cells.length; i++) {
        const cell = map.cells[i];
        if (cell.cx < vx0 || cell.cx > vx1 || cell.cy < vy0 || cell.cy > vy1) continue;
        visible.push(cell);
        const st = getStyle(cell);
        ctx.beginPath();
        ctx.moveTo(cell.cx + C[0][0], cell.cy + C[0][1]);
        for (let k = 1; k < 6; k++) ctx.lineTo(cell.cx + C[k][0], cell.cy + C[k][1]);
        ctx.closePath();
        ctx.fillStyle = st.fill; ctx.fill();
        // No interior grid stroke — same-biome tiles merge into clean regions.
        // We only stroke a tile outline when it's highlighted (origin/hover); the
        // land/water COASTLINE is drawn as its own pass below for a crisp shore.
        if (st.lineWidth > 1) { ctx.lineWidth = st.lineWidth / v.scale; ctx.strokeStyle = st.stroke; ctx.stroke(); }
        drawnTotal++;
      }

      // pass 1a: COASTLINE — stroke only land/water edges so continents read with
      // a defined shore. Two passes give it depth: a soft lighter halo (wider,
      // low-opacity) beneath a crisp darker shoreline on top.
      {
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        const coastPath = () => {
          ctx.beginPath();
          for (const cell of visible) {
            if (WORLD.hydrology.isLiquid(cell.terrain)) continue; // land side only
            for (let d = 0; d < 6; d++) {
              const nb = map.nbr(cell, HexMath.DIRS[d]);
              if (!nb || !WORLD.hydrology.isLiquid(nb.terrain)) continue;
              const [e1, e2] = HexMath.edgeCornerIdx(d);
              ctx.moveTo(cell.cx + C[e1][0], cell.cy + C[e1][1]);
              ctx.lineTo(cell.cx + C[e2][0], cell.cy + C[e2][1]);
            }
          }
        };
        // soft halo (a pale shoal glow hugging the shore)
        coastPath();
        ctx.strokeStyle = "rgba(150,200,220,0.30)";
        ctx.lineWidth = Math.max(2.2, 4.5 / v.scale);
        ctx.stroke();
        // crisp shoreline on top
        coastPath();
        ctx.strokeStyle = "rgba(12,28,40,0.65)";
        ctx.lineWidth = Math.max(0.8, 1.5 / v.scale);
        ctx.stroke();
      }

      // pass 1b: TERRAIN SYMBOLOGY — elevation glyphs (hills/mountain/peak).
      // Fades out when zoomed far (glyphs become visual noise at small scale).
      const glyphAlpha = Math.max(0, Math.min(1, (v.scale - 0.45) / 0.4));
      if (showStats) {
        // STATS OVERLAY: replace glyphs with compact per-cell numbers (elevation,
        // temperature, moisture, plus volcanic activity when present). Only drawn
        // when zoomed in enough to be legible; fades in like the glyphs do.
        if (glyphAlpha > 0.02) {
          ctx.save();
          ctx.globalAlpha = Math.min(1, glyphAlpha + 0.2);
          const fs = Math.max(2.8, HexMath.SIZE * 0.16);
          ctx.font = `${fs}px ui-monospace, monospace`;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          const fmt = (x) => (typeof x === "number" ? x.toFixed(2) : "—");
          for (const cell of visible) {
            const liquid = WORLD.hydrology.isLiquid(cell.terrain);
            // light text on dark tiles, dark text on light tiles
            const fillHex = WORLD.visuals.fillOf(cell.terrain);
            const lum = (parseInt(fillHex.slice(1, 3), 16) + parseInt(fillHex.slice(3, 5), 16) + parseInt(fillHex.slice(5, 7), 16)) / 765;
            ctx.fillStyle = lum > 0.55 ? "rgba(20,28,36,0.9)" : "rgba(235,242,248,0.92)";
            const lh = fs * 1.25;
            // collect the lines for this cell, then center the stack vertically
            const lines = ["elev: " + fmt(cell.elev)];
            if (!liquid) {
              lines.push("temp: " + fmt(cell.temp));
              lines.push("moisture: " + fmt(cell.moist));
              if (cell.activity && cell.activity > 0.05) lines.push("activity: " + fmt(cell.activity));
            }
            const y0 = cell.cy - ((lines.length - 1) * lh) / 2;
            for (let li = 0; li < lines.length; li++) ctx.fillText(lines[li], cell.cx, y0 + li * lh);
          }
          ctx.restore();
        }
      } else if (glyphAlpha > 0.02) {
        ctx.save();
        ctx.globalAlpha = glyphAlpha;
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.lineWidth = Math.max(0.6, 1.4 / v.scale);
        const gs = HexMath.SIZE; // glyph base size ~ hex size
        for (const cell of visible) {
          if (cell.special) continue; // special glyph (drawn below) replaces it
          ctx.strokeStyle = darkenHex(WORLD.visuals.fillOf(cell.terrain), WORLD.visuals.glyphTint(cell.terrain));
          // DETAILED VIEW: if on and this terrain has a multi-element detail
          // drawer, scatter it using a deterministic per-cell rng; otherwise fall
          // back to the normal single centred glyph.
          const detail = detailView ? DETAIL_GLYPH[cell.terrain] : null;
          if (detail) {
            detail(ctx, cell.cx, cell.cy, gs, cell, seededRand(cell.id));
          } else {
            const drawer = WORLD.visuals.glyphFor(cell.terrain);
            if (drawer) drawer(ctx, cell.cx, cell.cy, gs);
          }
        }
        // pass 1c: SPECIAL-TILE glyphs (volcano, etc.) drawn over their tile in
        // the special's own color so they read distinctly from terrain.
        if (WORLD.specials) {
          for (const cell of visible) {
            if (!cell.special) continue;
            const sp = WORLD.specials[cell.special];
            if (!sp || !sp.draw) continue;
            ctx.strokeStyle = sp.color || "#fff";
            sp.draw(ctx, cell.cx, cell.cy, gs);
          }
        }
        ctx.restore();
      }

      // pass 2a: CLIFFS as a rocky escarpment BAND (seam-aware). Rather than a
      // line with tick symbols, each cliff is a filled strip of rock running along
      // the edge: the crest follows the cliff line, the base is offset downhill
      // with an irregular (jittered) boundary so the face has uneven width like
      // real rock. The band is shaded — lighter near the crest (catching light),
      // darker at the base (in shadow) — and a thin crest line sharpens the top.
      if (map.cliffPaths && map.cliffPaths.length) {
        const cdef = EDGE_FEATURE.cliff;
        const halfP = isFinite(period) ? period / 2 : Infinity;
        const rockLite = "#8a6042";   // sunlit upper face
        const rockDark = "#5a3d27";   // shadowed base
        const crest    = "#9a7050";   // bright crest edge
        const faceH = HexMath.SIZE * 0.22;  // nominal cliff face height (downhill)

        // split a path into seam-free runs (so the band polygons don't cross wrap)
        const runsOf = (pts) => {
