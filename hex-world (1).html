          const runs = []; let cur = [pts[0]];
          for (let k = 1; k < pts.length; k++) {
            if (map.wrap && Math.abs(pts[k].x - pts[k - 1].x) > halfP) { if (cur.length > 1) runs.push(cur); cur = [pts[k]]; }
            else cur.push(pts[k]);
          }
          if (cur.length > 1) runs.push(cur);
          return runs;
        };

        for (const path of map.cliffPaths) {
          const pts = path.points;
          if (!pts || pts.length < 2) continue;
          let minx = Infinity, maxx = -Infinity, miny = Infinity, maxy = -Infinity;
          for (const p of pts) { if (p.x < minx) minx = p.x; if (p.x > maxx) maxx = p.x; if (p.y < miny) miny = p.y; if (p.y > maxy) maxy = p.y; }
          if (maxx < vx0 || minx > vx1 || maxy < vy0 || miny > vy1) continue;

          for (const run of runsOf(pts)) {
            const n = run.length;
            // per-vertex downhill normal + a stable jitter so the base edge is ragged
            const rnd = seededRand("cliff_" + run[0].x.toFixed(0) + "_" + run[0].y.toFixed(0));
            const base = [];
            for (let k = 0; k < n; k++) {
              const a = run[Math.max(0, k - 1)], b = run[Math.min(n - 1, k + 1)];
              const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
              let nx = -dy / len, ny = dx / len;
              if (ny < 0) { nx = -nx; ny = -ny; }          // downhill side
              const h = faceH * (0.7 + rnd() * 0.6);        // ragged face height
              base.push({ x: run[k].x + nx * h, y: run[k].y + ny * h });
            }
            // band polygon: crest forward, base backward
            const bandPath = () => {
              ctx.beginPath();
              ctx.moveTo(run[0].x, run[0].y);
              for (let k = 1; k < n; k++) ctx.lineTo(run[k].x, run[k].y);
              for (let k = n - 1; k >= 0; k--) ctx.lineTo(base[k].x, base[k].y);
              ctx.closePath();
            };
            // (1) fill the whole face in the sunlit tone
            ctx.fillStyle = rockLite; bandPath(); ctx.fill();
            // (2) darker shadow along the lower half — a second band from a mid
            // line to the base, giving the face top-lit shading
            const mid = run.map((p, k) => ({ x: (p.x + base[k].x) / 2, y: (p.y + base[k].y) / 2 }));
            ctx.fillStyle = rockDark;
            ctx.beginPath();
            ctx.moveTo(mid[0].x, mid[0].y);
            for (let k = 1; k < n; k++) ctx.lineTo(mid[k].x, mid[k].y);
            for (let k = n - 1; k >= 0; k--) ctx.lineTo(base[k].x, base[k].y);
            ctx.closePath(); ctx.fill();
            // (3) crisp bright crest line on top
            ctx.strokeStyle = crest; ctx.lineWidth = Math.max(0.8, 1.6 / v.scale);
            ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(run[0].x, run[0].y);
            for (let k = 1; k < n; k++) ctx.lineTo(run[k].x, run[k].y);
            ctx.stroke();
          }
        }
      }

      // pass 2a-delta: DELTA FANS — the river's mouth visibly BROADENING into the
      // sea (drawn before the river line so it overlays seamlessly). Filled in the
      // river colour (not a separate silt tone) so it reads as the river fattening,
      // with thicker, gently-curved distributaries for flow.
      if (map.deltaFans && map.deltaFans.length) {
        const rcol = EDGE_FEATURE.river.color;
        const rdefW = EDGE_FEATURE.river.width;
        for (const fan of map.deltaFans) {
          const p = fan.poly;
          // cull if entirely off-screen
          let minx = Infinity, maxx = -Infinity, miny = Infinity, maxy = -Infinity;
          for (const v of p) { if (v.x < minx) minx = v.x; if (v.x > maxx) maxx = v.x; if (v.y < miny) miny = v.y; if (v.y > maxy) maxy = v.y; }
          if (maxx < vx0 || minx > vx1 || maxy < vy0 || miny > vy1) continue;
          // fan body — smooth the outline into a flowing shape, but keep the two
          // COASTAL corners (poly[1], poly[3]) sharp so it still reaches the shore.
          const n = p.length;
          const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
          const sharp = (k) => (k === 1 || k === 3); // coastal spread corners
          ctx.beginPath();
          const m0 = mid(p[n - 1], p[0]);
          ctx.moveTo(m0.x, m0.y);
          for (let k = 0; k < n; k++) {
            const next = mid(p[k], p[(k + 1) % n]);
            if (sharp(k)) { ctx.lineTo(p[k].x, p[k].y); ctx.lineTo(next.x, next.y); }
            else ctx.quadraticCurveTo(p[k].x, p[k].y, next.x, next.y);
          }
          ctx.closePath();
          // fill in the RIVER colour (mostly opaque) so the delta is the river
          ctx.save();
          ctx.globalAlpha = 0.78;
          ctx.fillStyle = rcol;
          ctx.fill();
          ctx.restore();
          // distributary channels: thicker, and gently bowed for flow (a slight
          // perpendicular kick at the midpoint → quadratic curve, not a stiff line)
          ctx.strokeStyle = rcol;
          ctx.lineWidth = (rdefW * 0.9) / v.scale;   // thicker than before (~river weight)
          ctx.lineCap = "round"; ctx.lineJoin = "round";
          let ci = 0;
          for (const ch of fan.channels) {
            const dx = ch.x2 - ch.x1, dy = ch.y2 - ch.y1;
            const len = Math.hypot(dx, dy) || 1;
            const nx = -dy / len, ny = dx / len;       // perpendicular
            // alternate the bow direction per channel for a natural splay
            const bow = (ci % 2 ? 1 : -1) * len * 0.12;
            const mx = (ch.x1 + ch.x2) / 2 + nx * bow, my = (ch.y1 + ch.y2) / 2 + ny * bow;
            ctx.beginPath();
            ctx.moveTo(ch.x1, ch.y1);
            ctx.quadraticCurveTo(mx, my, ch.x2, ch.y2);
            ctx.stroke();
            ci++;
          }
        }
      }

      // pass 2b: RIVERS as connected polylines along the flow path (Civ model)
      if (map.riverPaths && map.riverPaths.length) {
        const rdef = EDGE_FEATURE.river;
        const halfP = isFinite(period) ? period / 2 : Infinity;
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        // tone by size: small creeks read as a lighter, paler blue; large rivers
        // deepen toward a richer blue. Lerp between the two by the path's width
        // factor (≈1.0 creek .. 2.0 big river).
        const RIV_SMALL = [127, 198, 232];  // #7fc6e8 pale
        const RIV_LARGE = [56, 150, 198];    // #3896c6 deep
        const riverColor = (wf) => {
          const t = Math.max(0, Math.min(1, (wf - 1)));   // 0 at creek, 1 at big
          const c = (i) => Math.round(RIV_SMALL[i] + (RIV_LARGE[i] - RIV_SMALL[i]) * t);
          return "rgb(" + c(0) + "," + c(1) + "," + c(2) + ")";
        };
        for (const path of map.riverPaths) {
          const pts = path.points;
          if (!pts || pts.length < 2) continue;
          let minx = Infinity, maxx = -Infinity, miny = Infinity, maxy = -Infinity;
          for (const p of pts) { if (p.x < minx) minx = p.x; if (p.x > maxx) maxx = p.x; if (p.y < miny) miny = p.y; if (p.y > maxy) maxy = p.y; }
          if (maxx < vx0 || minx > vx1 || maxy < vy0 || miny > vy1) continue;
          ctx.strokeStyle = riverColor(path.width || 1);
          ctx.lineWidth = (rdef.width * (path.width || 1)) / v.scale;
          // Smooth the corner-lattice path into a flowing curve: draw quadratic
          // arcs through segment MIDPOINTS using each lattice corner as the
          // control point. This rounds every hard turn so the river reads as
          // fluid water rather than hugging hex edges. Runs break at seam jumps.
          // PINNED points (path.pin set: confluences where a tributary joins, plus
          // the natural endpoints) are passed through EXACTLY rather than corner-cut,
          // so a main river doesn't bow away from a junction while its tributary
          // arrives there — which previously made tributaries look like they fed
          // "in and back out" of the channel.
          const seam = (a, b) => map.wrap && Math.abs(b.x - a.x) > halfP;
          const pin = path.pin || null; // Set of point indices to pass through
          const FLATTEN = 0.5; // 0 = full bend (control at vertex), 1 = straight
          ctx.beginPath();
          let prevMx = null, prevMy = null; // previous segment midpoint (entry side)
          for (let k = 0; k < pts.length; k++) {
            if (k === 0) { ctx.moveTo(pts[0].x, pts[0].y); continue; }
            if (seam(pts[k - 1], pts[k])) {
              // The segment crosses the wrap seam. Continue the line from pts[k-1]
              // out to the UNWRAPPED ghost of pts[k] (so it exits the correct edge),
              // then lift the pen and resume at the real pts[k]. The scene is
              // repainted shifted by ±period, so the matching entry on the other
              // side is drawn by the neighbouring copy — we must NOT draw a second
              // reverse stub here, or it chords straight across a seam-edge cell.
              const dir = pts[k].x > pts[k - 1].x ? -1 : 1; // ghost shifted toward prev
              ctx.lineTo(pts[k].x + dir * period, pts[k].y);
              ctx.moveTo(pts[k].x, pts[k].y);
              prevMx = null; continue;
            }
            const isLast = (k === pts.length - 1) || seam(pts[k], pts[k + 1]);
            const pinThis = isLast || (pin && pin.has(k));
            if (pinThis) {
              // pass through this point exactly along the real segment
              ctx.lineTo(pts[k].x, pts[k].y);
            } else {
              // interior: curve toward the midpoint of the next segment. Flatten by
              // pulling the control point off the sharp vertex toward the chord
              // (midpoint of the entry & exit midpoints), so bends are gentler.
              const mx = (pts[k].x + pts[k + 1].x) / 2, my = (pts[k].y + pts[k + 1].y) / 2;
              const emx = prevMx != null ? prevMx : pts[k - 1].x; // entry midpoint
              const emy = prevMy != null ? prevMy : pts[k - 1].y;
              const chordX = (emx + mx) / 2, chordY = (emy + my) / 2;
              const cx = pts[k].x + (chordX - pts[k].x) * FLATTEN;
              const cy = pts[k].y + (chordY - pts[k].y) * FLATTEN;
              ctx.quadraticCurveTo(cx, cy, mx, my);
              prevMx = mx; prevMy = my;
            }
          }
          ctx.stroke();
        }
      }

      // pass 3: path overlay (drawn in every copy so it shows across the seam)
      if (pathData && pathData.path && pathData.path.length > 0) {
        const ids = pathData.path;
        for (const id of ids) {
          const cell = map.index.get(id); if (!cell) continue;
          ctx.beginPath();
          ctx.moveTo(cell.cx + C[0][0], cell.cy + C[0][1]);
          for (let k = 1; k < 6; k++) ctx.lineTo(cell.cx + C[k][0], cell.cy + C[k][1]);
          ctx.closePath();
          ctx.fillStyle = "rgba(255,176,136,0.14)"; ctx.fill();
        }
        if (ids.length > 1) {
          // draw the polyline segment-by-segment, taking the wrapped short hop
          ctx.strokeStyle = "rgba(255,176,136,0.95)";
          ctx.lineWidth = 3 / v.scale; ctx.lineJoin = "round";
          for (let i = 1; i < ids.length; i++) {
            const a = map.index.get(ids[i - 1]), b = map.index.get(ids[i]);
            if (!a || !b) continue;
            let bx = b.cx;
            // if the step is a wrapped seam hop, draw to the ghost position
            if (map.wrap && isFinite(period) && Math.abs(b.cx - a.cx) > period / 2) {
              bx = b.cx + (a.cx > b.cx ? period : -period);
            }
            ctx.beginPath(); ctx.moveTo(a.cx, a.cy); ctx.lineTo(bx, b.cy); ctx.stroke();
          }
        }
        const o = map.index.get(ids[0]);
        ctx.beginPath(); ctx.arc(o.cx, o.cy, 7 / v.scale, 0, Math.PI * 2);
        ctx.lineWidth = 2.5 / v.scale; ctx.strokeStyle = "#ffe1b3"; ctx.stroke();
        const g2 = map.index.get(ids[ids.length - 1]);
        ctx.beginPath(); ctx.arc(g2.cx, g2.cy, 6 / v.scale, 0, Math.PI * 2);
        ctx.fillStyle = "#ffb088"; ctx.fill();

        ctx.font = `${11 / v.scale}px ui-monospace, monospace`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        let running = 0;
        for (const step of (pathData.steps || [])) {
          running += step.cost;
          const cell = map.index.get(step.to); if (!cell) continue;
          const isGoal = step.to === ids[ids.length - 1];
          const label = isGoal ? `Σ ${round1(running)}` : String(round1(step.cost));
          const tw = (label.length * 7 + 8) / v.scale;
          ctx.fillStyle = "rgba(10,14,20,0.82)";
          ctx.fillRect(cell.cx - tw / 2, cell.cy - 9 / v.scale, tw, 18 / v.scale);
          ctx.fillStyle = isGoal ? "#ffd17a" : "#ffe1b3";
          ctx.fillText(label, cell.cx, cell.cy);
        }
      } else if (pathData && pathData.originId) {
        const o = map.index.get(pathData.originId);
        if (o) {
          ctx.beginPath(); ctx.arc(o.cx, o.cy, 7 / v.scale, 0, Math.PI * 2);
          ctx.lineWidth = 2.5 / v.scale; ctx.strokeStyle = "#ffe1b3"; ctx.stroke();
        }
      }

      // pass 4: LABELS — cartographic names for water bodies (horizontal) and
      // rivers (text following the curve). Drawn last so they sit atop terrain.
      if (map.labels && map.labels.length) {
        const labelAlpha = Math.max(0, Math.min(1, (v.scale - 0.3) / 0.5));
        if (labelAlpha > 0.02) {
          ctx.save();
          ctx.globalAlpha = labelAlpha;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          for (const lab of map.labels) {
            if (lab.kind === "area") {
              // size + style by importance: oceans largest, lakes smallest
              const base = lab.subtype === "ocean" ? 19 : lab.subtype === "sea" ? 15 : 12;
              const fs = base / v.scale;
              ctx.font = `italic 600 ${fs}px Georgia, 'Times New Roman', serif`;
              const x = lab.x, y = lab.y;
              if (x < vx0 - 200 || x > vx1 + 200 || y < vy0 - 50 || y > vy1 + 50) continue;
              // letter-spaced, soft halo for legibility over water
              const txt = lab.name.toUpperCase();
              ctx.lineWidth = 3 / v.scale; ctx.strokeStyle = "rgba(10,30,45,0.55)";
              ctx.fillStyle = "rgba(210,230,240,0.82)";
              // manual letter spacing
              const ls = fs * 0.18;
              let tw = 0; for (const ch of txt) tw += ctx.measureText(ch).width + ls;
              tw -= ls;
              let cx = x - tw / 2;
              for (const ch of txt) {
                const cw = ctx.measureText(ch).width;
                ctx.strokeText(ch, cx + cw / 2, y);
                ctx.fillText(ch, cx + cw / 2, y);
                cx += cw + ls;
              }
            } else if (lab.kind === "river") {
              // STRAIGHT label angled along the river's OVERALL direction. Curving
              // text along the hex-lattice path made letters bunch and flip on the
              // constant small turns, so instead we anchor at the path midpoint and
              // take the general heading from a span around it, then draw the name
              // as one rotated string.
              const pts = lab.points;
              if (!pts || pts.length < 4) continue;
              const half = isFinite(period) ? period / 2 : Infinity;
              // build per-vertex cumulative length (skip seam jumps), and the list
              // of usable (non-seam) vertices so we can pick a clean mid span.
              const cum = [0];
              let total = 0;
              for (let i = 1; i < pts.length; i++) {
                const dx = pts[i].x - pts[i - 1].x, dy = pts[i].y - pts[i - 1].y;
                if (map.wrap && Math.abs(dx) > half) { cum.push(cum[i - 1]); continue; } // seam: no length
                total += Math.hypot(dx, dy); cum.push(total);
              }
              if (total < HexMath.SIZE * 2) continue; // too short to label
              // find the vertices nearest 35% and 65% of the length for a stable
              // heading, and the 50% point as the text anchor.
              const atLen = (frac) => {
                const target = total * frac;
                let bi = 0, bd = Infinity;
                for (let i = 0; i < pts.length; i++) { const d = Math.abs(cum[i] - target); if (d < bd) { bd = d; bi = i; } }
                return pts[bi];
              };
              const aPt = atLen(0.35), mPt = atLen(0.5), bPt = atLen(0.65);
              // overall heading (seam-aware dx)
              let hdx = bPt.x - aPt.x, hdy = bPt.y - aPt.y;
              if (map.wrap && Math.abs(hdx) > half) hdx -= Math.sign(hdx) * period;
              let ang = Math.atan2(hdy, hdx);
              if (ang > Math.PI / 2 || ang < -Math.PI / 2) ang += Math.PI; // keep upright
              // cull if anchor offscreen
              if (mPt.x < vx0 - 200 || mPt.x > vx1 + 200 || mPt.y < vy0 - 50 || mPt.y > vy1 + 50) continue;
              const fs = 12 / v.scale;
              ctx.font = `italic 600 ${fs}px Georgia, serif`;
              ctx.fillStyle = "rgba(200,225,240,0.9)";
              ctx.lineWidth = 2.5 / v.scale; ctx.strokeStyle = "rgba(10,30,45,0.5)";
              ctx.textAlign = "center"; ctx.textBaseline = "middle";
              const tw = ctx.measureText(lab.name).width;
              if (tw > total * 0.9) continue; // name longer than the river
              ctx.save();
              ctx.translate(mPt.x, mPt.y - fs * 0.7); // offset just above the channel
              ctx.rotate(ang);
              ctx.strokeText(lab.name, 0, 0);
              ctx.fillText(lab.name, 0, 0);
              ctx.restore();
            }
          }
          ctx.restore();
        }
      }

      ctx.restore();
    };

    if (map.wrap && isFinite(period)) {
      for (let k = kMin; k <= kMax; k++) paintScene(k * period);
    } else {
      paintScene(0);
    }

    onStats && onStats({ total: map.cells.length, drawn: drawnTotal, scale: v.scale });
  }, [map, getStyle, viewRef, offX, offY, onStats, pathData, worldPeriod, showStats, detailView]);

  useEffect(() => {
    const loop = () => { if (dirtyRef.current) { dirtyRef.current = false; draw(); } rafRef.current = requestAnimationFrame(loop); };
    rafRef.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafRef.current);
  }, [draw]);
  useEffect(() => { dirtyRef.current = true; }, [drawSignal]);
  useEffect(() => {
    resize(); const ro = new ResizeObserver(resize);
    if (canvasRef.current) ro.observe(canvasRef.current);
    return () => ro.disconnect();
  }, [resize]);

  return (
    <canvas
      ref={canvasRef} className="hex-canvas"
      onPointerDown={onPointerDown}
      onPointerMove={(e) => { onPointerMove(e); const c = pickCell(e.clientX, e.clientY); onCellHover(c ? c.id : null); }}
      onPointerUp={onPointerUp}
      onPointerLeave={(e) => { onPointerUp(e); onCellHover(null); }}
      onWheel={onWheel}
      onClick={(e) => { const c = pickCell(e.clientX, e.clientY); if (c) onCellClick(c); }}
      style={{ touchAction: "none", width: "100%", height: "100%", display: "block" }}
    />
  );
}

/* ===========================================================================
   LAYER 3c — WORLD VIEW  — the interactive map. Receives a finished config; no setup UI.
   =========================================================================== */
function WorldView({ config, onReconfigure }) {
  const COLS = config.cols, ROWS = config.rows;

  // committed params actually used to build the map
  const committed = config;
  const map = useMemo(() => generateWorld(COLS, ROWS, committed), [COLS, ROWS, committed]);
  const bounds = useMemo(() => computeBounds(map.cells), [map]);

  const originRef = useRef(null);        // path start
  const destRef = useRef(null);          // path end (set on 2nd click)
  const hoveredRef = useRef(null);
  const ignoreBlockedRef = useRef(false); // "special ability" override
  const pathRef = useRef(null);           // last computed path result
  const [drawSignal, setDrawSignal] = useState(0);
  const requestDraw = useCallback(() => setDrawSignal((n) => (n + 1) & 0xffff), []);
  const [legendOpen, setLegendOpen] = useState(true);

  const [hud, setHud] = useState({
    origin: null, dest: null, hov: null,
    path: null, ignoreBlocked: false, showStats: false, detailView: false,
    drawn: 0, total: 0, scale: 1,
  });

  const engine = useHexView(requestDraw);
  const stageRef = useRef(null);

  // recompute the path from current origin -> (dest or hovered) and publish it
  const recomputePath = useCallback((endId) => {
    const o = originRef.current ? map.index.get(originRef.current) : null;
    const e = endId ? map.index.get(endId) : null;
    if (!o || !e || o.id === e.id) { pathRef.current = null; return null; }
    const res = findPath(o, e, map, { ignoreBlocked: ignoreBlockedRef.current });
    pathRef.current = res && res.reached
      ? { path: res.path, steps: res.steps, originId: o.id, cost: res.cost, reached: true, expansions: res.expansions }
      : { path: [], steps: [], originId: o.id, cost: Infinity, reached: false, expansions: res ? res.expansions : 0 };
    return pathRef.current;
  }, [map]);

  const onWheel = useCallback((e) => {
    e.preventDefault();
    const rect = stageRef.current.getBoundingClientRect();
    engine.zoomAt(e.clientX - rect.left, e.clientY - rect.top, e.deltaY);
  }, [engine]);

  // Click model: 1st click = origin, 2nd = destination (locks path),
  // 3rd click = start over with a new origin.
  const onCellClick = useCallback((cell) => {
    if (engine.wasDrag()) return;
    if (!originRef.current || (originRef.current && destRef.current)) {
      originRef.current = cell.id; destRef.current = null; pathRef.current = { path: [], steps: [], originId: cell.id };
    } else if (cell.id === originRef.current) {
      originRef.current = null; destRef.current = null; pathRef.current = null;
    } else {
      destRef.current = cell.id; recomputePath(cell.id);
    }
    setHud((h) => ({ ...h, origin: originRef.current, dest: destRef.current, path: pathRef.current }));
    requestDraw();
  }, [engine, recomputePath, requestDraw]);

  // Hover: if origin set but no locked dest, preview path to hovered tile.
  const onCellHover = useCallback((id) => {
    if (hoveredRef.current === id) return;
    hoveredRef.current = id;
    if (originRef.current && !destRef.current && id) {
      recomputePath(id);
      setHud((h) => ({ ...h, hov: id, path: pathRef.current }));
    } else {
      setHud((h) => ({ ...h, hov: id }));
    }
    requestDraw();
  }, [recomputePath, requestDraw]);

  const toggleIgnoreBlocked = useCallback(() => {
    ignoreBlockedRef.current = !ignoreBlockedRef.current;
    // recompute against whatever endpoint is active
    const endId = destRef.current || hoveredRef.current;
    if (originRef.current && endId) recomputePath(endId);
    setHud((h) => ({ ...h, ignoreBlocked: ignoreBlockedRef.current, path: pathRef.current }));
    requestDraw();
  }, [recomputePath, requestDraw]);

  const toggleStats = useCallback(() => {
    setHud((h) => ({ ...h, showStats: !h.showStats }));
    requestDraw();
  }, [requestDraw]);

  const toggleDetail = useCallback(() => {
    setHud((h) => ({ ...h, detailView: !h.detailView }));
    requestDraw();
  }, [requestDraw]);

  const clearPath = useCallback(() => {
    originRef.current = null; destRef.current = null; pathRef.current = null;
    setHud((h) => ({ ...h, origin: null, dest: null, path: null }));
    requestDraw();
  }, [requestDraw]);

  const getStyle = useCallback((cell) => {
    const mat = WORLD.materials[cell.terrain];
    const isOrigin = cell.id === originRef.current;
    const isHov = cell.id === hoveredRef.current;
    let stroke = WORLD.visuals.strokeOf(cell.terrain), lineWidth = 1;
    if (isOrigin) { stroke = "#ffb088"; lineWidth = 3; }
    else if (isHov) { stroke = "#cfe0f0"; lineWidth = 2; }
    // Water colouring: LAKES are a single solid fresh-water colour (like rivers,
    // so inland water reads cohesively). OCEAN/SEA use the bathymetric ramp — but
    // sea depth only occupies roughly the 0.2–1.0 slice of raw depth, so we
    // RESCALE that band to 0–1 before the lookup, letting shallow coastal sea hit
    // the bright shallow end and the abyss reach deep navy (the full gradient).
    const SEA_SHALLOW = 0.18, SEA_DEEP = 1.0; // raw depth01 band the sea spans
    // For forested tiles, paint the GROUND (grass/hills) the trees stand on, not
    // the fused forest green — the vegetation itself is drawn as glyphs/detail on
    // top. This also previews what the tile becomes if the forest is chopped.
    const baseTerrain = cell.vegetation ? (cell.ground || "grass") : cell.terrain;
    let fill = WORLD.visuals.fillOf(baseTerrain);
    if (WORLD.hydrology.isLiquid(cell.terrain)) {
      if (WORLD.hydrology.isLake(cell.terrain)) {
        fill = "#3f9ec4"; // solid fresh-water blue (kin to the river palette)
      } else {
        const raw = typeof cell.elev === "number" ? -cell.elev : 0.3; // 0 (coast) .. 1 (abyss)
        const d = Math.max(0, Math.min(1, (raw - SEA_SHALLOW) / (SEA_DEEP - SEA_SHALLOW)));
        fill = bathyColor(d, false);
      }
    } else {
      let r = parseInt(fill.slice(1, 3), 16), g = parseInt(fill.slice(3, 5), 16), b = parseInt(fill.slice(5, 7), 16);
      // (a) moisture tint — only biomes where wetness reads as colour (use the
      // base/ground terrain so forested tiles tint by their grass/hills ground)
      const VEG = baseTerrain === "grass" || baseTerrain === "forest" || baseTerrain === "taiga" || baseTerrain === "marsh" || baseTerrain === "jungle";
      if (VEG && typeof cell.moist === "number") {
        const m = cell.moist - 0.5;       // -0.5 (dry) .. +0.5 (wet)
        // dry: push toward warm (more red, less blue). wet: deepen green, cool slightly.
        r += -m * 26;                      // drier => redder
        b += -m * 14;                      // drier => less blue (warmer)
        g += m * 8;                        // wetter => a touch greener
      }
      // (b) elevation shading (multiplicative), damped on already-bright tiles.
      // elev is now sea-relative: 0 at the coast, +1 at the highest peak. Center
      // the shading a bit above the shore so coastal land is near-neutral and
      // higher ground brightens.
      if (typeof cell.elev === "number") {
        const raw = (cell.elev - 0.35) * 0.30;       // ~ -0.10 (coast) .. +0.20 (peak)
        const lum = (r + g + b) / 765;
        const f = raw > 0 ? 1 + raw * (1 - lum) : 1 + raw;
        r *= f; g *= f; b *= f;
      }
      const cl = (v) => Math.max(0, Math.min(255, Math.round(v)));
      fill = "rgb(" + cl(r) + "," + cl(g) + "," + cl(b) + ")";
    }
    return { fill, stroke, lineWidth, blocked: mat.blocked };
  }, []);

  const onStats = useCallback((s) => {
    setHud((h) => (h.drawn === s.drawn && h.scale === s.scale ? h : { ...h, drawn: s.drawn, total: s.total, scale: s.scale }));
  }, []);

  const originCell = hud.origin ? map.index.get(hud.origin) : null;
  const destCell = hud.dest ? map.index.get(hud.dest) : null;
  const path = hud.path;

  return (
    <div style={S.wrap}>
      <style>{CSS}</style>
      <header style={S.header}>
        <div style={S.titleBlock}>
          <span style={S.kicker}>Seed: {config.seed}</span>
          <h1 style={S.title}>Hex&nbsp;Field</h1>
        </div>
        <div style={S.infoCol}>
          {!originCell ? (
            <span style={S.hint}>click a tile to set origin · click again for destination · hover to preview</span>
          ) : (
            <div style={S.row}>
              <span style={S.lbl}>ORIGIN</span>
              <span style={S.val}>{originCell.id}</span>
              <span style={S.terr}>{TERRAIN[originCell.terrain].name}</span>
              {destCell && <><span style={S.lbl}>→</span><span style={S.val}>{destCell.id}</span><span style={S.terr}>{TERRAIN[destCell.terrain].name}</span></>}
            </div>
          )}
          {originCell && path && (
            path.reached ? (
              <div style={S.row}>
                <span style={S.cost}>total {round1(path.cost)}</span>
                <span style={S.break}>{path.path.length - 1} step{path.path.length - 1 === 1 ? "" : "s"} · A* expanded {path.expansions} nodes</span>
              </div>
            ) : path.path && path.path.length === 0 && (hud.dest || hud.hov) ? (
              <div style={S.row}><span style={S.blocked}>NO ROUTE{ignoreBlockedRef.current ? "" : " (blocked terrain in the way)"}</span></div>
            ) : null
          )}
        </div>
      </header>

      <div style={S.stage} ref={stageRef}>
        <CanvasHexRenderer
          map={map} bounds={bounds} viewRef={engine.view}
          drawSignal={drawSignal} getStyle={getStyle}
          pathData={path} showStats={hud.showStats} detailView={hud.detailView}
          onPointerDown={engine.onPointerDown}
          onPointerMove={engine.onPointerMove}
          onPointerUp={engine.onPointerUp}
          onWheel={onWheel}
          onCellClick={onCellClick} onCellHover={onCellHover} onStats={onStats}
        />
        <button style={S.reconfig} onClick={onReconfigure}>⚙ new world</button>

        <div style={S.legend}>
          <button style={S.legHeader} onClick={() => setLegendOpen((o) => !o)}>
            <span>{legendOpen ? "▾" : "▸"}</span>
            <span>Legend</span>
          </button>
          {legendOpen && (
            <div style={S.legBody}>
              {/* ocean depth gradient + a solid lake swatch */}
              <span style={S.legItem}>
                <span style={{ width: 18, height: 18, flexShrink: 0, borderRadius: 3, border: "1px solid #243240",
                  background: `linear-gradient(to right, ${bathyColor(0, false)}, ${bathyColor(0.3, false)}, ${bathyColor(0.6, false)}, ${bathyColor(1, false)})` }} />
                Ocean (shallow→deep)
              </span>
              <span style={S.legItem}>
                <span style={{ ...S.swatch, background: "#3f9ec4" }} />
                Lake
              </span>
              {(WORLD.visuals.legend || BIOME_LEGEND).filter((k) => !WORLD.hydrology.isLiquid(k) && k !== "marsh").map((k) => (
                <span key={k} style={S.legItem}>
                  <span style={{ ...S.swatchBox, background: WORLD.visuals.fillOf(k), borderColor: WORLD.visuals.strokeOf(k) }} />
                  {WORLD.visuals.glyphFor(k) && <GlyphSwatch terrain={k} />}
                  {WORLD.materials[k].name}
                </span>
              ))}
              <span style={S.legDiv} />
              <span style={S.legSection}>Wetlands</span>
              {/* marsh & mangrove are the two sub-types of the wetland base */}
              <span style={S.legItem}>
                <span style={{ ...S.swatchBox, background: WORLD.visuals.fillOf("marsh"), borderColor: WORLD.visuals.strokeOf("marsh") }} />
                <GlyphSwatch terrain="marsh" />
                Marsh
              </span>
              <span style={S.legItem}>
                <span style={{ ...S.swatchBox, background: WORLD.visuals.fillOf("marsh"), borderColor: WORLD.visuals.strokeOf("marsh") }} />
                <SpecialSwatch specialKey="mangrove" />
                Mangrove
              </span>
              <span style={S.legDiv} />
              {Object.entries(EDGE_FEATURE).map(([k, d]) => (
                <span key={k} style={S.legItem}>
                  <span style={{ ...S.swatch, background: d.color }} />
                  {d.name} {d.cross > 0 ? `+${d.cross}` : d.blocked ? "✕" : d.cross}
                </span>
              ))}
              {WORLD.specials && Object.keys(WORLD.specials).filter((k) => k !== "mangrove").length > 0 && (
                <>
                  <span style={S.legDiv} />
                  <span style={S.legSection}>Special features</span>
                  {Object.entries(WORLD.specials).filter(([k]) => k !== "mangrove").map(([k, sp]) => (
                    <span key={k} style={S.legItem}>
                      <SpecialSwatch specialKey={k} />
                      {sp.name || k}
                    </span>
                  ))}
                </>
              )}
            </div>
          )}
        </div>
        <div style={S.controls}>
          <button
            style={{ ...S.toggle, ...(hud.ignoreBlocked ? S.toggleOn : {}) }}
            onClick={toggleIgnoreBlocked}
          >
            {hud.ignoreBlocked ? "✓ " : ""}ignore blocked (ability)
          </button>
          <button
            style={{ ...S.toggle, ...(hud.showStats ? S.toggleOn : {}) }}
            onClick={toggleStats}
          >
            {hud.showStats ? "✓ " : ""}cell stats
          </button>
          <button
            style={{ ...S.toggle, ...(hud.detailView ? S.toggleOn : {}) }}
            onClick={toggleDetail}
          >
            {hud.detailView ? "✓ " : ""}detailed view
          </button>
          {originCell && <button style={S.clear} onClick={clearPath}>clear path</button>}
        </div>
        <div style={S.stats}>{hud.drawn}/{hud.total} drawn · {Math.round(hud.scale * 100)}%</div>
        <button style={S.reset} onClick={engine.reset}>⟳ reset</button>
      </div>
    </div>
  );
}

// compact slider row for the worldgen panel
function Slider({ label, value, min, max, step, onChange, fmt }) {
  return (
    <label style={S.sliderRow}>
      <span style={S.sliderLabel}>{label}</span>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={(e) => onChange(parseFloat(e.target.value))} style={S.sliderInput} />
      <span style={S.sliderVal}>{fmt ? fmt(value) : value}</span>
    </label>
  );
}

// which biomes to show in the legend (skip near-duplicates for space)
const BIOME_LEGEND = ["ocean", "water", "lake", "desert", "grass", "forest", "jungle", "marsh", "taiga", "tundra", "hills", "mountain", "peak"];
WORLD.visuals.legend = BIOME_LEGEND; // expose legend through the WorldDef seam

// Legend glyph swatch: renders the SAME canvas drawer used on the map onto a
// tiny canvas, so every glyph (elevation + vegetation) shows with no duplicate
// path code to maintain.
function GlyphSwatch({ terrain }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const dpr = window.devicePixelRatio || 1;
    const px = 18;
    c.width = px * dpr; c.height = px * dpr;
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, px, px);
    const drawer = WORLD.visuals.glyphFor(terrain);
    if (!drawer) return;
    ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.lineWidth = 1.3;
    ctx.strokeStyle = darkenHex(WORLD.visuals.fillOf(terrain), WORLD.visuals.glyphTint(terrain));
    drawer(ctx, px / 2, px / 2, px * 0.92); // glyph base size ~ swatch
  }, [terrain]);
  return <canvas ref={ref} style={{ width: 18, height: 18, flexShrink: 0 }} />;
}

// Legend swatch for a SPECIAL feature: draws the special's own glyph (volcano,
// oasis, reef, …) in its registry colour onto a tiny dark tile.
function SpecialSwatch({ specialKey }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const sp = WORLD.specials && WORLD.specials[specialKey];
    if (!sp || !sp.draw) return;
    const dpr = window.devicePixelRatio || 1;
    const px = 18;
    c.width = px * dpr; c.height = px * dpr;
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, px, px);
    ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.lineWidth = 1.3;
    ctx.strokeStyle = sp.color || "#fff";
    ctx.fillStyle = sp.color || "#fff";
    sp.draw(ctx, px / 2, px / 2, px * 0.92);
  }, [specialKey]);
  return <canvas ref={ref} style={{ width: 18, height: 18, flexShrink: 0 }} />;
}

/* ===========================================================================
   DEFAULT CONFIG + SIZE PRESETS
   =========================================================================== */
const DEFAULT_CONFIG = {
  cols: 46, rows: 30,
  seed: 11,
  oceanAmount: 0.42,
  continentCount: 4,
  mountainDensity: 0.5,
  riverThreshold: 0.55,
  climateStrength: 0.7,
  roughness: 0.5,
  volcanism: 0.5,
  minIsland: 2,
  preset: null,
};

const SIZE_PRESETS = [
  { key: "small",  label: "Small",  cols: 30, rows: 20 },
  { key: "medium", label: "Medium", cols: 46, rows: 30 },
  { key: "large",  label: "Large",  cols: 70, rows: 46 },
  { key: "huge",   label: "Huge",   cols: 100, rows: 64 },
];

/* ===========================================================================
   LAYER 3d — SETUP SCREEN — all world configuration lives here, before the map loads.
   =========================================================================== */
function SetupScreen({ initial, onStart }) {
  // fresh random seed on each page load (lazy init runs once per mount)
  const [cfg, setCfg] = useState(() => ({ ...(initial || DEFAULT_CONFIG), seed: (Math.random() * 1e9) | 0 }));
  const set = (patch) => setCfg((c) => ({ ...c, ...patch }));
  const tiles = cfg.cols * cfg.rows;
  const activePreset = SIZE_PRESETS.find((p) => p.cols === cfg.cols && p.rows === cfg.rows);

  return (
    <div style={S.setupWrap}>
      <style>{CSS}</style>
      <div style={S.setupCard}>
        <div style={S.setupHead}>
          <span style={S.kicker}>WORLD SETUP</span>
          <h1 style={S.setupTitle}>Generate a World</h1>
          <p style={S.setupSub}>Configure the map, then generate. You can start over anytime from inside the map.</p>
        </div>

        <div style={S.setupSection}>
          <div style={S.sectionLabel}>SCENARIO</div>
          <div style={S.presetRow}>
            <button
              style={{ ...S.preset, ...(!cfg.preset ? S.presetOn : {}) }}
              onClick={() => set({ preset: null })}>
              <span style={S.presetName}>Procedural</span>
              <span style={S.presetDim}>random</span>
            </button>
            <button
              style={{ ...S.preset, ...(cfg.preset === "middleearth" ? S.presetOn : {}) }}
              onClick={() => set({ preset: "middleearth", cols: 60, rows: 44 })}>
              <span style={S.presetName}>Middle-earth</span>
              <span style={S.presetDim}>60×44</span>
            </button>
          </div>
          {cfg.preset && <div style={S.tileCount}>Authored layout · terrain sliders have limited effect</div>}
        </div>

        <div style={S.setupSection}>
          <div style={S.sectionLabel}>MAP SIZE</div>
          <div style={S.presetRow}>
            {SIZE_PRESETS.map((p) => (
              <button key={p.key}
                style={{ ...S.preset, ...(activePreset && activePreset.key === p.key ? S.presetOn : {}) }}
                onClick={() => set({ cols: p.cols, rows: p.rows })}>
                <span style={S.presetName}>{p.label}</span>
                <span style={S.presetDim}>{p.cols}×{p.rows}</span>
              </button>
            ))}
          </div>
          <div style={S.dimGrid}>
            <Stepper label="Columns" value={cfg.cols} min={8} max={160} step={2} onChange={(v) => set({ cols: v })} />
            <Stepper label="Rows" value={cfg.rows} min={8} max={120} step={2} onChange={(v) => set({ rows: v })} />
          </div>
          <div style={S.tileCount}>
            {tiles.toLocaleString()} tiles
            {tiles > 8000 && <span style={S.warnTag}> · large maps take a moment to generate</span>}
          </div>
        </div>

        <div style={S.setupSection}>
          <div style={S.sectionLabel}>TERRAIN</div>
          <Slider label="Ocean" value={cfg.oceanAmount} min={0.2} max={0.65} step={0.01}
            onChange={(v) => set({ oceanAmount: v })} fmt={(v) => `${Math.round(v * 100)}%`} />
          <Slider label="Continents" value={cfg.continentCount} min={1} max={7} step={1}
            onChange={(v) => set({ continentCount: v })} fmt={(v) => v === 1 ? "1 (Pangaea)" : `${v}`} />
          <Slider label="Mountains" value={cfg.mountainDensity} min={0} max={1} step={0.02}
            onChange={(v) => set({ mountainDensity: v })} fmt={(v) => v.toFixed(2)} />
          <Slider label="Rivers" value={1.2 - cfg.riverThreshold} min={0.2} max={1} step={0.02}
            onChange={(v) => set({ riverThreshold: 1.2 - v })} fmt={(v) => v > 0.8 ? "many" : v < 0.4 ? "few" : v.toFixed(2)} />
          <Slider label="Climate" value={cfg.climateStrength} min={0} max={1} step={0.02}
            onChange={(v) => set({ climateStrength: v })} fmt={(v) => v < 0.3 ? "mild" : v > 0.7 ? "extreme" : v.toFixed(2)} />
          <Slider label="Roughness" value={cfg.roughness} min={0} max={1} step={0.02}
            onChange={(v) => set({ roughness: v })} fmt={(v) => v < 0.25 ? "rolling" : v > 0.75 ? "rugged" : v.toFixed(2)} />
          <Slider label="Volcanism" value={cfg.volcanism} min={0} max={1} step={0.02}
            onChange={(v) => set({ volcanism: v })} fmt={(v) => v < 0.2 ? "dormant" : v > 0.8 ? "ring of fire" : v.toFixed(2)} />
          <Slider label="Min island" value={cfg.minIsland} min={0} max={5} step={1}
            onChange={(v) => set({ minIsland: v })} fmt={(v) => v === 0 ? "keep all" : v >= 4 ? "sparse" : "≤" + v + " sink"} />
        </div>

        <div style={S.setupSection}>
          <div style={S.sectionLabel}>SEED</div>
          <div style={S.seedRow}>
            <input type="number" className="num-stepper" value={cfg.seed} style={S.seedInput}
              onChange={(e) => set({ seed: parseInt(e.target.value || "0", 10) })} />
            <button style={S.seedBtn} onClick={() => set({ seed: (Math.random() * 1e9) | 0 })}>randomize</button>
          </div>
        </div>

        <button style={S.startBtn} onClick={() => onStart(cfg)}>Generate World →</button>
      </div>
    </div>
  );
}

// integer stepper with − / + and a clamped numeric field
function Stepper({ label, value, min, max, step, onChange }) {
  const clamp = (v) => Math.max(min, Math.min(max, v));
  return (
    <div style={S.stepperWrap}>
      <span style={S.stepperLabel}>{label}</span>
      <div style={S.stepperCtrl}>
        <button style={S.stepBtn} onClick={() => onChange(clamp(value - step))}>−</button>
        <input type="number" className="num-stepper" value={value} style={S.stepInput}
          onChange={(e) => onChange(clamp(parseInt(e.target.value || "0", 10)))} />
        <button style={S.stepBtn} onClick={() => onChange(clamp(value + step))}>+</button>
      </div>
    </div>
  );
}

/* ===========================================================================
   LAYER 4 — HexMap ORCHESTRATOR — shows setup until a world is generated, then the map.
   =========================================================================== */
function HexMap() {
  const [config, setConfig] = useState(null); // null => show setup

  if (!config) {
    return <SetupScreen initial={DEFAULT_CONFIG} onStart={setConfig} />;
  }
  return (
    <WorldView
      config={config}
      onReconfigure={() => setConfig(null)}
    />
  );
}
